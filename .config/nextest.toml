# nextest configuration — keep it minimal.
#
# Per-test retries are listed here only when a test is genuinely
# timing-/scheduling-sensitive in CI; never use retries to mask a real
# bug. Each entry must cite the symptom + why the test is flaky in CI.

[profile.default]
retries = 0

# `test_apply_drains_more_than_1024_items_per_iteration` asserts the apply
# loop drained MORE than DRAIN_CAP=1024 items in one event-loop iteration.
# The number observed depends on how fast events accumulate in the producer
# threads vs. how fast the apply thread polls — under CI runner load on
# shared GitHub-hosted runners we sometimes see 800–1000 (still capped, just
# fewer in-flight items at the moment we sampled). The test logic is
# correct; it just needs more than one shot at hitting the >1024 watermark.
# 3 retries clears it without hiding a real regression.
[[profile.default.overrides]]
filter = 'test(=test_apply_drains_more_than_1024_items_per_iteration)'
retries = 3
