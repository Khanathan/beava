services:
  beava:
    build: .
    ports:
      - "6400:6400"
      - "6401:6401"
    volumes:
      - ./data:/data
    environment:
      - BEAVA_TCP_PORT=6400
      - BEAVA_HTTP_PORT=6401
      - BEAVA_SNAPSHOT=true
      - BEAVA_SNAPSHOT_PATH=/data/beava.snapshot
      - BEAVA_EVENT_LOG=true
      - BEAVA_DATA_DIR=/data
    restart: unless-stopped
