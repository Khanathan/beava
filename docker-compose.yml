services:
  tally:
    build: .
    ports:
      - "6400:6400"
      - "6401:6401"
    volumes:
      - ./data:/data
    environment:
      - TALLY_TCP_PORT=6400
      - TALLY_HTTP_PORT=6401
      - TALLY_SNAPSHOT=true
      - TALLY_SNAPSHOT_PATH=/data/tally.snapshot
      - TALLY_EVENT_LOG=true
      - TALLY_DATA_DIR=/data
    restart: unless-stopped
