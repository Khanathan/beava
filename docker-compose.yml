# docker-compose.yml — single-service local run for Beava.
#
# Ports:
#   6400  — binary TCP protocol (SDK clients: `from beava import App`)
#   6401  — HTTP management API (health, metrics, /debug/*, pipeline UI)
#
# Volumes:
#   ./data  — event log + snapshot directory. Persists across restarts.
#             Delete it to reset state.
services:
  beava:
    build: .
    ports:
      - "6400:6400"
      - "6401:6401"
    volumes:
      - ./data:/data
    environment:
      - BEAVA_TCP_PORT=6400
      - BEAVA_HTTP_PORT=6401
      - BEAVA_SNAPSHOT=true
      - BEAVA_SNAPSHOT_PATH=/data/beava.snapshot
      - BEAVA_EVENT_LOG=true
      - BEAVA_DATA_DIR=/data
    restart: unless-stopped
