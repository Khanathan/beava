site_name: Tally
site_description: "Real-time feature server. Push events, get features."
site_url: ""
repo_url: https://github.com/petrpan26/tally
repo_name: petrpan26/tally

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Installation: installation.md
  - Guide:
    - Python SDK: python-sdk.md
    - Operators Reference: operators.md
  - Architecture:
    - Overview: architecture.md
    - TCP Protocol: protocol.md
    - HTTP API: http-api.md
  - Comparison: comparison.md
  - Contributing: contributing.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
