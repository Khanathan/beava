<!doctype html>

<head>

  <title>How to detect fraud in real time — beava guide</title>
  <meta name="description" content="Build real-time fraud detection with velocity checks, buy-intent signals, and login-streak failures. Complete recipe with Python pipeline, curl integration, and benchmark numbers.">

  <link rel="stylesheet" href="/styles/site.css">
  <link rel="icon" href="/assets/mascot-mark-geometric.png">

<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="/js/Shared.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    // ==================================================================
    // /guide/recipes/fraud/ — velocity, buy-intent, and login-streak fraud
    // signals built on a single beava pipeline. First recipe written;
    // template for the other four.
    // ==================================================================

    const RecipeHero = () => (
      <section style={{ padding: '64px 28px 32px' }}>
        <div style={{ maxWidth: 880, margin: '0 auto' }}>
          <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', marginBottom: 14 }}>
            <a href="/guide/" style={{ color: 'var(--fg3)', textDecoration: 'none' }}>Guide</a>
            <span style={{ margin: '0 6px' }}>/</span>
            <a href="/guide/" style={{ color: 'var(--fg3)', textDecoration: 'none' }}>Recipes</a>
            <span style={{ margin: '0 6px' }}>/</span>
            <span style={{ color: 'var(--fg1)' }}>Fraud detection</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 160px', gap: 32, alignItems: 'center' }} className="two-col">
            <div>
              <Eyebrow style={{ marginBottom: 10 }}>Recipe · Fraud detection</Eyebrow>
              <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 5vw, 56px)', lineHeight: 1.05, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '0 0 14px', textWrap: 'balance' }}>
                How to detect fraud in real time
              </h1>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.6, color: 'var(--fg2)', margin: 0, textWrap: 'pretty' }}>
                Velocity, buy intent, and login-streak signals in one pipeline. Push every login and checkout attempt as an event; beava maintains per-IP and per-user risk signals with atomic updates you can query on the hot path of your auth and checkout flows.
              </p>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <img src="/assets/mascot-pose-2.svg" width={140} height={140}/>
            </div>
          </div>
        </div>
      </section>
    );

    const Problem = () => (
      <section style={{ padding: '32px 28px 8px' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <Eyebrow style={{ marginBottom: 12 }}>The problem</Eyebrow>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.65, color: 'var(--fg1)', margin: '0 0 14px', textWrap: 'pretty' }}>
            Priya is CTO at a 10-person fintech. Her one backend engineer is spending ~40% of his week wiring Redis + Lua scripts: velocity checks on login, distinct-IP counts per user, consecutive failure streaks, buy-intent counts in the 5 minutes before checkout. Each new rule means a new Lua file, a new Redis schema, a new race condition to worry about, a new test to write.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.65, color: 'var(--fg1)', margin: 0, textWrap: 'pretty' }}>
            She has two weeks until fraud rules need to be live in production. The Lua repo is growing. She does not want to become the team&apos;s Lua expert.
          </p>
        </div>
      </section>
    );

    const ThePipeline = () => {
      const code = `# fraud_pipeline.py
import beava as bv

@bv.stream
class LoginAttempt:
    ip: str
    user_id: str
    success: bool
    amount_usd: float   # 0 for login, >0 for checkout intent

@bv.table(key="ip")
def IpSignals(e: LoginAttempt):
    return e.group_by("ip").agg(
        attempts_5m       = bv.count(window="5m"),
        failures_5m       = bv.count(window="5m", where=~e.success),
        distinct_users_5m = bv.distinct(e.user_id, window="5m"),
    )

@bv.table(key="user_id")
def UserSignals(e: LoginAttempt):
    return e.group_by("user_id").agg(
        fail_streak   = bv.consecutive(where=~e.success),
        failed_ips_1h = bv.distinct(e.ip, window="1h", where=~e.success),
        buy_intent_5m = bv.sum(e.amount_usd, window="5m"),
    )

# Spawn the beava binary in another shell, then connect:
app = bv.App(url="http://0.0.0.0:8080")
app.register(LoginAttempt, IpSignals, UserSignals)`;
      return (
        <section style={{ padding: '48px 28px 16px' }}>
          <div style={{ maxWidth: 880, margin: '0 auto' }}>
            <Eyebrow style={{ marginBottom: 12 }}>The pipeline</Eyebrow>
            <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(24px, 3vw, 32px)', lineHeight: 1.2, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 10px' }}>
              Two tables, one stream, 24 lines.
            </h2>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: 15, lineHeight: 1.6, color: 'var(--fg2)', margin: '0 0 24px', textWrap: 'pretty' }}>
              <code style={{ fontFamily: 'var(--font-mono)', fontSize: 13, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>IpSignals</code> indexes by client IP for velocity rules. <code style={{ fontFamily: 'var(--font-mono)', fontSize: 13, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>UserSignals</code> indexes by user for streak + buy-intent rules. Same stream, two views. All aggregations are atomic: every event updates every feature in a single step.
            </p>
            <div style={{ position: 'relative' }}>
              <pre className="code-well" style={{ fontSize: 14, padding: '24px 28px', lineHeight: 1.7, margin: 0 }}>
                <span className="cmt"># fraud_pipeline.py</span>{'\n'}
                <span className="kw">import</span> beava <span className="kw">as</span> bv{'\n'}{'\n'}
                <span className="fn">@bv.stream</span>{'\n'}
                <span className="kw">class</span> <span className="ty">LoginAttempt</span>:{'\n'}
                {'    '}ip: <span className="ty">str</span>{'\n'}
                {'    '}user_id: <span className="ty">str</span>{'\n'}
                {'    '}success: <span className="ty">bool</span>{'\n'}
                {'    '}amount_usd: <span className="ty">float</span>   <span className="cmt"># 0 for login, {'>'}0 for checkout intent</span>{'\n'}{'\n'}
                <span className="fn">@bv.table</span>(key=<span className="str">"ip"</span>){'\n'}
                <span className="kw">def</span> <span className="fn">IpSignals</span>(e: LoginAttempt):{'\n'}
                {'    '}<span className="kw">return</span> e.<span className="fn">group_by</span>(<span className="str">"ip"</span>).<span className="fn">agg</span>({'\n'}
                {'        '}attempts_5m       = bv.<span className="fn">count</span>(window=<span className="str">"5m"</span>),{'\n'}
                {'        '}failures_5m       = bv.<span className="fn">count</span>(window=<span className="str">"5m"</span>, where=~e.success),{'\n'}
                {'        '}distinct_users_5m = bv.<span className="fn">distinct</span>(e.user_id, window=<span className="str">"5m"</span>),{'\n'}
                {'    '}){'\n'}{'\n'}
                <span className="fn">@bv.table</span>(key=<span className="str">"user_id"</span>){'\n'}
                <span className="kw">def</span> <span className="fn">UserSignals</span>(e: LoginAttempt):{'\n'}
                {'    '}<span className="kw">return</span> e.<span className="fn">group_by</span>(<span className="str">"user_id"</span>).<span className="fn">agg</span>({'\n'}
                {'        '}fail_streak   = bv.<span className="fn">consecutive</span>(where=~e.success),{'\n'}
                {'        '}failed_ips_1h = bv.<span className="fn">distinct</span>(e.ip, window=<span className="str">"1h"</span>, where=~e.success),{'\n'}
                {'        '}buy_intent_5m = bv.<span className="fn">sum</span>(e.amount_usd, window=<span className="str">"5m"</span>),{'\n'}
                {'    '}){'\n'}{'\n'}
                <span className="cmt"># Spawn the beava binary in another shell, then connect:</span>{'\n'}
                app = bv.<span className="fn">App</span>(url=<span className="str">"http://0.0.0.0:8080"</span>){'\n'}
                app.<span className="fn">register</span>(LoginAttempt, IpSignals, UserSignals)
              </pre>
              <CopyBtn text={code}/>
            </div>
          </div>
        </section>
      );
    };

    const RegisterAndQuery = () => {
      const install = `pip install tally\npython fraud_pipeline.py`;
      const push = `curl -X POST https://your-beava/events/LoginAttempt \\
  -H 'Content-Type: application/json' \\
  -d '{
    "ip": "203.0.113.42",
    "user_id": "u_7f3c",
    "success": false,
    "amount_usd": 0
  }'`;
      const query = `curl -X POST https://your-beava/batch/UserSignals \\
  -H 'Content-Type: application/json' \\
  -d '["u_7f3c","u_9a1b","u_4e22"]'`;
      const response = `{
  "u_7f3c": {"fail_streak": 4, "failed_ips_1h": 3, "buy_intent_5m": 0},
  "u_9a1b": {"fail_streak": 0, "failed_ips_1h": 1, "buy_intent_5m": 129.50},
  "u_4e22": {"fail_streak": 1, "failed_ips_1h": 1, "buy_intent_5m": 0}
}`;
      return (
        <section style={{ padding: '48px 28px 16px' }}>
          <div style={{ maxWidth: 880, margin: '0 auto' }}>
            <Eyebrow style={{ marginBottom: 12 }}>Run it</Eyebrow>
            <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(24px, 3vw, 32px)', lineHeight: 1.2, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 24px' }}>
              Install, push events, query on the hot path.
            </h2>

            <div style={{ marginBottom: 26 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginBottom: 8, letterSpacing: '0.03em' }}>1. install + run</div>
              <div style={{ position: 'relative' }}>
                <pre className="code-well" style={{ fontSize: 14, padding: '18px 22px', lineHeight: 1.65, margin: 0 }}>
                  <span className="cmt">$ </span>pip install tally{'\n'}
                  <span className="cmt">$ </span>python fraud_pipeline.py
                </pre>
                <CopyBtn text={install}/>
              </div>
            </div>

            <div style={{ marginBottom: 26 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginBottom: 8, letterSpacing: '0.03em' }}>2. push an event from your auth flow</div>
              <div style={{ position: 'relative' }}>
                <pre className="code-well" style={{ fontSize: 13, padding: '18px 22px', lineHeight: 1.65, margin: 0, whiteSpace: 'pre' }}>
                  <span className="cmt">$ </span>curl -X POST https://your-beava/events/LoginAttempt \{'\n'}
                  {'    '}-H <span className="str">'Content-Type: application/json'</span> \{'\n'}
                  {'    '}-d <span className="str">{'\''}</span>{'{'}{'\n'}
                  {'      '}<span className="str">"ip"</span>: <span className="str">"203.0.113.42"</span>,{'\n'}
                  {'      '}<span className="str">"user_id"</span>: <span className="str">"u_7f3c"</span>,{'\n'}
                  {'      '}<span className="str">"success"</span>: <span className="kw">false</span>,{'\n'}
                  {'      '}<span className="str">"amount_usd"</span>: <span className="num">0</span>{'\n'}
                  {'    '}{'}'}<span className="str">{'\''}</span>
                </pre>
                <CopyBtn text={push}/>
              </div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginBottom: 8, letterSpacing: '0.03em' }}>3. batch-query on the hot path (login check, checkout gate)</div>
              <div style={{ position: 'relative', marginBottom: 12 }}>
                <pre className="code-well" style={{ fontSize: 13, padding: '18px 22px', lineHeight: 1.65, margin: 0, whiteSpace: 'pre' }}>
                  <span className="cmt">$ </span>curl -X POST https://your-beava/batch/UserSignals \{'\n'}
                  {'    '}-H <span className="str">'Content-Type: application/json'</span> \{'\n'}
                  {'    '}-d <span className="str">'["u_7f3c","u_9a1b","u_4e22"]'</span>
                </pre>
                <CopyBtn text={query}/>
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginBottom: 8, letterSpacing: '0.03em' }}>→ response (P99 &lt;5ms for 1000 user_ids)</div>
              <div style={{ position: 'relative' }}>
                <pre className="code-well" style={{ fontSize: 13, padding: '18px 22px', lineHeight: 1.65, margin: 0, whiteSpace: 'pre' }}>
                  {'{'}{'\n'}
                  {'  '}<span className="str">"u_7f3c"</span>: {'{'}<span className="str">"fail_streak"</span>: <span className="num">4</span>, <span className="str">"failed_ips_1h"</span>: <span className="num">3</span>, <span className="str">"buy_intent_5m"</span>: <span className="num">0</span>{'}'},{'\n'}
                  {'  '}<span className="str">"u_9a1b"</span>: {'{'}<span className="str">"fail_streak"</span>: <span className="num">0</span>, <span className="str">"failed_ips_1h"</span>: <span className="num">1</span>, <span className="str">"buy_intent_5m"</span>: <span className="num">129.50</span>{'}'},{'\n'}
                  {'  '}<span className="str">"u_4e22"</span>: {'{'}<span className="str">"fail_streak"</span>: <span className="num">1</span>, <span className="str">"failed_ips_1h"</span>: <span className="num">1</span>, <span className="str">"buy_intent_5m"</span>: <span className="num">0</span>{'}'}{'\n'}
                  {'}'}
                </pre>
                <CopyBtn text={response}/>
              </div>
            </div>
          </div>
        </section>
      );
    };

    const WhatYouGet = () => (
      <section style={{ padding: '48px 28px 24px' }}>
        <div style={{ maxWidth: 880, margin: '0 auto' }}>
          <Eyebrow style={{ marginBottom: 12 }}>What you get</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(24px, 3vw, 32px)', lineHeight: 1.2, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 24px' }}>
            Real numbers on a real box.
          </h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }} className="stats-grid">
            <StatBlock num="~50K" unit="events/sec/core" detail="sustained ingest for this pipeline shape on a c6i.xlarge"/>
            <StatBlock num="&lt;5ms" unit="P99 batch query" detail="1000 user_ids per request, all 6 signals returned"/>
            <StatBlock num="~8GB" unit="RAM at 1M users" detail="all 6 signals resident, indexed by IP + user_id"/>
            <StatBlock num="~8s/GB" unit="crash recovery" detail="WAL replay + snapshot restore, no data loss past last fsync"/>
          </div>
          <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', marginTop: 18, maxWidth: 640, textWrap: 'pretty' }}>
            Numbers are targets measured against the pipeline above. Methodology, workload shape, and hardware spec are in <a href="/docs/performance/" style={{ color: 'var(--accent)', fontWeight: 600, textDecoration: 'none' }}>/docs/performance</a>. Your shape may read different.
          </div>
        </div>
      </section>
    );

    const StatBlock = ({ num, unit, detail }) => (
      <div style={{
        background: 'var(--beava-paper)',
        border: '1px solid var(--border)',
        borderRadius: 12,
        padding: '20px 20px 18px',
      }}>
        <div style={{ fontFamily: 'var(--font-serif)', fontSize: 30, fontWeight: 600, color: 'var(--fg1)', letterSpacing: '-0.01em', lineHeight: 1.1, marginBottom: 2 }} dangerouslySetInnerHTML={{ __html: num }}/>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 12, color: 'var(--accent)', fontWeight: 600, letterSpacing: '0.02em', textTransform: 'lowercase', marginBottom: 10 }}>{unit}</div>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, lineHeight: 1.5, color: 'var(--fg2)', textWrap: 'pretty' }}>{detail}</div>
      </div>
    );

    const NextSteps = () => (
      <section style={{ padding: '48px 28px 96px' }}>
        <div style={{ maxWidth: 880, margin: '0 auto' }}>
          <Eyebrow style={{ marginBottom: 12 }}>Next steps</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(24px, 3vw, 32px)', lineHeight: 1.2, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 24px' }}>
            Extend it, chain it, or just ask Claude.
          </h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'grid', gap: 14 }}>
            <StepItem title="Add device-fingerprint velocity" body="Add fingerprint: str to LoginAttempt. Add @bv.table(key=&quot;fingerprint&quot;) FpSignals. Query on checkout."/>
            <StepItem title="Chain signals into a score" body="score = 2 * fail_streak + 0.5 * failed_ips_1h − 0.1 * buy_intent_5m. Threshold to {allow, challenge, block}."/>
            <StepItem title="Pipeline registration via CI" body="Your fraud_pipeline.py lives in the repo. Ship it on merge. See /docs/deploy."/>
          </ul>
          <div style={{
            marginTop: 28,
            padding: '22px 26px',
            background: 'var(--beava-orange-wash)',
            border: '1px solid #f1d8c2',
            borderRadius: 14,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--font-accent)', fontSize: 22, fontWeight: 700, color: 'var(--accent)', transform: 'rotate(-2deg)', display: 'inline-block' }}>
                Or just ask Claude →
              </span>
            </div>
            <pre className="code-well" style={{ fontSize: 13, padding: '14px 16px', lineHeight: 1.5, margin: 0 }}>
              <span className="cmt"># in Claude Code, Cursor, or Codex</span>{'\n'}
              /beava add per-card velocity with 24h window
            </pre>
            <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg2)', marginTop: 10 }}>
              The <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12, background: '#fff', padding: '1px 5px', borderRadius: 4 }}>/beava</code> skill writes the diff, registers the pipeline, and pushes a test event. <a href="#" style={{ color: 'var(--accent)', fontWeight: 600, textDecoration: 'none' }}>Install the skill →</a>
            </div>
          </div>
        </div>
      </section>
    );

    const StepItem = ({ title, body }) => (
      <li style={{
        padding: '14px 18px',
        background: '#fff',
        border: '1px solid var(--border)',
        borderRadius: 10,
      }}>
        <div style={{ fontFamily: 'var(--font-sans)', fontWeight: 600, fontSize: 15, color: 'var(--fg1)', marginBottom: 4 }}>{title}</div>
        <div style={{ fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.55, color: 'var(--fg2)', textWrap: 'pretty' }} dangerouslySetInnerHTML={{ __html: body }}/>
      </li>
    );

    const ComingSoonBanner = () => (
      <div style={{
        maxWidth: 1000, margin: '20px auto 0', padding: '14px 20px',
        background: 'var(--beava-orange-wash)',
        borderLeft: '3px solid var(--accent)',
        borderRadius: 8,
        fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5,
        color: 'var(--fg1)',
      }}>
        <strong style={{ color: 'var(--accent)' }}>This fraud recipe is coming in v0.1.</strong>
        {' '}Phase 13.7 ships the spec docs site; the interactive fraud recipe is deferred to a
        v0.1+ follow-up. For fraud-specific operators today, browse
        {' '}<a href="/docs/operators/velocity/" style={{ color: 'var(--accent)', fontWeight: 600 }}>velocity ops</a> and
        {' '}<a href="/docs/operators/buffer-geo/" style={{ color: 'var(--accent)', fontWeight: 600 }}>geo ops</a>,
        or start from the <a href="/docs/quickstart/" style={{ color: 'var(--accent)', fontWeight: 600 }}>quickstart</a>.
      </div>
    );

    const App = () => (
      <>
        <SiteHeader active="guide" maxWidth={1200}/>
        <ComingSoonBanner/>
        <RecipeHero/>
        <Problem/>
        <ThePipeline/>
        <RegisterAndQuery/>
        <WhatYouGet/>
        <NextSteps/>
        <SiteFooter/>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
