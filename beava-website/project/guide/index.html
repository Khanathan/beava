<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The real-time feature guidebook — beava</title>
  <meta name="description" content="How to build analytics, fraud detection, personalization, leaderboards, rate limiting, and metering — the real-time feature playbooks every product eventually needs.">
  <link rel="stylesheet" href="/styles/colors_and_type.css">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="icon" href="/assets/mascot-mark-geometric.png">
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="/js/Shared.jsx"></script>

  <script type="text/babel">
    // ==================================================================
    // /guide/ — the beava guide landing page.
    // Lists Chapter 1 (pedagogy) + 5 recipes, each linking to its own
    // deep page.
    // ==================================================================
    const GuideHero = () => (
      <section style={{ padding: '64px 28px 40px', textAlign: 'center' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <Eyebrow style={{ marginBottom: 14 }}>The real-time feature guidebook</Eyebrow>
          <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(40px, 6vw, 64px)', lineHeight: 1.05, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '0 0 18px', textWrap: 'balance' }}>
            How to build the live features your product actually needs.
          </h1>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 18, lineHeight: 1.6, color: 'var(--fg2)', maxWidth: 620, margin: '0 auto', textWrap: 'pretty' }}>
            Start with Chapter 1 &mdash; a 10-minute interactive build that turns into a per-customer analytics dashboard. Then pick the recipe that matches your day job: fraud, personalization, ranking, rate limits, or metering. beava is the implementation; streaming is the subject.
          </p>
        </div>
      </section>
    );

    const ChapterCard = () => (
      <section style={{ padding: '20px 28px 40px' }}>
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <a href="/guide/chapter-1/" style={{
            display: 'grid', gridTemplateColumns: '1fr 260px', gap: 40, alignItems: 'center',
            background: 'var(--beava-paper)', border: '1px solid var(--border)', borderRadius: 20,
            padding: 36, textDecoration: 'none', color: 'inherit',
            boxShadow: 'var(--shadow-pop)',
          }} className="two-col">
            <div>
              <div style={{ fontFamily: 'var(--font-accent)', fontSize: 26, fontWeight: 700, color: 'var(--accent)', lineHeight: 1, transform: 'rotate(-2deg)', display: 'inline-block', marginBottom: 8 }}>
                Chapter 1 →
              </div>
              <h3 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 32, lineHeight: 1.15, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '4px 0 12px' }}>
                How to build a per-customer analytics dashboard
              </h3>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.6, color: 'var(--fg2)', margin: '0 0 14px', maxWidth: 540 }}>
                A quick intro to beava (it looks like pandas, honestly), your first pipeline in three lines, then we build a live analytics dashboard per customer together. 10 minutes, zero installs.
              </p>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--accent)', fontWeight: 600 }}>
                Start Chapter 1 <Icon name="arrow" size={14}/>
              </div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <img src="/assets/mascot-work-pose.svg" width={220} height={220}/>
            </div>
          </a>
        </div>
      </section>
    );

    const RecipeIndex = () => {
      const recipes = [
        { slug: 'personalization', title: 'Personalization', caption: 'Live category feeds and top-trending recommendations. No ML.', mascot: '/assets/mascot-work-pose.svg',      mw: 88, mh: 88, ready: false },
        { slug: 'fraud',           title: 'Fraud detection', caption: 'Block bad actors the moment they click submit.',              mascot: '/assets/mascot-pose-2.svg',         mw: 88, mh: 88, ready: true  },
        { slug: 'leaderboard',     title: 'Leaderboard',     caption: 'Real-time rankings that update as events land.',              mascot: '/assets/mascot-pose-3.svg',         mw: 88, mh: 88, ready: false },
        { slug: 'rate-limiting',   title: 'Rate limiting',   caption: 'Fingerprint-aware quotas and auto-ban lists.',                mascot: '/assets/mascot-mark-geometric.png', mw: 120, mh: 80, ready: false },
        { slug: 'usage-metering',  title: 'Usage metering',  caption: 'Billing meters that drop every event in the right bucket.',   mascot: '/assets/logo-mark.png',             mw: 88, mh: 88, ready: false },
      ];
      return (
        <section style={{ padding: '48px 28px 96px' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 36 }}>
              <Eyebrow style={{ marginBottom: 12 }}>Recipes</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(28px, 4vw, 40px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: 0 }}>
                Five real features. One pipeline each.
              </h2>
            </div>
            <div className="recipe-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 16 }}>
              {recipes.map(r => (
                <a key={r.slug} href={`/guide/recipes/${r.slug}/`} style={{
                  display: 'flex', flexDirection: 'column',
                  padding: '24px 20px 22px',
                  background: 'var(--beava-paper)',
                  border: '1px solid var(--border)',
                  borderRadius: 16,
                  textDecoration: 'none', color: 'inherit',
                  boxShadow: 'var(--shadow-xs)',
                  minHeight: 260,
                  position: 'relative',
                  opacity: r.ready ? 1 : 0.85,
                }}>
                  {!r.ready && (
                    <div style={{
                      position: 'absolute', top: 12, right: 12,
                      fontFamily: 'var(--font-mono)', fontSize: 10,
                      color: 'var(--fg3)', letterSpacing: '0.08em',
                      textTransform: 'uppercase',
                      padding: '2px 8px', borderRadius: 4,
                      border: '1px solid var(--border)',
                      background: '#fff',
                    }}>soon</div>
                  )}
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 96, marginBottom: 14 }}>
                    <img src={r.mascot} alt="" width={r.mw} height={r.mh} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }}/>
                  </div>
                  <h3 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 20, color: 'var(--fg1)', margin: '0 0 8px', letterSpacing: '-0.01em' }}>
                    {r.title}
                  </h3>
                  <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5, color: 'var(--fg2)', margin: '0 0 16px', flex: 1, textWrap: 'pretty' }}>
                    {r.caption}
                  </p>
                  <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, color: r.ready ? 'var(--accent)' : 'var(--fg3)' }}>
                    {r.ready ? 'See recipe →' : 'In progress'}
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const App = () => (
      <>
        <Banner id="cloud-waitlist-v1">
          beava cloud · managed from $50/mo · self-host is always free · join the waitlist
        </Banner>
        <Nav active="guide"/>
        <GuideHero/>
        <ChapterCard/>
        <RecipeIndex/>
        <Footer/>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
