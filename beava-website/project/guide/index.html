<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The streaming guidebook — beava</title>
  <meta name="description" content="Build a per-customer analytics dashboard with beava — your first pipeline in three lines, live updates over HTTP, ten minutes.">
  <link rel="stylesheet" href="/styles/colors_and_type.css">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png"><link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png"><link rel="shortcut icon" href="/assets/favicon.ico">
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="/js/Shared.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    // ==================================================================
    // /guide/ — the beava guide landing page.
    // Hero + ChapterCard. RecipeIndex/ComingSoonBanner intentionally
    // removed — we don't ship dead recipe links.
    // ==================================================================
    const GuideHero = () => (
      <section style={{ padding: '64px 28px 24px', textAlign: 'center' }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 5vw, 52px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: 0, textWrap: 'balance' }}>
            The streaming guidebook
          </h1>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 18, lineHeight: 1.5, color: 'var(--accent)', margin: '14px auto 0', maxWidth: 600, textWrap: 'balance', fontWeight: 500 }}>
            Recipes for real-time features in modern applications.
          </p>
        </div>
      </section>
    );

    const ChapterCard = () => (
      <section style={{ padding: '20px 28px 40px' }}>
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <a href="/guide/chapter-1/" style={{
            display: 'grid', gridTemplateColumns: '1fr 260px', gap: 40, alignItems: 'center',
            background: 'var(--beava-paper)', border: '1px solid var(--border)', borderRadius: 20,
            padding: 36, textDecoration: 'none', color: 'inherit',
            boxShadow: 'var(--shadow-pop)',
          }} className="two-col">
            <div>
              <div style={{ fontFamily: 'var(--font-accent)', fontSize: 26, fontWeight: 700, color: 'var(--accent)', lineHeight: 1, transform: 'rotate(-2deg)', display: 'inline-block', marginBottom: 8 }}>
                Chapter 1 →
              </div>
              <h3 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 32, lineHeight: 1.15, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '4px 0 12px' }}>
                How to build a per-customer analytics dashboard
              </h3>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.6, color: 'var(--fg2)', margin: '0 0 14px', maxWidth: 540 }}>
                A quick intro to beava (it looks like polars, honestly), your first pipeline in three lines, then we build a live analytics dashboard per customer together. 10 minutes, zero installs.
              </p>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--accent)', fontWeight: 600 }}>
                Start Chapter 1 <Icon name="arrow" size={14}/>
              </div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <img src="/assets/mascot-work-pose.svg" width={220} height={220}/>
            </div>
          </a>
          <div style={{
            textAlign: 'center', marginTop: 28,
            fontFamily: 'var(--font-accent)', fontSize: 26, fontWeight: 700,
            color: 'var(--fg3)', lineHeight: 1.2,
            transform: 'rotate(-1.5deg)',
          }}>
            more chapters coming soon
            <span style={{ color: 'var(--accent)', marginLeft: 6 }}>~</span>
          </div>
        </div>
      </section>
    );

    const App = () => (
      <>
        <SiteHeader active="guide" maxWidth={1400}/>
        <GuideHero/>
        <ChapterCard/>
        <SiteFooter maxWidth={1400}/>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script src="/js/track-pageview.js" defer></script>
</body>
</html>
