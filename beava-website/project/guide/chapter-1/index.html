<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>How to build a per-customer analytics dashboard — beava Chapter 1</title>
  <meta name="description" content="10-minute interactive build. Meet beava, write your first pipeline, extend it into a per-customer analytics dashboard with views, distinct categories, and last-seen. Zero installs, runs in your browser.">
  <link rel="stylesheet" href="/styles/colors_and_type.css">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="icon" href="/assets/mascot-mark-geometric.png">
  <style>
    .ch1-two { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: stretch; }
    .ch1-compose { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .ch1-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .ch1-dash { display: grid; grid-template-columns: 260px 1fr; gap: 18px; align-items: start; }
    .ch1-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .ch1-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    @media (max-width: 900px) {
      .ch1-two { grid-template-columns: 1fr !important; }
      .ch1-two > div:nth-child(2) { display: none !important; }
      .ch1-compose { grid-template-columns: 1fr !important; }
      .ch1-dash { grid-template-columns: 1fr !important; }
      .ch1-stats { grid-template-columns: 1fr 1fr !important; }
    }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      border: 1px solid var(--border);
    }
    .pill.idle { background: var(--bg-inset); color: var(--fg3); }
    .pill.reg  { background: var(--beava-orange-wash); color: var(--accent); border-color: #f1d8c2; }
    .pill.done { background: var(--beava-success-wash); color: var(--beava-success); border-color: #c7d7a8; }
    .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .pill.reg .dot { animation: pulse 900ms ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    .ch1-input {
      font-family: var(--font-mono); font-size: 13px;
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
      background: #fff; color: var(--fg1); width: 100%;
    }
    .ch1-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
    .ch1-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em;
                 color: var(--fg3); text-transform: lowercase; margin-bottom: 4px; display: block; }

    /* Event ticker — thin scrolling log of last events. */
    .evt-ticker {
      background: var(--beava-paper);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 6px;
      max-height: 420px; overflow: hidden;
      box-shadow: var(--shadow-xs);
    }
    .evt-ticker-hd {
      font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em;
      color: var(--fg3); text-transform: lowercase; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .evt-row {
      font-family: var(--font-mono); font-size: 12px;
      padding: 8px 10px; margin-bottom: 6px;
      background: #fff; border: 1px solid var(--border-inset);
      border-radius: 8px; line-height: 1.35;
      animation: evt-in 500ms cubic-bezier(0.22,1,0.36,1);
    }
    .evt-row .t   { color: var(--fg3); font-size: 10px; }
    .evt-row .u   { color: var(--accent); font-weight: 600; }
    .evt-row .p   { color: var(--fg1); word-break: break-all; }
    .evt-empty    { font-family: var(--font-sans); font-size: 12px; color: var(--fg3);
                    font-style: italic; padding: 20px 4px; text-align: center; }
    @keyframes evt-in {
      0%   { transform: translateY(-6px); opacity: 0; background: var(--beava-orange-wash); }
      100% { transform: translateY(0);    opacity: 1; background: #fff; }
    }

    /* Stat tile — wide strip above user cards. */
    .stat-tile {
      background: #fff; border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat-tile .lbl {
      font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em;
      color: var(--fg3); text-transform: lowercase;
    }
    .stat-tile .val {
      font-family: var(--font-serif); font-weight: 600; font-size: 28px;
      color: var(--fg1); letter-spacing: -0.01em; line-height: 1;
    }

    /* User card — the analytics "row", as a card. */
    .user-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 16px 14px;
      display: flex; flex-direction: column; gap: 10px;
      transition: box-shadow 200ms, transform 200ms;
      position: relative; overflow: hidden;
    }
    .user-card.flash::before {
      content: ''; position: absolute; inset: 0;
      background: var(--beava-orange-wash); opacity: 0.65;
      animation: card-flash 900ms cubic-bezier(0.22,1,0.36,1) forwards;
      pointer-events: none;
    }
    @keyframes card-flash { 0% { opacity: 0.65; } 100% { opacity: 0; } }
    .user-card-hd { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 700; font-size: 11px;
      color: #fff; letter-spacing: 0.02em;
    }
    .user-id {
      font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      color: var(--fg1); letter-spacing: 0.01em;
    }
    .user-meta {
      font-family: var(--font-mono); font-size: 10.5px;
      color: var(--fg3); letter-spacing: 0.02em;
    }
    .user-big {
      display: flex; align-items: baseline; gap: 8px;
    }
    .user-big .num {
      font-family: var(--font-serif); font-weight: 600; font-size: 36px;
      color: var(--fg1); letter-spacing: -0.02em; line-height: 1;
    }
    .user-big .sub {
      font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3);
      letter-spacing: 0.03em; text-transform: lowercase;
    }
    .bar {
      display: flex; flex-direction: column; gap: 6px;
    }
    .bar-hd {
      display: flex; justify-content: space-between; align-items: baseline;
      font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3);
      letter-spacing: 0.03em; text-transform: lowercase;
    }
    .bar-hd .bar-val {
      font-family: var(--font-mono); font-size: 12px; color: var(--fg1);
      font-weight: 700; text-transform: none; letter-spacing: 0;
    }
    .bar-track {
      height: 6px; background: var(--bg-inset); border-radius: 999px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; background: var(--accent); border-radius: 999px;
      transition: width 500ms cubic-bezier(0.22,1,0.36,1);
    }
    .cat-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .cat-pill {
      font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
      padding: 3px 8px; border-radius: 999px;
      background: var(--beava-orange-wash); color: var(--accent);
      border: 1px solid #f1d8c2; letter-spacing: 0.01em;
    }
    .cat-count {
      font-family: var(--font-mono); font-size: 11px; color: var(--fg3);
      margin-left: 2px;
    }
    .spark {
      display: flex; align-items: flex-end; gap: 2px;
      height: 28px; margin-top: 2px;
    }
    .spark-bar {
      flex: 1; background: var(--accent); opacity: 0.28;
      border-radius: 2px 2px 0 0; min-height: 2px;
      transition: height 400ms cubic-bezier(0.22,1,0.36,1), opacity 300ms;
    }
    .spark-bar.hot { opacity: 0.9; }

    .empty-state {
      grid-column: 1 / -1;
      padding: 48px 24px; text-align: center;
      font-family: var(--font-sans); font-size: 14px; color: var(--fg3);
      background: var(--beava-paper); border: 1px dashed var(--border);
      border-radius: 14px; font-style: italic;
    }

    /* Dashboard-card code well */
    .pipeline-state-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 11px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--bg-alt); color: var(--fg3);
      border: 1px solid var(--border);
    }

    /* Event composer — a distinct "push a row into the stream" module.
       Accent-bordered card, primary CTA for random, dashed-divider into
       the craft-your-own form. Used once in Part 2 and once in Part 3. */
    .composer-card {
      background: linear-gradient(180deg, var(--beava-paper) 0%, #fff 100%);
      border: 1px solid var(--border); border-left: 3px solid var(--accent);
      border-radius: 14px; padding: 20px 22px; margin: 20px 0 22px;
      box-shadow: var(--shadow-xs);
    }
    .composer-hd {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .composer-title {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-sans); font-size: 12px; font-weight: 700;
      color: var(--fg1); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .composer-title .tag {
      font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
      color: var(--accent); background: var(--beava-orange-wash);
      padding: 3px 9px; border-radius: 999px; letter-spacing: 0.02em;
      text-transform: lowercase; border: 1px solid #f1d8c2;
    }
    .composer-random {
      background: var(--accent); color: #fff; border: none;
      padding: 11px 18px; border-radius: 10px;
      font-family: var(--font-sans); font-weight: 600; font-size: 14px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 2px 0 rgba(26,23,20,0.12);
      transition: transform 120ms, box-shadow 120ms, background 120ms;
      line-height: 1;
    }
    .composer-random:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 3px 0 rgba(26,23,20,0.12);
      background: var(--accent-hover, #d86330);
    }
    .composer-random:active:not(:disabled) { transform: translateY(0); box-shadow: 0 1px 0 rgba(26,23,20,0.12); }
    .composer-random:disabled { opacity: 0.45; cursor: not-allowed; }
    .composer-divider {
      font-family: var(--font-mono); font-size: 11px; color: var(--fg3);
      letter-spacing: 0.06em; text-transform: lowercase;
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0 12px;
    }
    .composer-divider::before, .composer-divider::after {
      content: ''; flex: 1; border-top: 1px dashed var(--border);
    }

    /* Part 2 mini-result — ticker + simple "per-user views" list.
       Keeps Part 2 visually distinct from Part 3's full dashboard. */
    .mini-result {
      display: grid; grid-template-columns: 220px 1fr; gap: 16px;
      margin-top: 14px; margin-bottom: 8px;
    }
    .mini-rows {
      background: #fff; border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
      box-shadow: var(--shadow-xs);
    }
    .mini-row {
      display: grid; grid-template-columns: 1fr auto;
      align-items: baseline; padding: 9px 6px;
      border-bottom: 1px dashed var(--border-inset);
    }
    .mini-row:last-child { border-bottom: none; }
    .mini-row.flash { animation: mini-flash 900ms cubic-bezier(0.22,1,0.36,1); }
    @keyframes mini-flash {
      0%   { background: var(--beava-orange-wash); }
      100% { background: transparent; }
    }
    .mini-uid {
      font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      color: var(--accent);
    }
    .mini-val {
      font-family: var(--font-serif); font-size: 22px; font-weight: 600;
      color: var(--fg1); letter-spacing: -0.01em; line-height: 1;
    }
    .mini-empty {
      padding: 28px 6px; text-align: center;
      font-family: var(--font-sans); font-size: 13px; color: var(--fg3);
      font-style: italic;
    }
    @media (max-width: 760px) {
      .mini-result { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 880px) {
      .query-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="/js/Shared.jsx"></script>

  <script type="text/babel">
    // ==================================================================
    // /guide/chapter-1/ — the pedagogy chapter. Two halves:
    //   Part 1: meet beava (one para + pandas↔beava)
    //   Part 2: build an analytics dashboard, rendered as a real UI —
    //           event ticker on the left, user cards on the right with
    //           big numbers, 24h progress bars, category pills, sparklines.
    //
    // All simulated client-side. The pipeline code is displayed as-is;
    // the event-producing UI and the dashboard UI are what a real beava
    // operator would build on top of the /batch/ query endpoint.
    // ==================================================================

    const USERS   = ['u_7f3c', 'u_9a1b', 'u_4e22', 'u_5d0c', 'u_c18b', 'u_a33e', 'u_b7d1', 'u_2f0a'];
    const PATHS   = ['/home', '/product/belt-sander', '/product/router-bit', '/category/tools', '/category/paint', '/search?q=clamp', '/cart', '/checkout'];
    const SPARK_BUCKETS = 12;

    const CATEGORY_OF = (path) => {
      const m = path.match(/^\/(product|category|search)\/?([^/?]+)?/);
      if (!m) return 'home';
      if (m[1] === 'search') return 'search';
      return m[2] || m[1];
    };

    // 8 soft, distinguishable hues for user avatars — seeded by user_id.
    const AVATAR_HUES = [14, 35, 140, 200, 255, 300, 340, 85];
    const hueFor = (uid) => {
      let h = 0; for (const c of uid) h = (h * 31 + c.charCodeAt(0)) | 0;
      return AVATAR_HUES[Math.abs(h) % AVATAR_HUES.length];
    };
    const initialsFor = (uid) => {
      const s = uid.replace(/^u_/, '');
      return s.slice(0, 2).toUpperCase();
    };

    // ---------------- Hero ---------------- //

    const Hero = () => (
      <section style={{ padding: '64px 28px 24px' }}>
        <div style={{ maxWidth: 1040, margin: '0 auto' }}>
          <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', marginBottom: 14 }}>
            <a href="/guide/" style={{ color: 'var(--fg3)', textDecoration: 'none' }}>Guide</a>
            <span style={{ margin: '0 6px' }}>/</span>
            <span style={{ color: 'var(--fg1)' }}>Chapter 1</span>
          </div>
          <div className="two-col" style={{ display: 'grid', gridTemplateColumns: '1fr 160px', gap: 32, alignItems: 'center' }}>
            <div>
              <Eyebrow style={{ marginBottom: 10 }}>Chapter 1 · Interactive</Eyebrow>
              <h1 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 5vw, 56px)', lineHeight: 1.05, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '0 0 14px', textWrap: 'balance' }}>
                How to build a per-customer analytics dashboard
              </h1>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.6, color: 'var(--fg2)', margin: 0, textWrap: 'pretty' }}>
                Ten-minute interactive build. Meet beava, write your first pipeline, then watch a real analytics dashboard update live as you push events. Zero installs. Everything runs in your browser, same shape as the real server.
              </p>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <img src="/assets/mascot-work-pose.svg" width={140} height={140}/>
            </div>
          </div>
        </div>
      </section>
    );

    // ---------------- Part 1: Meet beava ---------------- //

    const MeetBeava = () => (
      <section style={{ padding: '48px 28px 16px' }}>
        <div style={{ maxWidth: 1040, margin: '0 auto' }}>
          <Eyebrow style={{ marginBottom: 12 }}>Part 1 · Meet beava</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(26px, 3.4vw, 36px)', lineHeight: 1.15, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 16px' }}>
            Same shape as pandas, live forever.
          </h2>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.65, color: 'var(--fg1)', margin: '0 0 14px', textWrap: 'pretty' }}>
            beava is one binary that ingests events and keeps per-entity aggregates up to date in memory. You describe the pipeline in Python, it serves features over HTTP. If you know <code style={{ fontFamily: 'var(--font-mono)', fontSize: 14, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>df.groupby(...).agg(...)</code>, you already know the shape.
          </p>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.65, color: 'var(--fg2)', margin: '0 0 32px', textWrap: 'pretty' }}>
            A <strong style={{ color: 'var(--fg1)' }}>stream</strong> is a dataframe that never stops appending. A <strong style={{ color: 'var(--fg1)' }}>table</strong> is a <code style={{ fontFamily: 'var(--font-mono)', fontSize: 14, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>groupby(key).agg(...)</code> over that stream, maintained incrementally on every event.
          </p>

          <div style={{ marginBottom: 32, maxWidth: 880, margin: '0 auto 32px' }}>
            <div className="ch1-two">
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginBottom: 6, letterSpacing: '0.03em', textTransform: 'lowercase' }}>pandas (batch)</div>
                <pre className="code-well" style={{ fontSize: 12.5, padding: '14px 16px', lineHeight: 1.7, margin: 0 }}>
{'events.'}<span className="fn">groupby</span>{'('}<span className="str">"user_id"</span>{').'}<span className="fn">agg</span>{'('}{'\n'}
{'    views_total=('}<span className="str">"path"</span>{', '}<span className="str">"count"</span>{'),'}{'\n'}
{'    last_seen=('}<span className="str">"ts"</span>{', '}<span className="str">"max"</span>{'),'}{'\n'}
{')'}
                </pre>
              </div>
              <div style={{ fontFamily: 'var(--font-accent)', fontSize: 28, color: 'var(--accent)', fontWeight: 700, textAlign: 'center', lineHeight: 1, alignSelf: 'center' }}>
                ≈
              </div>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent)', marginBottom: 6, letterSpacing: '0.03em', fontWeight: 700, textTransform: 'lowercase' }}>beava (live)</div>
                <pre className="code-well" style={{ fontSize: 12.5, padding: '14px 16px', lineHeight: 1.7, margin: 0 }}>
{'events.'}<span className="fn">groupby</span>{'('}<span className="str">"user_id"</span>{').'}<span className="fn">agg</span>{'('}{'\n'}
{'    views_total=bv.'}<span className="fn">count</span>{'(),'}{'\n'}
{'    last_seen=bv.'}<span className="fn">latest</span>{'(e.ts),'}{'\n'}
{')'}
                </pre>
              </div>
            </div>
            <div style={{ textAlign: 'center', marginTop: 12, fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', textWrap: 'pretty' }}>
              Same shape, different time model. pandas runs once over a frame. beava maintains the groupby forever.
            </div>
          </div>
        </div>
      </section>
    );

    // ---------------- Tokenized code blocks ---------------- //

    const pipelineBasic = [
      { t: 'cmt', v: '# your first pipeline — 3 lines of logic' },
      { t: 'kw',  v: 'import' }, { t: 't', v: ' beava ' }, { t: 'kw', v: 'as' }, { t: 't', v: ' bv\n\n' },
      { t: 'fn',  v: '@bv.stream' }, { t: 't', v: '\n' },
      { t: 'kw',  v: 'class' }, { t: 't', v: ' ' }, { t: 'ty', v: 'PageView' }, { t: 't', v: ':\n' },
      { t: 't',   v: '    user_id: ' }, { t: 'ty', v: 'str' }, { t: 't', v: '\n' },
      { t: 't',   v: '    path: ' },    { t: 'ty', v: 'str' }, { t: 't', v: '\n\n' },
      { t: 'fn',  v: '@bv.table' }, { t: 't', v: '(key=' }, { t: 'str', v: '"user_id"' }, { t: 't', v: ')\n' },
      { t: 'kw',  v: 'def' }, { t: 't', v: ' ' }, { t: 'fn', v: 'UserStats' }, { t: 't', v: '(e: PageView):\n' },
      { t: 't',   v: '    ' }, { t: 'kw', v: 'return' }, { t: 't', v: ' e.' }, { t: 'fn', v: 'agg' }, { t: 't', v: '(views_total=bv.' }, { t: 'fn', v: 'count' }, { t: 't', v: '())' },
    ];

    const pipelineDashboard = [
      { t: 'cmt', v: '# a per-customer analytics dashboard' },
      { t: 'kw',  v: 'import' }, { t: 't', v: ' beava ' }, { t: 'kw', v: 'as' }, { t: 't', v: ' bv\n\n' },
      { t: 'fn',  v: '@bv.stream' }, { t: 't', v: '\n' },
      { t: 'kw',  v: 'class' }, { t: 't', v: ' ' }, { t: 'ty', v: 'PageView' }, { t: 't', v: ':\n' },
      { t: 't',   v: '    user_id: ' }, { t: 'ty', v: 'str' }, { t: 't', v: '\n' },
      { t: 't',   v: '    path: ' },    { t: 'ty', v: 'str' }, { t: 't', v: '\n' },
      { t: 't',   v: '    category: ' },{ t: 'ty', v: 'str' }, { t: 't', v: '\n\n' },
      { t: 'fn',  v: '@bv.table' }, { t: 't', v: '(key=' }, { t: 'str', v: '"user_id"' }, { t: 't', v: ')\n' },
      { t: 'kw',  v: 'def' }, { t: 't', v: ' ' }, { t: 'fn', v: 'Dashboard' }, { t: 't', v: '(e: PageView):\n' },
      { t: 't',   v: '    ' }, { t: 'kw', v: 'return' }, { t: 't', v: ' e.' }, { t: 'fn', v: 'agg' }, { t: 't', v: '(\n' },
      { t: 't',   v: '        views_total        = bv.' }, { t: 'fn', v: 'count' }, { t: 't', v: '(),\n' },
      { t: 't',   v: '        views_24h          = bv.' }, { t: 'fn', v: 'count' }, { t: 't', v: '(window=' }, { t: 'str', v: '"24h"' }, { t: 't', v: '),\n' },
      { t: 't',   v: '        distinct_cats_7d   = bv.' }, { t: 'fn', v: 'distinct' }, { t: 't', v: '(e.category, window=' }, { t: 'str', v: '"7d"' }, { t: 't', v: '),\n' },
      { t: 't',   v: '        last_seen          = bv.' }, { t: 'fn', v: 'latest' }, { t: 't', v: '(e.ts),\n' },
      { t: 't',   v: '    )' },
    ];

    const CodeBlock = ({ tokens, fontSize = 13 }) => (
      <pre className="code-well" style={{ fontSize, padding: '20px 22px', lineHeight: 1.7, margin: 0 }}>
        {tokens.map((tok, i) => (
          tok.t === 't' ? <span key={i}>{tok.v}</span> : <span key={i} className={tok.t}>{tok.v}</span>
        ))}
      </pre>
    );

    const RegisterButton = ({ label, status, onRegister, disabled }) => {
      const pill = status === 'idle'
        ? <span className="pill idle"><span className="dot"/>not registered</span>
        : status === 'registering'
        ? <span className="pill reg"><span className="dot"/>registering…</span>
        : <span className="pill done"><Icon name="check" size={12} stroke={2.5}/>registered</span>;
      const canClick = status === 'idle' && !disabled;
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
          <Button variant="primary" size="md" onClick={onRegister} disabled={!canClick}
                  style={{ opacity: canClick ? 1 : 0.55, cursor: canClick ? 'pointer' : 'default' }}
                  icon={status === 'done' ? <Icon name="check" size={14} stroke={2.5}/> : <Icon name="arrow" size={14}/>}>
            {label}
          </Button>
          {pill}
        </div>
      );
    };

    // ---------------- Query panel (live curl + JSON response) ---------------- //

    // Renders a curl POST request body and its JSON response based on the
    // actual rows in state. Teaches: your app calls POST /batch/<Table>
    // with the user_ids visible on screen, gets back the metrics, renders.
    const QueryPanel = ({ table, userIds, rowsList, metricKeys, empty }) => {
      const ids = userIds.slice(0, 3);
      const curl = `curl -X POST https://your-beava/batch/${table} \\
  -H 'Content-Type: application/json' \\
  -d '${JSON.stringify(ids)}'`;

      // User-triggered query: the response only appears after "Run query"
      // is clicked. Mirrors a real curl: you type it, you run it, you see
      // the response. Re-run updates the response to the live state.
      const [state, setState]   = React.useState('idle');   // 'idle' | 'running' | 'done'
      const [latency, setLat]   = React.useState(null);
      const [snapshot, setSnap] = React.useState(null);     // frozen response JSON

      // When the underlying ids change (e.g. events get cleared), reset.
      React.useEffect(() => { setState('idle'); setSnap(null); }, [empty, table]);

      const buildResponse = () => {
        const rowByUid = new Map(rowsList);
        const obj = {};
        for (const uid of ids) {
          const r = rowByUid.get(uid);
          if (!r) { obj[uid] = null; continue; }
          const o = {};
          for (const k of metricKeys) {
            if (k === 'views_total')           o.views_total = r.views_total;
            else if (k === 'views_24h')        o.views_24h   = r.views_24h;
            else if (k === 'distinct_cats_7d') o.distinct_cats_7d = r.cats.size;
            else if (k === 'last_seen')        o.last_seen   = new Date(r.lastTsMs).toISOString().replace(/\.\d{3}Z$/, 'Z');
          }
          obj[uid] = o;
        }
        return JSON.stringify(obj, null, 2);
      };

      const runQuery = () => {
        if (empty || state === 'running') return;
        setState('running');
        setSnap(null);
        // Simulate a realistic sub-5ms fetch with a small UI delay so the
        // user can see the "running" state briefly.
        const simLatencyMs = +(1.2 + Math.random() * 2.6).toFixed(2);
        setTimeout(() => {
          setLat(simLatencyMs);
          setSnap(buildResponse());
          setState('done');
        }, 260);
      };

      return (
        <div style={{ marginTop: 22 }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 12, flexWrap: 'wrap', marginBottom: 10,
          }}>
            <div style={{
              fontFamily: 'var(--font-mono)', fontSize: 11,
              color: 'var(--fg3)', letterSpacing: '0.04em',
              textTransform: 'lowercase',
            }}>
              ↓ how your app reads it: <span style={{ color: 'var(--accent)', fontWeight: 700 }}>POST /batch/{table}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              {state === 'done' && latency != null && (
                <span className="pill done" style={{ fontFamily: 'var(--font-mono)' }}>
                  <Icon name="check" size={11} stroke={2.5}/>200 OK · {latency}ms
                </span>
              )}
              {state === 'running' && (
                <span className="pill reg"><span className="dot"/>running…</span>
              )}
              <button className="composer-random" onClick={runQuery} disabled={empty || state === 'running'}
                      style={{ padding: '9px 14px', fontSize: 13 }}>
                <Icon name="terminal" size={13} stroke={2}/>
                {state === 'done' ? 'Re-run query' : 'Run query'}
              </button>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }} className="query-grid">
            <div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--fg3)', letterSpacing: '0.04em', textTransform: 'lowercase', marginBottom: 8 }}>1. request — copy-paste this into your terminal</div>
              <div style={{ position: 'relative' }}>
                <pre className="code-well" style={{ fontSize: 12.5, padding: '18px 20px', lineHeight: 1.65, margin: 0, whiteSpace: 'pre', minHeight: 140 }}>
                  <span className="cmt">$ </span>curl -X POST https://your-beava/batch/<span className="fn">{table}</span> \{'\n'}
                  {'    '}-H <span className="str">'Content-Type: application/json'</span> \{'\n'}
                  {'    '}-d <span className="str">'{JSON.stringify(ids)}'</span>
                </pre>
                <CopyBtn text={curl}/>
              </div>
            </div>
            <div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--fg3)', letterSpacing: '0.04em', textTransform: 'lowercase', marginBottom: 8 }}>
                2. response
                {empty       && <span style={{ color: 'var(--fg3)' }}> (push events first)</span>}
                {!empty && state === 'idle'    && <span style={{ color: 'var(--accent)' }}> — click Run query →</span>}
                {!empty && state === 'running' && <span style={{ color: 'var(--accent)' }}> — fetching…</span>}
                {!empty && state === 'done'    && <span style={{ color: 'var(--beava-success)' }}> — live, {latency}ms</span>}
              </div>
              <div style={{ position: 'relative' }}>
                <pre className="code-well" style={{ fontSize: 12.5, padding: '18px 20px', lineHeight: 1.65, margin: 0, whiteSpace: 'pre', minHeight: 140 }}>
                  {empty
                    ? <span style={{ color: 'var(--fg3)', fontStyle: 'italic' }}># push an event above, then run this query.</span>
                    : state === 'idle'
                    ? <span style={{ color: 'var(--fg3)', fontStyle: 'italic' }}># (no response yet — click "Run query" above to fetch from beava)</span>
                    : state === 'running'
                    ? <span style={{ color: 'var(--fg3)' }}>...</span>
                    : snapshot}
                </pre>
                {state === 'done' && snapshot && <CopyBtn text={snapshot}/>}
              </div>
            </div>
          </div>
          <div style={{
            fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)',
            marginTop: 10, textWrap: 'pretty', maxWidth: 760,
          }}>
            {empty
              ? `Your frontend passes the user_ids currently on screen. beava returns every metric for every id, atomically. This is what powers the dashboard above.`
              : state === 'done'
              ? `Snapshot taken at ${latency}ms — these are the exact values from the live state at the moment you ran the query. Push more events, click Re-run, and the snapshot updates. Production beava holds P99 <5ms at 1000 user_ids per request on a single core.`
              : `You run the query — one POST, one JSON blob back. No streaming, no pub/sub, no SSE. Pass the user_ids in view, render the cards, done.`}
          </div>
        </div>
      );
    };

    // ---------------- Event composer (shared by Part 2 and Part 3) ---------------- //

    const EventComposer = ({
      scopeTable, scopeHint, disabled, disabledReason,
      onRandom, user, setUser, path, setPath, onCraft,
    }) => (
      <div className="composer-card" style={disabled ? { opacity: 0.55 } : null}>
        <div className="composer-hd">
          <div className="composer-title">
            Push event
            <span className="tag">→ @bv.table {scopeTable}</span>
          </div>
          <button className="composer-random" onClick={onRandom} disabled={disabled}>
            <Icon name="zap" size={15} stroke={2}/>
            Send a random event
          </button>
        </div>
        <div className="composer-divider">or craft your own</div>
        <div className="ch1-compose" style={{ pointerEvents: disabled ? 'none' : 'auto' }}>
          <div>
            <span className="ch1-label">user_id</span>
            <input className="ch1-input" value={user} onChange={e => setUser(e.target.value)} placeholder="u_7f3c" disabled={disabled}/>
          </div>
          <div>
            <span className="ch1-label">path</span>
            <input className="ch1-input" value={path} onChange={e => setPath(e.target.value)} placeholder="/product/clamp" disabled={disabled}/>
          </div>
          <div>
            <span className="ch1-label">category (derived)</span>
            <input className="ch1-input" value={CATEGORY_OF(path)} readOnly
                   style={{ background: 'var(--bg-inset)', color: 'var(--fg3)' }}/>
          </div>
          <Button variant="secondary" size="md" onClick={onCraft}
                  disabled={disabled}
                  style={{ cursor: disabled ? 'not-allowed' : 'pointer' }}
                  icon={<Icon name="arrow" size={14}/>}>
            Push
          </Button>
        </div>
        {disabled && disabledReason && (
          <div style={{
            marginTop: 14,
            fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <Icon name="arrow" size={12}/> {disabledReason}
          </div>
        )}
      </div>
    );

    // ---------------- UI components for the dashboard ---------------- //

    const StatTile = ({ label, value }) => (
      <div className="stat-tile">
        <div className="lbl">{label}</div>
        <div className="val">{value}</div>
      </div>
    );

    const Avatar = ({ uid }) => {
      const hue = hueFor(uid);
      return (
        <div className="user-avatar" style={{ background: `hsl(${hue}, 52%, 48%)` }}>
          {initialsFor(uid)}
        </div>
      );
    };

    // Spark — renders SPARK_BUCKETS-wide activity. `buckets` is an array of
    // counts. The most recent bucket gets the "hot" class (full opacity).
    const Sparkline = ({ buckets }) => {
      const max = Math.max(1, ...buckets);
      return (
        <div className="spark">
          {buckets.map((b, i) => {
            const pct = Math.round((b / max) * 100);
            const h = b > 0 ? Math.max(4, pct) : 2;
            const hot = i === buckets.length - 1 && b > 0;
            return <div key={i} className={`spark-bar${hot ? ' hot' : ''}`} style={{ height: `${h}%` }}/>;
          })}
        </div>
      );
    };

    const agoString = (tsMs) => {
      if (!tsMs) return '—';
      const d = Math.max(0, Date.now() - tsMs);
      if (d < 1500)     return 'just now';
      if (d < 60_000)   return `${Math.floor(d / 1000)}s ago`;
      if (d < 3_600_000) return `${Math.floor(d / 60_000)}m ago`;
      return `${Math.floor(d / 3_600_000)}h ago`;
    };

    const UserCard = ({ uid, row, maxViews24h, nowTick, flash }) => {
      const pct = maxViews24h > 0 ? Math.min(100, (row.views_24h / maxViews24h) * 100) : 0;
      const cats = Array.from(row.cats);
      return (
        <div className={`user-card${flash ? ' flash' : ''}`}>
          <div className="user-card-hd">
            <Avatar uid={uid}/>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 1, flex: 1, minWidth: 0 }}>
              <div className="user-id">{uid}</div>
              <div className="user-meta">last seen {agoString(row.lastTsMs)}</div>
            </div>
          </div>

          <div className="user-big">
            <span className="num">{row.views_total}</span>
            <span className="sub">views_total</span>
          </div>

          <div className="bar">
            <div className="bar-hd"><span>views_24h</span><span className="bar-val">{row.views_24h}</span></div>
            <div className="bar-track"><div className="bar-fill" style={{ width: `${pct}%` }}/></div>
          </div>

          <div>
            <div className="bar-hd" style={{ marginBottom: 6 }}>
              <span>distinct_cats_7d</span>
              <span className="bar-val">{cats.length}</span>
            </div>
            <div className="cat-pills">
              {cats.slice(0, 6).map(c => <span key={c} className="cat-pill">{c}</span>)}
              {cats.length > 6 && <span className="cat-count">+{cats.length - 6}</span>}
            </div>
          </div>

          <div>
            <div className="bar-hd" style={{ marginBottom: 4 }}>
              <span>activity (recent)</span>
              <span className="bar-val">{row.buckets.reduce((a,b) => a+b, 0)}</span>
            </div>
            <Sparkline buckets={row.buckets}/>
          </div>
        </div>
      );
    };

    // ---------------- Interactive tutorial (the core state machine) ---------------- //

    const Tutorial = () => {
      const [stage, setStage]         = React.useState('basic');      // 'basic' | 'dashboard'
      const [basicStatus, setBasic]   = React.useState('idle');
      const [dashStatus, setDash]     = React.useState('idle');

      const [events, setEvents]       = React.useState([]);           // last N
      const [rows, setRows]           = React.useState({});           // uid -> row
      const [flashUid, setFlashUid]   = React.useState(null);
      const [nowTick, setNowTick]     = React.useState(Date.now());

      const [formUser, setFormUser]   = React.useState(USERS[0]);
      const [formPath, setFormPath]   = React.useState(PATHS[1]);

      const idRef         = React.useRef(1);
      const firstBurstRef = React.useRef(true);

      // tick to keep "last seen Xs ago" fresh
      React.useEffect(() => {
        const id = setInterval(() => setNowTick(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);

      const register = (which) => {
        if (which === 'basic') {
          setBasic('registering');
          setTimeout(() => setBasic('done'), 900);
        } else {
          setDash('registering');
          setTimeout(() => {
            setDash('done');
            setStage('dashboard');
          }, 900);
        }
      };

      const applyEvent = (ev) => {
        // push to event log
        setEvents(prev => [ev, ...prev].slice(0, 8));

        // update rows
        setRows(prev => {
          const cur = prev[ev.user_id] || {
            views_total: 0, views_24h: 0,
            cats: new Set(), lastTsMs: 0,
            buckets: Array(SPARK_BUCKETS).fill(0),
          };
          const cats = new Set(cur.cats); cats.add(ev.category);
          const buckets = cur.buckets.slice();
          buckets[buckets.length - 1] = buckets[buckets.length - 1] + 1;
          return {
            ...prev,
            [ev.user_id]: {
              views_total: cur.views_total + 1,
              views_24h:   cur.views_24h + 1,
              cats,
              lastTsMs:    ev.tsMs,
              buckets,
            },
          };
        });

        // flash the card
        setFlashUid(ev.user_id);
        setTimeout(() => setFlashUid(u => u === ev.user_id ? null : u), 900);
      };

      // Every 3s, shift spark buckets left so the "hot" slot is always rightmost.
      React.useEffect(() => {
        const id = setInterval(() => {
          setRows(prev => {
            const next = {};
            for (const [uid, r] of Object.entries(prev)) {
              const b = r.buckets.slice(1); b.push(0);
              next[uid] = { ...r, buckets: b };
            }
            return next;
          });
        }, 3000);
        return () => clearInterval(id);
      }, []);

      const makeEvent = (user, path) => ({
        id: idRef.current++,
        user_id: user,
        path,
        category: CATEGORY_OF(path),
        tsMs: Date.now(),
      });

      const sendRandom = () => {
        if (basicStatus !== 'done') return;
        const burst = firstBurstRef.current ? 5 : 1;
        firstBurstRef.current = false;
        let i = 0;
        const fire = () => {
          const u = USERS[Math.floor(Math.random() * USERS.length)];
          const p = PATHS[Math.floor(Math.random() * PATHS.length)];
          applyEvent(makeEvent(u, p));
          i++;
          if (i < burst) setTimeout(fire, 240);
        };
        fire();
      };

      const sendCrafted = () => {
        if (basicStatus !== 'done') return;
        if (!formUser.trim() || !formPath.trim()) return;
        applyEvent(makeEvent(formUser.trim(), formPath.trim()));
      };

      // Derived: sorted rows for the dashboard grid, aggregate stats strip.
      const rowsList = React.useMemo(() => (
        Object.entries(rows)
          .sort((a, b) => b[1].lastTsMs - a[1].lastTsMs)
      ), [rows]);

      const maxViews24h = React.useMemo(() => (
        rowsList.reduce((m, [, r]) => Math.max(m, r.views_24h), 0)
      ), [rowsList]);

      const totalEvents = rowsList.reduce((s, [, r]) => s + r.views_total, 0);
      const allCats = new Set();
      for (const [, r] of rowsList) for (const c of r.cats) allCats.add(c);

      return (
        <>
          {/* ----- Part 2: first pipeline + event composer ----- */}
          <section style={{ padding: '48px 28px 16px' }}>
            <div style={{ maxWidth: 1040, margin: '0 auto' }}>
              <Eyebrow style={{ marginBottom: 12 }}>Part 2 · Your first pipeline</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(26px, 3.4vw, 36px)', lineHeight: 1.15, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 16px' }}>
                Three lines. One table. Live.
              </h2>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.65, color: 'var(--fg2)', margin: '0 0 22px', maxWidth: 720, textWrap: 'pretty' }}>
                Declare a <code style={{ fontFamily: 'var(--font-mono)', fontSize: 13.5, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>PageView</code> event shape and a <code style={{ fontFamily: 'var(--font-mono)', fontSize: 13.5, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>UserStats</code> table keyed by user. Every event updates exactly one row, atomically. Register the pipeline, then send an event.
              </p>

              <CodeBlock tokens={pipelineBasic}/>

              <div style={{ marginTop: 20, marginBottom: 10 }}>
                <RegisterButton label="Register this pipeline" status={basicStatus} onRegister={() => register('basic')}/>
              </div>

              <EventComposer
                scopeTable="UserStats"
                disabled={basicStatus !== 'done'}
                disabledReason="Register the pipeline above, then push an event."
                onRandom={sendRandom}
                user={formUser} setUser={setFormUser}
                path={formPath} setPath={setFormPath}
                onCraft={sendCrafted}/>

              {/* Part 2 mini-result: simple per-user views_total, matches
                  the one-metric pipeline exactly. */}
              <div style={{
                fontFamily: 'var(--font-mono)', fontSize: 11,
                color: 'var(--fg3)', letterSpacing: '0.04em',
                textTransform: 'lowercase', marginTop: 4,
              }}>
                ↓ live from GET /batch/<span style={{ color: 'var(--accent)', fontWeight: 700 }}>UserStats</span>
              </div>

              <div className="mini-result">
                <div className="evt-ticker" style={{ maxHeight: 260 }}>
                  <div className="evt-ticker-hd">
                    <span>recent events</span>
                    <span style={{ color: events.length > 0 ? 'var(--accent)' : 'var(--fg3)' }}>
                      {events.length > 0 ? 'live' : 'idle'}
                    </span>
                  </div>
                  {events.length === 0 && (
                    <div className="evt-empty">
                      {basicStatus === 'done' ? 'push an event ↑' : 'register the pipeline first.'}
                    </div>
                  )}
                  {events.slice(0, 4).map(e => (
                    <div className="evt-row" key={e.id}>
                      <div><span className="u">{e.user_id}</span> <span className="p">{e.path}</span></div>
                      <div className="t">{agoString(e.tsMs)}</div>
                    </div>
                  ))}
                </div>

                <div className="mini-rows">
                  {rowsList.length === 0 && (
                    <div className="mini-empty">
                      UserStats is empty. Each event inserts or updates exactly one row, keyed by <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12, background: 'var(--bg-inset)', padding: '1px 5px', borderRadius: 4 }}>user_id</code>.
                    </div>
                  )}
                  {rowsList.map(([uid, r]) => (
                    <div key={uid} className={`mini-row${flashUid === uid ? ' flash' : ''}`}>
                      <span className="mini-uid">{uid}</span>
                      <span>
                        <span className="mini-val">{r.views_total}</span>
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', marginLeft: 6, letterSpacing: '0.02em' }}>views_total</span>
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              <QueryPanel
                table="UserStats"
                userIds={rowsList.map(([uid]) => uid)}
                rowsList={rowsList}
                metricKeys={['views_total']}
                empty={rowsList.length === 0}/>
            </div>
          </section>

          {/* ----- Part 3: dashboard pipeline + LIVE UI ----- */}
          <section style={{ padding: '24px 28px 40px' }}>
            <div style={{ maxWidth: 1040, margin: '0 auto' }}>
              <Eyebrow style={{ marginBottom: 12 }}>Part 3 · Build the dashboard</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(26px, 3.4vw, 36px)', lineHeight: 1.15, letterSpacing: '-0.01em', color: 'var(--fg1)', margin: '0 0 16px' }}>
                Now the real thing: four metrics, rendered live.
              </h2>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.65, color: 'var(--fg2)', margin: '0 0 22px', maxWidth: 720, textWrap: 'pretty' }}>
                Same stream, richer table. Lifetime total views, rolling 24h views, distinct categories over the past 7 days, and the latest timestamp per user. Every push updates every metric atomically. Register to replace your first pipeline, then watch the dashboard populate below.
              </p>

              <CodeBlock tokens={pipelineDashboard}/>

              <div style={{ marginTop: 20, marginBottom: 28, display: 'flex', flexDirection: 'column', gap: 8 }}>
                <RegisterButton
                  label="Register the dashboard pipeline"
                  status={dashStatus}
                  disabled={basicStatus !== 'done'}
                  onRegister={() => { if (basicStatus === 'done') register('dashboard'); }}/>
                {basicStatus !== 'done' && dashStatus === 'idle' && (
                  <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--accent)' }}>↑</span>
                    requires Part 2 to be registered first
                  </div>
                )}
              </div>

              <EventComposer
                scopeTable="Dashboard"
                disabled={stage !== 'dashboard'}
                disabledReason="Register the dashboard pipeline above to unlock the 4-metric push path."
                onRandom={sendRandom}
                user={formUser} setUser={setFormUser}
                path={formPath} setPath={setFormPath}
                onCraft={sendCrafted}/>

              {/* ---------- LIVE DASHBOARD UI ---------- */}

              <div style={{ marginBottom: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', letterSpacing: '0.04em', textTransform: 'lowercase' }}>
                  ↓ live from GET /batch/<span style={{ color: 'var(--accent)', fontWeight: 700 }}>
                    {stage === 'dashboard' ? 'Dashboard' : 'UserStats'}
                  </span>
                </div>
                <div className="pipeline-state-badge">
                  <span>pipeline:</span>
                  <span style={{ color: stage === 'dashboard' ? 'var(--beava-success)' : 'var(--fg1)', fontWeight: 700 }}>
                    {stage === 'dashboard' ? 'Dashboard (4 metrics)' : 'UserStats (views_total only)'}
                  </span>
                </div>
              </div>

              <div className="ch1-stats">
                <StatTile label="users seen" value={rowsList.length}/>
                <StatTile label="events ingested" value={totalEvents}/>
                <StatTile label="distinct categories"
                          value={stage === 'dashboard' ? allCats.size : '—'}/>
                <StatTile label="active pipeline"
                          value={stage === 'dashboard' ? '4 metrics' : '1 metric'}/>
              </div>

              <div className="ch1-dash">
                <div className="evt-ticker">
                  <div className="evt-ticker-hd">
                    <span>recent events</span>
                    <span style={{ color: 'var(--accent)' }}>{events.length > 0 ? 'live' : 'idle'}</span>
                  </div>
                  {events.length === 0 && (
                    <div className="evt-empty">
                      {basicStatus === 'done' ? 'click "Send a random event" →' : 'register the pipeline, then send an event.'}
                    </div>
                  )}
                  {events.map(e => (
                    <div className="evt-row" key={e.id}>
                      <div><span className="u">{e.user_id}</span> <span className="p">{e.path}</span></div>
                      <div className="t">{agoString(e.tsMs)} · category={e.category}</div>
                    </div>
                  ))}
                </div>

                <div className="ch1-cards">
                  {stage !== 'dashboard' && (
                    <div className="empty-state">
                      Dashboard table doesn't exist yet. Register the pipeline above to unlock the 4-metric view. Events you pushed in Part 2 are already in the stream, ready to replay.
                    </div>
                  )}
                  {stage === 'dashboard' && rowsList.length === 0 && (
                    <div className="empty-state">
                      Dashboard is empty. Push an event and watch a card appear for that user, with views, categories, and activity filling in live.
                    </div>
                  )}
                  {stage === 'dashboard' && rowsList.map(([uid, r]) => (
                    <UserCard key={uid} uid={uid} row={r} maxViews24h={maxViews24h}
                              nowTick={nowTick} flash={flashUid === uid}/>
                  ))}
                </div>
              </div>

              {stage === 'dashboard' && (
                <QueryPanel
                  table="Dashboard"
                  userIds={rowsList.map(([uid]) => uid)}
                  rowsList={rowsList}
                  metricKeys={['views_total', 'views_24h', 'distinct_cats_7d', 'last_seen']}
                  empty={rowsList.length === 0}/>
              )}

              {stage === 'dashboard' && rowsList.length >= 3 && (
                <Callout eyebrow="YOU BUILT THIS" mascot="pose-2" tint="warm" style={{ marginTop: 32 }}>
                  That grid above? That's live beava state rendered as a real dashboard. Every event you push updates a single user's card, atomically. The real server does the same thing at ~3M events/sec/core, and your UI would call <code style={{ fontFamily: 'var(--font-mono)', fontSize: 14 }}>POST /batch/Dashboard</code> with the user_ids on its screen.
                </Callout>
              )}
            </div>
          </section>

          {/* ----- Next steps ----- */}
          <section style={{ padding: '24px 28px 96px' }}>
            <div style={{ maxWidth: 1040, margin: '0 auto' }}>
              <Eyebrow style={{ marginBottom: 12 }}>Next</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(22px, 2.8vw, 28px)', lineHeight: 1.2, color: 'var(--fg1)', margin: '0 0 20px' }}>
                Pick a recipe and build for real.
              </h2>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                <Button variant="primary" size="md" href="/guide/" icon={<Icon name="arrow" size={14}/>}>
                  Back to the guidebook
                </Button>
                <Button variant="secondary" size="md" href="/guide/recipes/fraud/" iconLeft={<Icon name="book" size={14}/>}>
                  Read the fraud recipe
                </Button>
                <Button variant="ghost" size="md" href="https://github.com/beava-dev/beava" iconLeft={<Icon name="github" size={14}/>}>
                  Star on GitHub
                </Button>
              </div>
            </div>
          </section>
        </>
      );
    };

    // ---------------- App ---------------- //

    const App = () => (
      <>
        <Banner id="cloud-waitlist-v1">
          beava cloud · managed from $50/mo · self-host is always free · join the waitlist
        </Banner>
        <Nav active="guide"/>
        <Hero/>
        <MeetBeava/>
        <Tutorial/>
        <Footer/>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
