            How TikTok's For You feed actually works
          </h1>

            At the heart of every personalization system is one ugly little data structure. In 14 minutes and 3 curl commands, you'll have one.
          </p>
          <div style={{ marginTop: 28, display: 'flex', gap: 14, alignItems: 'center' }}>
            <div style={{ width: 44, height: 44, borderRadius: 999, background: '#fff', border: '1px solid var(--border)', color: 'var(--accent)', display: 'grid', placeItems: 'center', fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 15 }}>SR</div>

    const Article = () => (
      <article className="prose" style={{ padding: '56px 28px 40px' }}>
        <p style={{ fontFamily: 'var(--font-serif)', fontSize: 22, lineHeight: 1.55, color: 'var(--fg1)', margin: '0 0 28px', fontStyle: 'italic' }}>
          Here's the secret: nobody at TikTok knows why you liked that cat video. The algorithm doesn't either. What the algorithm <em>does</em> know is that 2,400 people whose watch histories look a lot like yours also liked it. That's the whole trick.
        </p>

        <p>The mechanism behind that sentence is, in engineering terms, almost embarrassingly simple. You keep, for every user, a rolling count of which tags they've engaged with in the last hour, day, and week. You keep, for every video, a rolling count of which <em>kinds of users</em> have engaged with it. At serve time, you do some cheap dot-product-ish math between those two vectors, sort, and send the top 10.</p>

        <p>Everything else — the "AI", the "graph", the mystical language model nobody at TikTok will confirm exists — is a refinement. The load-bearing primitive is <strong>rolling counters, keyed by entity, aggregated at multiple time windows</strong>.</p>

        <blockquote>
          <p>At the heart of every "AI feed" you've ever seen is one ugly little data structure: a map from (user_id, tag_id) to a short list of counts at different windows.</p>
        </blockquote>

        <h2>The toy version</h2>

        <p>Let's build it. You run one instance of beava locally:</p>

        <pre className="code-well">
<span className="cmt">$ </span><span style={{color:'var(--fg1)'}}>brew install beava &amp;&amp; beava serve</span>{'\n'}
<span className="cmt"># listening on :6400 · 14 MB binary · 62ms cold start</span>
        </pre>

        <p>You define two streams — one for watches, one for the items themselves — and a single rolling-count feature keyed on the pair <code>(user_id, tag_id)</code>:</p>

        <pre className="code-well">
<span className="kw">import</span> beava <span className="kw">as</span> bv{'\n'}{'\n'}
<span className="fn">@bv.stream</span>{'\n'}
<span className="kw">class</span> <span className="ty">Watch</span>:{'\n'}
{'    '}user_id: <span className="ty">str</span>{'\n'}
{'    '}video_id: <span className="ty">str</span>{'\n'}
{'    '}watch_seconds: <span className="ty">float</span>{'\n'}{'\n'}
<span className="fn">@bv.table</span>(key=[<span className="str">"user_id"</span>, <span className="str">"tag"</span>]){'\n'}
<span className="kw">def</span> <span className="fn">UserTagAffinity</span>(w: Watch):{'\n'}
{'    '}<span className="kw">for</span> tag <span className="kw">in</span> tags_of(w.video_id):{'\n'}
{'        '}<span className="kw">yield</span> &#123;<span className="str">"user_id"</span>: w.user_id, <span className="str">"tag"</span>: tag&#125;.<span className="fn">agg</span>({'\n'}
{'            '}weight_1h  = bv.<span className="fn">sum</span>(w.watch_seconds, window=<span className="str">"1h"</span>),{'\n'}
{'            '}weight_24h = bv.<span className="fn">sum</span>(w.watch_seconds, window=<span className="str">"24h"</span>),{'\n'}
{'            '}weight_7d  = bv.<span className="fn">sum</span>(w.watch_seconds, window=<span className="str">"7d"</span>),{'\n'}
{'        '}){'\n'}
        </pre>

        <p>That's ~12 lines. It is, up to scaling and spectacular tuning, the same data structure that runs the feed on a billion phones.</p>

        <h2>Why this is the thing</h2>

        <p>The interesting property of this representation isn't what it computes — anyone can sum numbers. It's what you can <em>ask</em> of it, cheaply, at serve time. "Give me every tag this user has watched more than 60 seconds of in the last hour." That's a range scan over one key prefix. A Postgres index could do it in principle, but Postgres would also try to transactionally commit every watch event, and your feed would be powered by a database on fire.</p>

        <p>beava's job is to hold exactly this: a pile of small counts, keyed however you want, queried at microsecond latency. It is not a database. It is not a queue. It is a specialized cache for the shape of question personalization systems ask.</p>

        <div className="callout tip">
          <div className="callout-icon">💡</div>
          <div>
            <div className="callout-title">You don't need a graph database</div>
            <p>Every few years a well-funded startup arrives to tell you your feed needs a graph database. It does not. A graph database is what you reach for when the <em>structure</em> of the relationship matters — friend-of-a-friend, shortest path, cycles. Feeds don't care about any of that. They care about rolling counts.</p>
          </div>
        </div>

        <h2>What the LLMs are for</h2>

        <p>This will surprise some people: the language models are not the recommender. They're the <em>tagger</em>. An LLM (or more commonly, a smaller model trained for the task) watches a video and produces ~20 tags — "bearded man", "woodworking", "ASMR", "plane", "shavings", "satisfying". Those tags go into the stream. The recommender is the boring, old, unreasonably effective thing above.</p>

        <p>This matters for implementation. The LLM runs <em>asynchronously</em>, at video-upload time, and writes its output as an event. The hot path — the thing that has to answer "what video next?" in 40ms for a billion users — never calls an LLM. It does dot products against a rolling-counter table.</p>

        <h2>The part nobody mentions</h2>

        <p>Here is the thing that every talk about recommender systems glosses over: <strong>this breaks in interesting ways</strong>. A cold user has no counts. A cold video has no engagement. A viral video has so much engagement that the rolling counter saturates and stops being informative. Every real system spends most of its complexity budget handling these edge cases.</p>

        <p>beava has no opinions about any of that. It gives you the primitive — "here is the counter, fast, at any window" — and leaves the policy to you. This is a feature: you can change your cold-start behavior without waking up a streaming platform's on-call engineer.</p>

        <div className="callout warn">
          <div className="callout-icon">⚠</div>
          <div>
            <div className="callout-title">What beava will <em>not</em> do for you</div>
            <p>It will not debounce the same watch being submitted twice. It will not join your event stream to your users table. It will not decide that 60 seconds of passive watching means less than 20 seconds of active replay. Those are decisions. beava is for the mechanical part underneath the decisions.</p>
          </div>
        </div>

        <h2>Try it — 3 curl commands</h2>

        <p>Assuming you ran <code>beava serve</code> above and wrote that pipeline to <code>pipeline.py</code>, register it and push some events:</p>

        <pre className="code-well">
<span className="cmt"># 1. Register the pipeline</span>{'\n'}
<span className="kw">curl</span> -X POST localhost:6400/pipelines -d @pipeline.py{'\n'}{'\n'}
<span className="cmt"># 2. Send a watch</span>{'\n'}
<span className="kw">curl</span> -X POST localhost:6400/events/Watch \<br/>
{'  '}-H <span className="str">'content-type: application/json'</span> \<br/>
{'  '}-d <span className="str">{`'{"user_id":"u1","video_id":"v_abc","watch_seconds":42}'`}</span>{'\n'}{'\n'}
<span className="cmt"># 3. Ask what this user cares about in the last hour</span>{'\n'}
<span className="kw">curl</span> localhost:6400/features/UserTagAffinity?user_id=u1{'\n'}
<span className="cmt">{`# => [{"tag":"woodworking","weight_1h":42.0,...}, ...]`}</span>
        </pre>

        <p>That's it. That's the whole For You feed, minus ten thousand engineers refining the edge cases.</p>

        <p>Every chapter is a small, complete, working thing you can run on your laptop. We believe the best way to learn a primitive is to use it for something ridiculous.</p>
