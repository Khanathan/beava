            <h1>RFC-007 — Event log retention</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Draft</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">Persist raw events past the in-memory window so a fresh beava instance can replay the log to reconstruct its state — instead of streaming a snapshot off a peer or asking the application to backfill.</p>

            <h2 id="motivation">Motivation</h2>
            <p>In v0 beava persists aggregates, not events. WAL covers durability inside a process; once aggregates are folded, the original events are gone. This is great for memory and for the simple mental model — but it means a fresh node has nothing to replay. To bring up a new instance you either copy a snapshot from a peer (if one exists) or have the application replay from its own source-of-truth (Kafka, S3, the OLTP DB).</p>
            <p>Event log retention closes that loop: beava itself keeps a bounded raw-event log, and a new instance bootstraps by replaying it. Same binary, no external dependency, deterministic reconstruction.</p>
            <p>This is the operational counterpart to <a href="/docs/community/rfcs/rfc-005-event-log-query-replay/">RFC-005 — Event-log query and replay</a>: RFC-005 lets you query and replay subsets for backfill / A/B feature work; RFC-007 is the storage layer that makes both possible. The two land together or RFC-005 stays theoretical.</p>

            <div className="rfc-warn">
              <strong>Scope note.</strong> This RFC is purely about the storage and replay-on-bootstrap mechanics. Out-of-order tolerance — re-aggregating when an event arrives late — is covered separately by <a href="/docs/community/rfcs/rfc-004-out-of-order-events/">RFC-004</a>. The two don't depend on each other; retention can land standalone.
            </div>

            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>Storage tier.</strong> Local disk only? Spill to S3 / object storage like RFC-001? Object storage is cheaper for long retention but adds replay latency. Probably tier-1 (local disk) for v0.x, tier-2 (S3) deferred.</li>
              <li><strong>Retention windows.</strong> 24h? 7d? 90d? Per-event-type retention, so high-volume telemetry can be 24h while low-volume billing events are 90d?</li>
              <li><strong>Format.</strong> Append-only event log alongside the WAL, or extend the WAL with a "retain raw" flag per event? The latter is simpler operationally; the former is friendlier to compaction and tiering.</li>
              <li><strong>Replay throughput.</strong> A new instance replaying 7 days of events at apply-time speeds — is that hours or days? Determines how aggressive the fast-replay path needs to be (batch-folding, parallel rebuild, etc.).</li>
              <li><strong>Snapshot interaction.</strong> When does a new node replay from log vs hydrate from a snapshot vs both? Snapshot + log-tail is the lowest-RTO option; pure log replay is the simplest.</li>
              <li><strong>Compaction.</strong> Retention bounds force eviction. Per-event-type LRU? Per-stream rolling window? Application-driven?</li>
              <li><strong>Replay isolation.</strong> Does the replay run in the same process as live serving (contends for the data plane), in a sidecar, or as a one-shot CLI tool? In-process is simplest; the sidecar is more honest about resource use.</li>
            </ul>
