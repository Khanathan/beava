            <h1>RFC-004 — Out-of-order events</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Draft</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">Tolerate events that arrive out of order or late, within a bounded window. Revises v0's processing-time-only default — windowed aggregations would honor an event-time field on the wire and reorder within a tolerance budget.</p>

            <h2 id="motivation">Motivation</h2>
            <p>v0 buckets every event by server-side arrival time. That's clean and predictable, but it means producers with real latency — mobile clients on flaky networks, batch sources, services behind a queue — see their windowed features land in the wrong bucket. A click that "happened" at 12:00 but arrives at 12:05 lands in the 12:05 bucket, and any windowed aggregation reflects the lag rather than the underlying user behavior.</p>
            <p>The fix is event-time semantics with bounded tolerance: events carry their original timestamp on the wire; the engine reorders within a configurable lateness budget; windowed aggregations stay correct as long as events arrive within the budget. Past the budget the event is dropped or routed to a late-event sink.</p>

            <div className="rfc-warn">
              <strong>Tension with the v0 default.</strong> v0 ships with processing-time only — no event-time, no watermarks, no lateness handling. Out-of-order support means revising that default: adding an event-time field on the wire, picking a watermark strategy, deciding what happens past the bound. This RFC is the place to debate the shape.
            </div>

            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>Tolerance bound.</strong> Bounded buffer (re-aggregate within N seconds/minutes) trades memory for tolerance. Unbounded is incompatible with our memory story. What's the default? 60s? 5m? Configurable per-event-type?</li>
              <li><strong>Event-time vs ingestion-time.</strong> Both as fields, or one as the canonical timestamp? Mixed-mode pipelines (some streams event-time, others processing-time) — supported or not?</li>
              <li><strong>Watermark strategy.</strong> Per-event-source max-timestamp, periodic (every N ms), or tied to the bounded buffer fill? Each has different drift characteristics.</li>
              <li><strong>Past-the-bound behavior.</strong> Drop silently, drop with a structured error, route to a "late events" stream, or accept and re-emit corrected aggregates as updates? The first three are simple; the last unlocks correctness but requires retraction semantics.</li>
              <li><strong>Operator commutativity.</strong> An out-of-order event must produce the same final aggregate as the in-order case. Most aggregations (count, sum, sketch) are commutative. <code>first</code> / <code>last</code> / <code>lag</code> need explicit semantics — does <code>last</code> mean "max event-time" or "max arrival-time"?</li>
              <li><strong>Migration path.</strong> Existing v0 pipelines run processing-time. Is event-time opt-in per-event (an explicit field on <code>@bv.event</code>) or per-pipeline?</li>
            </ul>

            <p>Companion RFC: <a href="/docs/community/rfcs/rfc-007-event-log-retention/">RFC-007 — Event log retention</a> covers persisting raw events for replay (the operational counterpart to out-of-order tolerance).</p>
