    ];

    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>

          <DocsSidebar active="RFC-006 — Online pipeline migration"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>

            </div>

            <h1>RFC-006 — Online pipeline migration</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Draft</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">Change a pipeline definition — add features, change windows, fix expressions — without losing aggregate state or downtime.</p>

            <h2 id="motivation">Motivation</h2>
            <p>Today, changing a pipeline means re-registration, which discards in-memory state. For fraud, ad-tech, and personalization workloads where the windowed state is irreplaceable (a 30-day rolling distinct count can’t be recomputed from a fresh start), this is unacceptable. Operators currently work around it by running two beava instances in parallel and switching traffic — which doubles the memory budget and adds a coordination failure mode.</p>
            <p><strong>Iterating on a feature should not cost a 30-day warm-up.</strong></p>
            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>Compatibility classifier.</strong> Static analysis of old vs new pipeline definitions to assign a shape automatically. Where it fails, force operator declaration.</li>
              <li><strong>Hot-swap mechanics.</strong> Pause apply briefly, swap the operator graph, resume. Latency budget for the pause.</li>
              <li><strong>Rollback.</strong> A migration that turns out to be wrong needs a path back. Keep N old graphs hot in memory? Snapshot before swap?</li>
              <li><strong>Schema versioning.</strong> WAL and snapshot formats need to know which graph version produced them.</li>
              <li><strong>UX.</strong> Declarative migration file (à la django/alembic) or auto-detected? Operator runs <code>beava migrate plan</code> first.</li>
              <li><strong>Interaction with replay.</strong> Many migrations only succeed if event-log replay is available; this RFC depends on RFC-005 (replay) + RFC-007 (retention) for those shapes.</li>
            </ul>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
              <div className="docs-help-body">

                <p className="docs-help-text">Half the answers in our docs started as someone asking "is this a bug?" out loud. Drop into Discussions — a maintainer is usually around.</p>

                  <a className="docs-help-cta-primary" href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener">Ask on GitHub →</a>
                  <a className="docs-help-cta-ghost" href="https://discord.gg/Jnx89PN9" target="_blank" rel="noopener">Ask on Discord</a>
                </div>
