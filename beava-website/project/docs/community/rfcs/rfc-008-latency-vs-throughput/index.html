            <h1>RFC-008 — Latency vs throughput tradeoffs</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Draft</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">beava's current data plane applies events one at a time and serializes reads against writes — clean to reason about, but leaves an order of magnitude of throughput on the table for workloads that don't need that strictness. Propose three opt-in knobs that let users trade strict atomicity for batch-shaped throughput, while keeping the strict default unchanged.</p>

            <h2 id="motivation">Motivation</h2>
            <p>The current programming model is genuinely strong: every event applies serially, every read sees a consistent snapshot, atomicity is the default. For fraud rules, rate limits, anything where read-after-write matters — this is exactly right.</p>
            <p>But the per-event cost is dominated by sync, ack, lock acquisition, and WAL fsync. At roughly 100k EPS/core in v0 on realistic workloads, batching and ack-early could push the same single-instance ceiling an order of magnitude higher for workloads where strict semantics aren't required. That's the difference between "needs a small cluster" and "fits on one box" for the analytics-shape and agentic-app workloads.</p>
            <p>Examples of workloads that don't need strict semantics:</p>
            <ul>
              <li><strong>Bulk training-data ingest</strong> — load a year of historical events, fit on one box; nobody is reading them mid-load.</li>
              <li><strong>Agentic apps</strong> — push a session's worth of tool-call events; the agent reads features at the end of the session, not after every event.</li>
              <li><strong>Analytics dashboards</strong> — N-second staleness is fine.</li>
              <li><strong>Wide-fanout writes</strong> — one event updates many tables; the cost compounds linearly in v0.</li>
            </ul>
            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>API surface.</strong> Per-event, per-table, per-app, or some combination? Probably per-table for read consistency (#3), per-app or per-event for batching (#1, #2).</li>
              <li><strong>Mixed-tier pipelines.</strong> If one event updates a strict table AND an eventual table, what does the contract say? The strict table must commit before ack; the eventual table can lazy-update.</li>
              <li><strong>Default stays strict.</strong> Confirmed. Opt-in only; the &quot;easy to reason about&quot; mental model survives.</li>
              <li><strong>Snapshot rotation cadence for #3.</strong> 10ms? 100ms? Per-table or global? RCU-shape vs copy-on-write?</li>
              <li><strong>WAL-append-then-ack durability promise.</strong> How do we communicate &quot;at-most-once between fsyncs&quot; without people misreading it as &quot;will lose events&quot;?</li>
              <li><strong>Throughput marketing math.</strong> If the strict-tier number gets a 10× boost in the batched tier, do we lead with the high or low number? Probably the strict number, with the tiered number as a footnote.</li>
              <li><strong>Where does this leave the &quot;Redis-shaped&quot; story?</strong> Redis is single-threaded, ack-after-write. Tier #2 is closer to Cassandra. Tier #3 is closer to a read replica. We'd be picking a position on that spectrum per workload, not for the whole system.</li>
              <li><strong>Interaction with RFC-007 (event-log retention).</strong> If raw events are retained, can a fresh node always rebuild even from the at-most-once tier? Probably yes, with replay from the last fsynced offset.</li>
            </ul>
