            <h1>Stream-to-table join</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Planned</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">Join an incoming event stream against a sibling table inside a pipeline. The table side is read as a snapshot of its current state at apply time. This is a <strong>stream-to-table join</strong> — distinct from stream-stream joins, which v0 doesn’t do.</p>

            <h2 id="motivation">Motivation</h2>
            <p>Real-time decisions often need static or slowly-changing context — user tier, account status, merchant category, allow/block list — on top of streaming aggregates. Teams either denormalize at push time (bloating every event with context) or query two stores app-side and stitch results in their own code. Both options push complexity onto the application.</p>
            <p>A pipeline-level join keeps enrichment inside beava and inside the same transaction as the event apply.</p>
            <p><strong>Real-time features should feel like application code</strong> — including the joins to context.</p>
            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>Snapshot semantics.</strong> Read-latest is the simplest and matches v0’s processing-time default. Other choices (read-at-event-time) re-open separate questions and probably belong in a different roadmap item.</li>
              <li><strong>Missing key.</strong> Default value? Skip the event? Error? Per-call vs per-table policy.</li>
              <li><strong>Chained joins.</strong> Can a join target another joined table? Cycle detection at register time.</li>
              <li><strong>Performance contract.</strong> Join is on the hot path. Latency budget and cardinality limits for the table side.</li>
              <li><strong>Failure mode.</strong> What happens when the table hasn’t been registered, or has been deleted? Register-time error vs runtime error.</li>
              <li><strong>Boundary with stream-stream joins.</strong> Stream-to-table is a snapshot read against a key — single-sided, no temporal alignment, no buffering. Stream-stream joins are out of scope and should stay out of scope.</li>
            </ul>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
