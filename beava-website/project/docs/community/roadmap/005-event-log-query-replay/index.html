            <h1>Event-log query and replay</h1>
            <span className="rfc-meta"><span className="dot"/>Status: Planned</span>

            <h2 id="summary">Summary</h2>
            <p className="bv-lede">Read the raw event log directly (filter by stream, key, time range), and replay subsets into a new pipeline for backfill, A/B feature tests, or historical feature extraction.</p>

            <h2 id="motivation">Motivation</h2>
            <p>Once events are durable past the in-memory window (see <a href="/docs/community/roadmap/007-event-log-retention/">event log retention</a>), the natural next step is to query and replay them. Evaluating a new feature definition requires re-running production traffic — which is slow, risky, and only tells you about the future. Direct replay enables iterative feature development against real history.</p>
            <p><strong>Backfill should be a query, not a deployment.</strong></p>
            <h2 id="questions">Open questions</h2>
            <ul>
              <li><strong>Query language.</strong> SQL? A small DSL? HTTP query params? SQL is familiar but pulls in a parser; HTTP-only is cheap but limiting.</li>
              <li><strong>Replay isolation.</strong> Replay runs in a separate namespace / pipeline by default. Operators must opt in to overwriting live state.</li>
              <li><strong>Throughput contract.</strong> Replay should not starve live serving. CPU/IO budget per replay job.</li>
              <li><strong>Authorization.</strong> Reading raw events is more sensitive than reading aggregates. Token scope: feature-read vs event-read.</li>
              <li><strong>Cost guardrails.</strong> A 1-year replay across 1B keys should not silently OOM. Pre-flight cost estimate, dry-run mode.</li>
              <li><strong>Backfill correctness.</strong> The replay must produce the same final aggregate as a live run, modulo out-of-order semantics.</li>
            </ul>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
