<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contributing · beava docs</title>
  <meta name="description" content="Help make real-time features feel like application code. beava is early, and we want contributors who care about making real-time infrastructure simpler.">
  <link rel="stylesheet" href="../../../styles/colors_and_type.css">
  <link rel="stylesheet" href="../../../styles/site.css">
  <link rel="stylesheet" href="../../../styles/docs-kit.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png"><link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png"><link rel="shortcut icon" href="/assets/favicon.ico">
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg1); font-family: var(--font-sans); }
  </style>
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../../js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="../../../js/_shared/SiteFooter.jsx"></script>
  <script type="text/babel" src="../../../js/docs/DocsShared.jsx"></script>
  <script type="text/babel" src="../../../js/docs/DocsSidebar.jsx"></script>
  <script type="text/babel" src="../../../js/docs/DocsTOC.jsx"></script>

  <script type="text/babel">
    const TOC = [
      { id: 'help', label: 'Help make it real' },
      { id: 'ways', label: 'Ways to contribute' },
      { id: 'first', label: 'Good first contributions' },
      { id: 'philosophy', label: 'Contribution philosophy' },
      { id: 'before', label: 'Before you start' },
    ];

    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>
        <div className="bv-docs-shell">
          <DocsSidebar active="Contributing"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>
              <span className="bv-crumb-sep">/</span>
              <a href="#">Community</a>
              <span className="bv-crumb-sep">/</span>
              <span className="bv-crumb-cur">Contributing</span>
            </div>

            <h1>Contributing</h1>

            <h2 id="help">Help make real-time features feel like application code</h2>
            <p className="bv-lede">beava is early, and we want contributors who care about making real-time infrastructure simpler, clearer, and more accessible.</p>
            <p>You can contribute by writing code, improving docs, testing examples, sharing benchmarks, reviewing roadmap items, or bringing real use cases.</p>
            <p><strong>Real-time features should feel like application code.</strong></p>
            <p>That is the center of the project.</p>

            <h2 id="ways">Ways to contribute</h2>
            <p>You can help by:</p>
            <ul>
              <li>Trying beava locally and reporting where the experience is confusing.</li>
              <li>Writing examples for personalization, recommendations, bidding, fraud, or agentic state.</li>
              <li>Improving SDK ergonomics.</li>
              <li>Adding tests for streams, tables, windows, and aggregations.</li>
              <li>Helping with benchmarks.</li>
              <li>Reviewing roadmap items.</li>
              <li>Improving deployment docs.</li>
              <li>Writing guides for production operations.</li>
              <li>Sharing what would make beava easier to adopt in your team.</li>
            </ul>

            <h2 id="first">Good first contributions</h2>
            <p>Good first contributions include:</p>
            <ul>
              <li>Fixing unclear docs.</li>
              <li>Adding small examples.</li>
              <li>Improving error messages.</li>
              <li>Adding tests for a specific aggregation.</li>
              <li>Reproducing a benchmark.</li>
              <li>Writing a tutorial.</li>
              <li>Summarizing a dev call.</li>
              <li>Opening an issue with a clear use case.</li>
            </ul>

            <h2 id="philosophy">Contribution philosophy</h2>
            <p>beava should be understandable.</p>
            <p>That applies to the codebase, the docs, the runtime behavior, and the community process.</p>
            <p>If something is confusing, that is useful feedback.</p>
            <p>If something feels too platform-heavy, that is useful feedback.</p>
            <p>If something makes it harder for a feature owner to define, test, and ship real-time feature logic, that is useful feedback.</p>
            <p><strong>Feature owners should own feature logic.</strong></p>

            <h2 id="before">Before you start</h2>
            <p>Before making a large change, please open an issue or a roadmap discussion.</p>
            <p>For small fixes, open a pull request directly.</p>
            <p>For design changes, join the dev call or start a discussion.</p>
            <p>We want beava to grow with real users, real workloads, and real operational feedback.</p>
            <p><strong>Start small. Understand the system. Grow with the use case.</strong></p>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
              <div className="docs-help-body">
                <div className="docs-help-kicker">Stuck on this one?</div>
                <p className="docs-help-text">Half the answers in our docs started as someone asking "is this a bug?" out loud. Drop into Discussions — a maintainer is usually around.</p>
                <div className="docs-help-actions">
                  <a className="docs-help-cta-primary" href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener">Ask on GitHub →</a>
                  <a className="docs-help-cta-ghost" href="https://discord.gg/J5trwbCYpS" target="_blank" rel="noopener">Ask on Discord</a>
                </div>
              </div>
            </div>


            <Pager auto/>
          </main>

          <DocsTOC items={TOC} editHref="https://github.com/beava-dev/beava-website/edit/main/project/docs/community/contributing/index.html"/>
        </div>
        <SiteFooter maxWidth={1400}/>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script src="/scripts/docs-headings.js" defer></script>
  <script src="/js/track-pageview.js" defer></script>
</body>
</html>
