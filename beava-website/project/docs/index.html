            <h1>beava</h1>

            <h2 id="react">React to live events</h2>
            <p className="bv-lede">beava is a single-binary feature server for the decisions that have to use the latest event: fraud signals, recommendations, LLM guardrails.</p>
            <p>You declare features in Python, push events over HTTP, and read fresh values by entity key in sub-millisecond latency. One process. No Kafka, no Flink, no feature store.</p>
            <p>Three primitives carry the whole API: <code>@bv.event</code> for the shape of what you push, <code>@bv.table</code> for the keyed feature row those events maintain, and <code>app.get</code> for the read at decision time.</p>
            <p><strong>beava turns live events into fresh features.</strong></p>

            <h2 id="why">Why beava</h2>
            <p>Modern applications make fast decisions from recent data. A fraud rule decides whether to block a charge in milliseconds. A recommendation model leans on the last 30 minutes of clicks. An agent checks a token budget before it routes to an expensive model.</p>
            <p>The conventional stack delivers all of that with several systems: an event bus, a stream processor, a serving store, and the glue between them. Powerful, but heavy to operate and far from the code most developers want to write.</p>
            <p><strong>Stream processing should not require a platform team.</strong></p>
            <p>beava collapses the stack into one binary. You write the Python that defines the features and the HTTP client that reads them. That is the whole loop.</p>
            <p><a href="/docs/vision/why-beava/" style={{color:'var(--accent)', fontWeight:600}}>Read the longer story →</a></p>

            <h2 id="how">How beava works</h2>
            <p>A beava app has three parts:</p>
            <ol>
              <li><strong>Events</strong> describe what your application emits, declared with <code>@bv.event</code>.</li>
              <li><strong>Tables</strong> describe the keyed, windowed, aggregated state those events maintain, declared with <code>@bv.table</code> over a <code>group_by(...).agg(...)</code> chain.</li>
              <li><strong>Queries</strong> read the latest row by entity key with <code>app.get</code> and <code>app.batch_get</code>.</li>
            </ol>
            <p>Events arrive over HTTP. Tables update inline. Reads return the freshest value the system has for that key.</p>
            <p><strong>Low-latency freshness is what changes the architecture.</strong> When a new event becomes queryable in milliseconds, fresh state goes directly into your decision path without a second store in front of it.</p>

            <h2 id="build">What you can build</h2>
            <p>The three shapes the homepage demonstrates are the canonical starting points:</p>
            <ul>
              <li><strong>Fraud signals.</strong> Failed-login counters per user, payment-velocity windows, CVC-fail counters per card.</li>
              <li><strong>Recommendation features.</strong> Recent-click counts per user, top-k categories over a rolling hour.</li>
              <li><strong>LLM guardrails.</strong> Token budgets per org, short-burst request gauges that catch a runaway agent.</li>
            </ul>
            <p>The same primitives extend to:</p>
            <ul>
              <li><strong>Real-time bidding and ad-tech</strong></li>
              <li><strong>Agentic state</strong>, the per-tool, per-org context an agent reads at decision time</li>
              <li><strong>Product analytics that become product logic</strong></li>
              <li><strong>ML feature iteration</strong> without a data-engineering ticket</li>
            </ul>
