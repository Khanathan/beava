    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>
              <span className="bv-crumb-sep">/</span>
              <a href="#">Vision</a>
              <span className="bv-crumb-sep">/</span>
              <span className="bv-crumb-cur">Why beava</span>
            </div>

            <h1>Why beava</h1>

            <h2 id="gap">The gap we felt</h2>
            <p className="bv-lede">We are developers who have built and used real-time data systems ourselves, and we kept feeling the same gap: powerful infrastructure, but an inaccessible developer experience.</p>
            <p>Many systems are open, source-available, or have a community edition, but the path from first clone to a production application-serving workflow can still feel unclear or platform-heavy.</p>
            <p>For this class of use case, developers should be able to start smaller.</p>
            <p>Turning fresh events into features for personalization, ranking, recommendations, fraud detection, bidding, or agentic state should begin as something you can run, test, and understand locally. It should not require a large deployment plan or a dedicated platform team before the first pipeline becomes useful.</p>
            <p><strong>Stream processing should not require a platform team.</strong></p>

            <h2 id="stack">The existing stack is powerful, but heavy</h2>
            <p>The common real-time stack often separates the problem across many systems:</p>
            <ul>
              <li>An event bus for ingestion.</li>
              <li>A stream processor for computation.</li>
              <li>A serving database for low-latency reads.</li>
              <li>A feature store or custom service for access patterns.</li>
              <li>Glue code to connect everything.</li>
            </ul>
            <p>This architecture can be the right answer for large teams and complex platforms. But it is often too much for an application team that wants to test a real-time feature idea quickly.</p>
            <p>beava starts from a different question:</p>
            <blockquote style={quote}>What if fresh, windowed, queryable state could start as application code?</blockquote>

            <h2 id="bet">The beava bet</h2>
            <p>beava is our attempt to make this infrastructure accessible from day one.</p>
            <p>The open-source project should be the real system: small enough to start with, clear enough to reason about, and serious enough to grow with the use case.</p>
            <p>A managed service can remove operational burden later, but the core experience should begin with developers being able to clone beava, run it, define features, test pipelines, and understand the behavior of the system they are using.</p>
            <p>In short, <strong>real-time features should feel like application code</strong>.</p>

            <h2 id="name">Why the name?</h2>
            <p>Because the beaver does the same job we do.</p>
            <p>It works hard. It lives next to streams. It spends its life processing them &mdash; pulling material out, shaping it, building dams that hold state where state needs to be held. The whole life cycle is stream processing.</p>
            <p>And like the animal, the project is built to be useful to its community first. <strong>We want to make something the streaming community actually uses every day.</strong></p>
            <p>The cofounder also discovered that beavers are unintentionally hilarious:</p>

            <div style={{
              position: 'relative',
              maxWidth: 560,
              margin: '20px 0 8px',
              borderRadius: 14,
              overflow: 'hidden',

              The mascot was sold from there.
            </p>

              <li><a href="/docs/vision/non-goals/">Non-goals and tradeoffs</a> — what we're <em>not</em> trying to be.</li>
              <li><a href="/docs/vision/benchmarks/">Benchmarks</a> — what one binary actually does.</li>
              <li><a href="/docs/vision/open-source/">Open-source commitment</a> — Apache 2.0, forever.</li>
            </ul>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
              <div className="docs-help-body">
                <div className="docs-help-kicker">Stuck on this one?</div>
                <p className="docs-help-text">Half the answers in our docs started as someone asking "is this a bug?" out loud. Drop into Discussions — a maintainer is usually around.</p>

                  <a className="docs-help-cta-ghost" href="https://discord.gg/Jnx89PN9" target="_blank" rel="noopener">Ask on Discord</a>
                </div>

          <DocsTOC items={TOC} editHref="https://github.com/beava-dev/beava-website/edit/main/project/docs/vision/why-beava/index.html"/>
