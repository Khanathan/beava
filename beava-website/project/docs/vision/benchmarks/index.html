    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>
        <div className="bv-docs-shell">
          <DocsSidebar active="Benchmarks"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>
              <span className="bv-crumb-sep">/</span>
              <a href="#">Vision</a>
              <span className="bv-crumb-sep">/</span>

            </div>

            <h1>Benchmarks</h1>

            <h2 id="principles">Benchmarks should be public and reproducible</h2>
            <p className="bv-lede">Benchmarks should be public, reproducible, and workload-specific. beava’s goal is not to claim one number for every use case. The goal is to show that a single-node runtime can handle serious application workloads before teams need distributed coordination.</p>
            <p><strong>Freshness is the benchmark that matters most.</strong></p>
            <p>When a new event becomes queryable quickly enough, it can change the architecture of the application.</p>

            <h2 id="current">Current benchmark direction</h2>
            <p>In current reproducible benchmarks:</p>
            <ul>
              <li>A single beava node reaches <strong>600k events/sec</strong> on a smaller workload.</li>
              <li>A single beava node reaches <strong>100k events/sec</strong> on a heavier fraud-style workload with many sketches.</li>
            </ul>
            <p>These numbers should always be understood in terms of workload shape and hardware. Event size, aggregation type, number of windows, number of keys, sketches, durability settings, and query mix all matter.</p>

            <h2 id="report">What we plan to report</h2>
            <p>As the project matures, benchmark reports should include:</p>
            <ul>
              <li>Hardware and cloud instance type.</li>
              <li>CPU, memory, and storage details.</li>
              <li>Workload shape.</li>
              <li>Event schema.</li>
              <li>Number of streams.</li>
              <li>Number of tables.</li>
              <li>Number of keys.</li>
              <li>Aggregation types.</li>
              <li>Window sizes.</li>
              <li>Sketch usage.</li>
              <li>Durability settings.</li>
              <li>Write throughput.</li>
              <li>Read throughput.</li>
              <li>Read latency.</li>
              <li>Write latency.</li>
              <li>Write-to-read freshness.</li>
              <li>p50, p95, and p99 metrics.</li>
            </ul>

            <h2 id="why">Why freshness matters</h2>
            <p>A fast read path is useful. But if the state is stale, the application still makes decisions from old information.</p>
            <p>beava cares about write-to-read freshness because many modern application decisions happen while the user, bid, transaction, workflow, or agent session is still active.</p>
            <p><strong>Low-latency reads are useful; low-latency freshness changes the architecture.</strong></p>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
              <div className="docs-help-body">
                <div className="docs-help-kicker">Stuck on this one?</div>
                <p className="docs-help-text">Half the answers in our docs started as someone asking "is this a bug?" out loud. Drop into Discussions — a maintainer is usually around.</p>

                  <a className="docs-help-cta-ghost" href="https://discord.gg/J5trwbCYpS" target="_blank" rel="noopener">Ask on Discord</a>
                </div>
