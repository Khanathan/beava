    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>
        <div className="bv-docs-shell">
          <DocsSidebar active="Non-goals and tradeoffs"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>

            </div>

            <h1>Non-goals and tradeoffs</h1>

            <h2 id="not">What beava is not trying to be</h2>
            <p className="bv-lede">A good system should be clear about what it is not trying to do. beava is early, and we want to make tradeoffs deliberately.</p>
            <p><strong>Simple should not mean unserious.</strong></p>

            <h2 id="list">Non-goals</h2>
            <ul>
              <li><strong>beava is not trying to replace every streaming system.</strong> It is focused on application-facing event processing, real-time features, and fresh queryable state.</li>
              <li><strong>beava is not trying to hide complexity behind magic.</strong> The goal is to make the system understandable enough that developers can reason about what happens when events arrive.</li>
              <li><strong>beava is not only a feature store.</strong> Feature serving is one important use case, but the broader goal is to turn recent events into operational state for applications and agents.</li>
              <li><strong>beava is not trying to force distributed coordination into the first user experience.</strong> A strong single-node path should carry many workloads before the system asks users to operate a distributed deployment.</li>
              <li><strong>beava is not trying to make the managed service the only serious path.</strong> The open-source project should be useful, understandable, and production-oriented on its own.</li>
            </ul>

            <h2 id="single">Single-node first</h2>
            <p>beava starts with a serious single-node path.</p>
            <p>Modern cloud machines can hold a lot of memory, and one well-designed node can go much further than many teams expect.</p>
            <p>In current reproducible benchmarks, a single beava node reaches 600k events/sec on a smaller workload and 100k events/sec on a heavier fraud-style workload with many sketches.</p>
            <p>This does not mean one node solves every problem. It means teams should be able to start with one node, push it far, and scale when the use case actually needs it.</p>
            <p><strong>Start with one box. Push it far. Scale when needed.</strong></p>

            <h2 id="scale">Scaling deliberately</h2>
            <p>beava will grow toward more deployment modes over time.</p>
            <p>The goal is to add scaling paths without making the starting experience harder.</p>
            <p>Distributed systems are powerful, but they come with operational cost. beava should introduce that complexity only when it makes the system more useful.</p>
