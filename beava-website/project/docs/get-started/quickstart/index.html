    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>
        <div className="bv-docs-shell">
          <DocsSidebar active="Quickstart"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>
              <span className="bv-crumb-sep">/</span>
              <a href="#">Getting started</a>
              <span className="bv-crumb-sep">/</span>
              <span className="bv-crumb-cur">Quickstart</span>
            </div>

            <h1>Quickstart</h1>

            <p className="bv-lede">Build your first real-time feature pipeline. This guide walks the basic beava workflow: define an event, define a feature table, register the pipeline, push events, query fresh state.</p>

            <p>The goal is to show the core mental model quickly.</p>
            <p><strong>Define events. Maintain tables. Query fresh state.</strong></p>

            <h2 id="install">Install beava</h2>
            <Code lang="bash">{`curl -fsSL https://raw.githubusercontent.com/beava-dev/beava/main/scripts/install.sh | sh`}</Code>
            <p>The installer detects your platform and pulls the matching wheel from the latest GitHub Release. The wheel ships the SDK <em>and</em> the Rust <code>beava</code> server binary together. Pin a version with <code>BEAVA_VERSION=v0.0.0 curl ... | sh</code>. PyPI publish lands at v0.0.x — <code>pip install beava</code> will work then; the import name is <code>beava</code> either way.</p>
            <p>Start a local beava server:</p>
            <Code lang="bash">{`beava`}</Code>
            <p>beava is designed to start small. For local development, a single beava process should be enough to define pipelines, push events, and query features.</p>
            <p><strong>Start small. Understand the system. Grow with the use case.</strong></p>

            <h2 id="stream">Define a stream</h2>
            <p>A stream describes the shape of events your application sends to beava.</p>
            <Code lang="python">
{`import beava as bv

@bv.event
class UserEvent:
    user_id: str
    item_id: str
    event_type: str
    category: str
    ts: float`}
            </Code>
            <p>This stream could represent clicks, views, purchases, impressions, or any other event your application produces.</p>

            <h2 id="table">Define a table</h2>
            <p>A table describes the state beava should maintain from those events.</p>
            <Code lang="python">
{`@bv.table(key="user_id")
def UserActivityFeatures(ev: UserEvent):
    return ev.group_by("user_id").agg(
        views_1h=bv.count(window="1h", where=bv.col("event_type") == "view"),
        clicks_1h=bv.count(window="1h", where=bv.col("event_type") == "click"),
        purchases_24h=bv.count(window="24h", where=bv.col("event_type") == "purchase"),
        distinct_categories_24h=bv.n_unique("category", window="24h"),
    )`}
            </Code>
            <p>This table turns raw user events into fresh user-level features.</p>
            <p><strong>beava turns events into fresh, queryable state.</strong></p>

            <h2 id="register">Register the pipeline</h2>
            <p>Register your stream and table with beava:</p>
            <Code lang="python">
{`app = bv.App(url="http://127.0.0.1:8080")
app.register(UserEvent, UserActivityFeatures)`}
            </Code>
            <p>Once registered, beava knows how to accept <code>UserEvent</code> records and update <code>UserActivityFeatures</code>.</p>

            <h2 id="push">Push an event</h2>
            <p>Push an event over HTTP:</p>
            <Code lang="bash">
{`curl -X POST http://127.0.0.1:8080/push \\
  -H "Content-Type: application/json" \\
  -d '{
    "event": "UserEvent",
    "data": {
      "user_id": "u123",
      "item_id": "i456",
      "event_type": "click",
      "category": "sports",
      "ts": 1777855797.778
    }
  }'`}
            </Code>
            <p>As the event arrives, beava updates the matching feature tables inline.</p>

            <h2 id="query">Query features</h2>
            <p>Query the latest features for a user:</p>
            <Code lang="bash">{`curl http://127.0.0.1:8080/get/UserActivityFeatures/u123`}</Code>
            <p>Example response:</p>
            <Code lang="json">
{`{
  "user_id": "u123",
  "views_1h": 3,
  "clicks_1h": 1,
  "purchases_24h": 0,
  "distinct_categories_24h": 2
}`}
            </Code>
            <p>The application can now use this state inside a recommendation, ranking, fraud, personalization, or agent decision path.</p>

            <h2 id="recap">What you just built</h2>
            <p>You defined an event, maintained windowed aggregates, and queried the latest state by key.</p>
            <p>You did not need to deploy an event bus, a separate stream processor, a separate serving database, and custom glue code just to try the idea.</p>
            <p><strong>Real-time features should feel like application code.</strong></p>

            <h2 id="next">Where to go next</h2>
