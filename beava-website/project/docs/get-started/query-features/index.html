<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../../js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="../../../js/_shared/SiteFooter.jsx"></script>
  <script type="text/babel" src="../../../js/docs/DocsShared.jsx"></script>

  <script type="text/babel">
    const TOC = [
      { id: 'get', label: 'Get one key' },
      { id: 'mget', label: 'Get many keys' },
      { id: 'composite', label: 'Composite keys' },
      { id: 'philosophy', label: 'Query path philosophy' },
    ];
    const App = () => (
      <>
        <SiteHeader active="docs" search maxWidth={1400}/>
        <div className="bv-docs-shell">
          <DocsSidebar active="Query features"/>

          <main className="bv-content">
            <div className="bv-crumbs">
              <a href="/docs/">Docs</a>
              <span className="bv-crumb-sep">/</span>
              <a href="#">Getting started</a>
              <span className="bv-crumb-sep">/</span>
              <span className="bv-crumb-cur">Query features</span>
            </div>

            <h1>Query features</h1>

            <p className="bv-lede">beava serves the latest feature values through simple key-based queries. Use <code>get</code> when you need one key. Use <code>mget</code> when you need many.</p>

            <p>This serving model is intentionally simple.</p>
            <p><strong>Applications should be able to ask for the state they need, when they need it.</strong></p>

            <h2 id="get">Get one key</h2>
            <p>Example HTTP query:</p>
            <Code lang="bash">{`curl http://127.0.0.1:6400/features/UserActivityFeatures/u123`}</Code>
            <p>Example response:</p>
            <Code lang="json">
{`{
  "user_id": "u123",
  "views_1h": 12,
  "clicks_1h": 3,
  "purchases_24h": 1,
  "distinct_categories_24h": 4
}`}
            </Code>

            <h2 id="mget">Get many keys</h2>
            <p>Use <code>mget</code> when an application needs features for multiple entities in one decision.</p>
            <Code lang="bash">
{`curl -X POST http://127.0.0.1:6400/features/UserActivityFeatures/mget \\
  -H "Content-Type: application/json" \\
  -d '{
    "keys": ["u123", "u456", "u789"]
  }'`}
            </Code>
            <p><code>mget</code> is useful for ranking, recommendation, bidding, and fraud workloads where a decision may need many feature lookups at once.</p>

            <h2 id="composite">Composite keys</h2>
            <p>Some features are keyed by more than one field.</p>
            <Code lang="python">
{`@bv.table(key=("user_id", "campaign_id"))
def UserCampaignFeatures(ev: BidEvent) -> bv.Table:
    ...`}
            </Code>
            <p>A composite key lets beava maintain state for relationships like:</p>
            <ul>
              <li>User × campaign</li>
              <li>User × item</li>
              <li>Publisher × ad slot</li>
              <li>Account × merchant</li>
              <li>Agent × tool</li>
              <li>Workflow × step</li>
            </ul>
            <p>Composite keys are useful when the application decision depends on a relationship, not just a single entity.</p>

            <h2 id="philosophy">Query path philosophy</h2>
            <p>beava’s query path is designed to feel direct.</p>
            <p>An application should not need to know about stream jobs, materialization schedules, or serving glue just to ask:</p>
            <blockquote style={{borderLeft:'3px solid var(--accent)', paddingLeft:14, color:'var(--fg2)', margin:'14px 0', fontStyle:'italic'}}>
              What is the latest state for this key?
            </blockquote>
            <p><strong>Fresh enough for the decision path</strong> means the application can query state while it is still making the decision.</p>

            <h2 id="more">More on the read path</h2>
            <ul>
              <li><a href="/docs/operators/">Operator catalog</a> — what each aggregation returns when you query it.</li>
              <li><a href="/docs/sdk-api/python/">Python SDK</a> · <a href="/docs/sdk-api/typescript/">TypeScript SDK</a> · <a href="/docs/sdk-api/go/">Go SDK</a> — <code>get</code> and <code>batch_get</code> from any language.</li>
              <li><a href="/docs/http-api/">HTTP API</a> · <a href="/docs/wire-spec/">Wire spec</a> — for clients you write yourself.</li>
              <li><a href="/docs/concepts/freshness/">Freshness</a> — what "fresh" means at the query, and what the latency budget looks like.</li>
            </ul>

            <div className="docs-help-callout">
              <img src="/assets/mascot-work-pose.svg" alt="" width="72" height="72" className="docs-help-mascot"/>
              <div className="docs-help-body">
                <div className="docs-help-kicker">Stuck on this one?</div>
                <p className="docs-help-text">Half the answers in our docs started as someone asking "is this a bug?" out loud. Drop into Discussions — a maintainer is usually around.</p>
                <div className="docs-help-actions">
                  <a className="docs-help-cta-primary" href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener">Ask on GitHub →</a>
                  <a className="docs-help-cta-ghost" href="https://discord.gg/Jnx89PN9" target="_blank" rel="noopener">Ask on Discord</a>
                </div>
              </div>
            </div>


            <Pager auto/>
          </main>

          <DocsTOC items={TOC} editHref="https://github.com/beava-dev/beava-website/edit/main/project/docs/get-started/query-features/index.html"/>
        </div>
        <SiteFooter maxWidth={1400}/>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script src="/scripts/docs-headings.js" defer></script>
