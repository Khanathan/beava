            <h1>Deploy beava</h1>

            <p className="bv-lede">beava is a single binary with a 1 GB disk requirement and no external dependencies. You can deploy it the same way you would Redis. The fastest path is a one-click button on a managed host.</p>

            <p>beava listens on two ports: <code>:8080</code> for the data plane (<code>/push</code>, <code>/get</code>, <code>/register</code>, plus <code>/health</code> and <code>/ready</code> for liveness probes) and <code>:8090</code> for the admin sidecar (<code>/metrics</code>, <code>/registry</code>; <code>/health</code> and <code>/ready</code> are mirrored here too). Persistent state — the WAL and snapshots — lives under <code>/data</code>. Mount a disk there.</p>

            <h2 id="render">Deploy on Render</h2>

            <p>One click. Render reads <a href="https://github.com/beava-dev/beava/blob/main/render.yaml"><code>render.yaml</code></a> from the repo root and provisions a web service with the official <code>beavadev/beava:latest</code> image plus a 1 GB persistent disk mounted at <code>/data</code>.</p>

            <div className="bv-deploy-buttons">
              <a href="https://render.com/deploy?repo=https://github.com/beava-dev/beava" target="_blank" rel="noopener">
                <img src="https://render.com/images/deploy-to-render-button.svg" alt="Deploy to Render"/>
              </a>
            </div>

            <p>What Render provisions:</p>
            <ul>
              <li>Web service on the Starter plan ($7/mo — the free plan does not include persistent disks).</li>
              <li>1 GB SSD disk at <code>/data</code>, attached on every redeploy.</li>
              <li>Public HTTPS URL on <code>:8080</code> (data plane). The admin port stays in-cluster.</li>
              <li><code>autoDeploy: false</code> — Render does not auto-pull <code>:latest</code>. Trigger a manual redeploy from the dashboard when you want to roll forward.</li>
            </ul>

            <p>To roll forward to a newer beava release, open the service in Render → <em>Manual Deploy</em> → <em>Deploy latest commit</em>. Render re-pulls <code>beavadev/beava:latest</code> on every manual redeploy.</p>

            <h2 id="railway">Deploy on Railway</h2>

            <p>One click. The published Beava template provisions the same <code>beavadev/beava:latest</code> image with port <code>8080</code> exposed publicly and a 1 GB volume mounted at <code>/data</code>.</p>

            <div className="bv-deploy-buttons">
              <a href="https://railway.com/deploy/beava?referralCode=xkfMVJ&amp;utm_medium=integration&amp;utm_source=template&amp;utm_campaign=generic" target="_blank" rel="noopener">
                <img src="https://railway.com/button.svg" alt="Deploy on Railway"/>
              </a>
            </div>

            <p>Healthcheck path is <code>/health</code> (served on the data plane port, returns <code>200</code> once the listener is up). The admin sidecar on <code>:8090</code> stays internal to the service.</p>

            <p><strong>Without the template:</strong> open <a href="https://railway.com/new" target="_blank" rel="noopener">railway.com/new</a> → <em>Empty Project</em> → <em>+ Create</em> → <em>Docker Image</em> → paste <code>beavadev/beava:latest</code>. Expose port <code>8080</code>, right-click the service → <em>Attach Volume</em> → mount path <code>/data</code>, size <code>1 GB</code>. Same result as the button, more clicks.</p>

            <h2 id="docker">Run the Docker image directly</h2>

            <p>If your provider is not in the list above (Fly.io, AWS App Runner, GCP Cloud Run, Hetzner, your laptop), pull the official image and bind-mount a directory for state:</p>

            <Code lang="bash">
{`docker run -d --name beava \\
  -p 8080:8080 -p 8090:8090 \\
  -v $PWD/beava-data:/data \\
  beavadev/beava:latest`}
            </Code>

            <p>The image ships a default <code>/app/beava.yaml</code> that listens on <code>0.0.0.0:8080</code> + <code>0.0.0.0:8090</code> and stores the WAL + snapshots under <code>/data</code>. Override the config by mounting your own:</p>

            <Code lang="bash">
{`docker run -d --name beava \\
  -p 8080:8080 -p 8090:8090 \\
  -v $PWD/beava-data:/data \\
  -v $PWD/beava.yaml:/app/beava.yaml:ro \\
  beavadev/beava:latest`}
            </Code>

            <h2 id="tcp">TCP fast-path</h2>

            <p>beava serves two transports on separate ports: HTTP on <code>:8080</code> for curl, browsers, load balancers, and the SDK's HTTP transport; <strong>framed TCP on <code>:8081</code></strong> for the SDK's lower-latency fast-path. TCP shaves the per-request overhead by a few μs and is what production fraud-team workloads use.</p>

            <p>The image ships with TCP <strong>disabled</strong>. To enable it, set two env vars on the service:</p>

            <Code lang="bash">
{`BEAVA_TCP_ENABLED=true
BEAVA_TCP_HOST=0.0.0.0`}
            </Code>

            <p>Whether you can actually <em>reach</em> port 8081 from outside the box depends on the host:</p>

            <ul>
              <li><strong>Render</strong>: <em>not supported</em>. Render web services proxy HTTP/HTTPS only — raw TCP from the public internet won't reach the container. Keep HTTP if you're on Render.</li>
              <li><strong>Railway</strong>: <em>supported</em> via <em>TCP Proxy</em>. In the service settings → <em>Networking</em> → click <em>TCP Proxy</em> → expose port <code>8081</code>. Railway hands back a <code>proxy.rlwy.net:NNNNN</code> public endpoint. Set <code>BEAVA_TCP_ENABLED=true</code> and <code>BEAVA_TCP_HOST=0.0.0.0</code> in the service env, redeploy, and point your SDK at the proxy endpoint.</li>
              <li><strong>Fly.io / Hetzner / EC2 / your laptop</strong>: <em>supported</em>. Just bind port 8081 to the public interface and open it in your security group.</li>
            </ul>

            <h2 id="env">Env var overrides</h2>

            <p>The image's bundled <code>/app/beava.yaml</code> provides sensible defaults — most deploys need <strong>zero env vars</strong>. Set these only if you need to override:</p>

            <ul>
              <li><code>BEAVA_LISTEN_ADDR</code> — HTTP data plane bind addr (default <code>0.0.0.0:8080</code> in the image)</li>
              <li><code>BEAVA_ADMIN_ADDR</code> — admin sidecar bind addr (default <code>0.0.0.0:8090</code>)</li>
              <li><code>BEAVA_TCP_ENABLED</code> — <code>true</code> / <code>false</code>. Default <strong>off</strong>; turn on to serve the TCP fast-path.</li>
              <li><code>BEAVA_TCP_HOST</code> — TCP bind host (default <code>127.0.0.1</code>; set to <code>0.0.0.0</code> for external access)</li>
              <li><code>BEAVA_TCP_PORT</code> — TCP bind port (default <code>8081</code>)</li>
              <li><code>BEAVA_WAL_DIR</code>, <code>BEAVA_SNAPSHOT_DIR</code> — state paths (default <code>/data/wal</code> + <code>/data/snapshots</code> in the image)</li>
              <li><code>BEAVA_LOG_LEVEL</code> — <code>trace</code> / <code>debug</code> / <code>info</code> / <code>warn</code> / <code>error</code> (default <code>info</code>)</li>
            </ul>

            <h2 id="verify">Verify the deploy</h2>

            <p>Once the service is up, hit the public URL to confirm beava is healthy:</p>

            <Code lang="bash">{`curl https://your-app.example.com/health`}</Code>

            <p>Expected response: <code>200 OK</code>. The data plane serves <code>/health</code> alongside <code>/push</code> and <code>/get</code>, so it works through the public URL on both Render and Railway with no extra port exposure.</p>

            <p>Then push a synthetic event from your laptop and read it back:</p>

            <Code lang="bash">
{`curl -X POST https://your-app.example.com/push/Click \\
  -H 'Content-Type: application/json' \\
  -d '{"user_id": "u1", "ts": 1715000000.0}'

curl https://your-app.example.com/get/UserCounts/u1`}
            </Code>

            <p>The second call will <code>404</code> until you register a pipeline that consumes <code>Click</code> events and writes to <code>UserCounts</code>. Walk through the <a href="/docs/get-started/quickstart/">Quickstart</a> for that flow.</p>

            <h2 id="sizing">Sizing and limits</h2>

            <p>beava is in-memory. The disk is for the WAL and snapshots; the working set lives in RAM. Budget roughly <strong>~7 KB per entity</strong> for a rich 30-feature pack — see the <a href="/docs/vision/benchmarks/">benchmarks page</a> for the measurement.</p>

            <ul>
              <li><strong>Render Starter</strong>: 512 MB RAM → ~70k entities of rich state. Good for staging or low-volume production.</li>
              <li><strong>Render Standard</strong> ($25/mo): 2 GB RAM → ~280k entities.</li>
              <li><strong>Railway hobby</strong>: 8 GB RAM ceiling → ~1.1M entities.</li>
              <li><strong>Your own box</strong>: 64 GB RAM → ~9M entities; 256 GB → ~36M.</li>
            </ul>

            <p>If your working set exceeds the box, beava will not page to SSD. Size up, or shard across instances Redis-style (one beava process per shard, application-level routing).</p>

                <p className="docs-help-text">Render and Railway both surface container logs in their dashboard. If beava is crash-looping, the most common cause is the disk not being mounted at <code>/data</code> — check the volume config first.</p>
                <div className="docs-help-actions">

                  <a className="docs-help-cta-ghost" href="https://discord.gg/J5trwbCYpS" target="_blank" rel="noopener">Ask on Discord</a>
                </div>
