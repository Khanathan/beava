            <h1>Push events</h1>

            <p className="bv-lede">Applications push events into beava over TCP or HTTP. An event is a fact that just happened in your application — beava processes it and updates the tables that depend on it.</p>

            <p>Examples of events:</p>
            <ul>
              <li>A user viewed an item.</li>
              <li>A campaign won an auction.</li>
              <li>A customer started checkout.</li>
              <li>A user clicked a recommendation.</li>
              <li>A model made a prediction.</li>
              <li>An agent called a tool.</li>
              <li>A workflow changed state.</li>
            </ul>
            <p><strong>Fresh events should become queryable state.</strong></p>

            <h2 id="http">Push over HTTP</h2>
            <Code lang="bash">
{`curl -X POST http://127.0.0.1:8080/push \\
  -H "Content-Type: application/json" \\
  -d '{
    "event": "UserEvent",
    "data": {
      "user_id": "u123",
      "item_id": "i456",
      "event_type": "view",
      "category": "sports",
      "ts": 1777855797.778
    }
  }'`}
            </Code>
            <p>The <code>event</code> field names the registered stream. The <code>data</code> object contains the event fields.</p>

            <h2 id="tcp">Push from Python</h2>
            <p>Use <code>bv.App</code> for the higher-level path. The same client class handles HTTP and TCP transports — pick by URL scheme.</p>
            <Code lang="python">
{`import beava as bv

app = bv.App("http://127.0.0.1:8080")  # or "tcp://127.0.0.1:8081" for the framed TCP fast-path
app.push("UserEvent", {
    "user_id": "u123",
    "item_id": "i456",
    "event_type": "click",
    "category": "sports",
    "ts": 1777855797.778,
})`}
            </Code>

            <h2 id="philosophy">Write path philosophy</h2>
            <p>Many real-time systems start by putting an event bus in front of everything.</p>
            <p>That can be the right design for some systems, especially when many independent consumers need the same durable event log. But not every application-facing feature pipeline needs to start there.</p>
            <p>beava is designed for use cases where the application can commit events, update state, and query fresh features with low enough latency that the system can sit directly inside the product path.</p>
            <p><strong>When freshness is fast enough, the architecture gets simpler.</strong></p>

            <h2 id="durability">Durability</h2>
            <p>beava’s write path should be explicit about durability. Applications should know when an event has been accepted, committed, and reflected in queryable state.</p>
            <p>Every event is appended to a write-ahead log. What varies between settings is when that log is flushed to disk via <code>fsync</code>.</p>
            <p>beava ships with a sensible default: events are logged synchronously and <code>fsync</code> runs on a short interval, which keeps throughput high while bounding the worst-case window of data loss on a hard crash. For workloads that need stricter guarantees, you can configure beava to <code>fsync</code> on every push at deploy time — durable on every event, at the cost of throughput.</p>
            <p>Durability is configurable. The default is the right answer for most workloads; the override exists when it isn’t.</p>
            <p><strong>beava is not trying to hide complexity behind magic.</strong></p>
            <p>It should be clear what happens when an event arrives.</p>
