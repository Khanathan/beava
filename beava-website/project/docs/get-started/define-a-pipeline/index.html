            <h1>Define a pipeline</h1>

            <p className="bv-lede">A beava pipeline is made of streams and tables. A <strong>stream</strong> describes the events your application sends to beava. A <strong>table</strong> describes the state beava maintains from those events.</p>

            <p>This is the core beava mental model:</p>
            <p><strong>Events come in. Tables stay fresh. Applications query by key.</strong></p>

            <h2 id="streams">Define events as streams</h2>
            <p>Use <code>@bv.event</code> to describe an event type:</p>
            <Code lang="python">
{`@bv.event
class BidEvent:
    user_id: str
    campaign_id: str
    publisher_id: str
    ad_slot: str
    event_type: str
    price: float
    ts: float`}
            </Code>
            <p>A stream should match something real in your application: a click, an impression, a bid request, a checkout event, a tool call, a workflow update, or a model feedback event.</p>
            <p>Streams are the input side of beava.</p>

            <h2 id="tables">Define state as tables</h2>
            <p>Use <code>@bv.table</code> to define the state you want to maintain:</p>
            <Code lang="python">
{`@bv.table(key=("user_id", "campaign_id"))
def UserCampaignFeatures(ev: BidEvent):
    return ev.group_by("user_id", "campaign_id").agg(
        imps_1h=bv.count(window="1h", where=bv.col("event_type") == "impression"),
        imps_24h=bv.count(window="24h", where=bv.col("event_type") == "impression"),
        spend_24h=bv.sum("price", window="24h", where=bv.col("event_type") == "win"),
    )`}
            </Code>
            <p>This table is keyed by <code>user_id</code> and <code>campaign_id</code>. Each key maintains its own rolling feature values.</p>

            <h2 id="features">Think in features, not jobs</h2>
            <p>Traditional stream processing often asks you to think in jobs, operators, deployment graphs, and infrastructure topology.</p>
            <p>beava asks a simpler question:</p>
            <p><strong>What fresh state does your application need by key?</strong></p>
            <p>Once you know the answer, define the stream and the table.</p>

            <h2 id="ownership">Feature owners should own feature logic</h2>
            <p>The person who understands a feature should be able to define it, test it, and extend it.</p>
            <p>With beava, feature logic lives close to application and ML code. The goal is to avoid a workflow where a feature owner writes a specification, hands it to a platform team, waits for an online implementation, and then tries to verify whether the online behavior matches the original intent.</p>
            <p><strong>Feature owners should own feature logic.</strong></p>

            <h2 id="good-table">What makes a good beava table?</h2>
            <p>A good beava table usually has:</p>
            <ul>
              <li>A clear key.</li>
              <li>A clear input stream.</li>
              <li>A small set of features the application needs at decision time.</li>
              <li>Windowed aggregations that are easy to reason about.</li>
              <li>Tests that make the expected behavior obvious.</li>
            </ul>
            <p>Start with the feature your application actually needs. Add complexity only when the use case requires it.</p>

            <h2 id="testing">Test your pipeline</h2>
            <p>Before you push real traffic at it, drive the pipeline with a fixture and assert what comes out. <code>bv.test.fixture</code> spins up an in-process server, lets you push synthetic events, and exposes the same <code>get</code> / <code>batch_get</code> API you use in production:</p>
            <Code lang="python">
{`import beava as bv

def test_user_clicks_counts_within_window():
    with bv.test.fixture(Click, UserClicks) as f:
        f.push("Click", {"user_id": "u_42"})
        f.push("Click", {"user_id": "u_42"})
        assert f.get("UserClicks", "u_42") == {"clicks_60s": 2}

        f.advance_time(seconds=120)
        f.push("Click", {"user_id": "u_42"})
        assert f.get("UserClicks", "u_42") == {"clicks_60s": 1}`}
            </Code>
            <p>The fixture controls the clock with <code>f.advance_time(...)</code>, so you can write deterministic tests for windowed aggregations without sleeping. Run with <code>pytest</code>; no extra config required.</p>
