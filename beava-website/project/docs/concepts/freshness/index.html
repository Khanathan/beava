            <h1>Freshness</h1>

            <p className="bv-lede">Freshness is the time between an event being written and its effect becoming visible in queryable state.</p>

            <h2 id="what">What freshness means</h2>
            <p>For beava, freshness is not just a metric. It is part of the product philosophy.</p>
            <p><strong>Low-latency reads are useful; low-latency freshness changes the architecture.</strong></p>
            <p>If a system can serve old state quickly, it is a fast cache. If a system can make new events queryable quickly, it becomes part of the application decision path.</p>

            <h2 id="compare">Read latency vs. write-to-read freshness</h2>
            <p>Read latency answers:</p>
            <blockquote style={quote}>How quickly can I query a feature?</blockquote>
            <p>Write-to-read freshness answers:</p>
            <blockquote style={quote}>How quickly does a new event affect the feature I query?</blockquote>
            <p>Both matter.</p>
            <p>For personalization, bidding, fraud detection, recommendations, and agentic state, the second question can be more important than it first appears.</p>
            <p>A click that updates a recommendation after the user leaves the page is less useful. A fraud signal that updates after the transaction is approved is less useful. A bid event that updates pacing too late may not help the next decision.</p>
            <p><strong>Fresh enough for the decision path</strong> means the system updates state while the application can still use it.</p>

            <h2 id="simplify">Why freshness can simplify architecture</h2>
            <p>When write-to-read freshness is fast enough, some workloads do not need to start with a separate event bus, stream processor, serving store, and glue code.</p>
            <p>Those systems may still be useful as use cases grow. But they should not be required before the first real-time feature becomes useful.</p>
            <p><strong>When freshness is fast enough, the event bus becomes optional for many application workloads.</strong></p>

            <h2 id="goal">beava’s freshness goal</h2>
            <p>beava is designed for workloads where recent events should become queryable state immediately.</p>
            <p>The goal is to let teams commit events, update windowed aggregates, and serve fresh features inside latency-sensitive application paths.</p>

            <div className="docs-help-callout">
