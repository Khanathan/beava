            <h1><code>get</code> and <code>batch_get</code></h1>

            <p className="bv-lede">beava serves features through simple key-based queries. <code>get</code> returns features for one (table, key). <code>batch_get</code> returns features for many (table, key) requests in one round trip.</p>

            <h2 id="simple">Simple feature queries</h2>
            <p>This is designed to feel familiar to developers who have used systems like Redis, while supporting feature tables generated from event streams.</p>
            <p><strong>Query fresh state like application state.</strong></p>

            <h2 id="when-get">When to use <code>get</code></h2>
            <p>Use <code>get</code> when your application needs state for one entity in one table.</p>
            <p>Examples:</p>
            <ul>
              <li>Fetch user features before ranking a feed.</li>
              <li>Fetch campaign pacing before bidding.</li>
              <li>Fetch account risk features before approving an action.</li>
              <li>Fetch agent workflow state before choosing the next tool.</li>
            </ul>
            <p>The wire call is <code>POST /get</code> with body <code>{`{"table": "...", "key": "..."}`}</code>; the response is a flat dict of feature values.</p>

            <h2 id="when-batch-get">When to use <code>batch_get</code></h2>
            <p>Use <code>batch_get</code> when your application needs many feature rows in one decision. The requests can mix tables and keys freely; results return in the same order.</p>
            <p>Examples:</p>
            <ul>
              <li>Rank 100 candidate items.</li>
              <li>Score multiple ads for a bid request.</li>
              <li>Check several entities involved in a transaction.</li>
              <li>Fetch features for several tools an agent could call next.</li>
            </ul>
            <p>The wire call is <code>POST /batch_get</code> with body <code>{`{"requests": [{"table": "...", "key": "..."}, ...]}`}</code>; the response is an array of flat dicts in the same order.</p>
            <p><code>batch_get</code> helps keep decision paths simple when they need more than one lookup.</p>

            <h2 id="why">Why this matters</h2>
            <p>Many real-time ML systems become hard to operate because feature computation and feature serving are separated across multiple systems.</p>
            <p>beava keeps the mental model direct:</p>
            <p><strong>Push events. Maintain tables. Query by key.</strong></p>
