            <h1>Events</h1>

            <p className="bv-lede">An event is a fact your application produces. <code>@bv.event</code> declares the shape — beava ingests events and turns them into queryable per-key state.</p>

            <h2 id="what">What is an event?</h2>
            <Code lang="python">
{`@bv.event
class UserEvent:
    user_id: str
    item_id: str
    event_type: str
    ts: float`}
            </Code>
            <p>An event is not just a transport message. It is part of the application model.</p>
            <p>It says:</p>
            <blockquote style={quote}>These are the facts my application produces.</blockquote>

            <h2 id="inputs">Events are inputs</h2>
            <p>Tables depend on events. When an event arrives, beava updates every table that consumes it.</p>
            <p>One event type can feed many tables.</p>
            <p>For example, a <code>UserEvent</code> might feed:</p>
            <ul>
              <li>User activity features</li>
              <li>Item popularity features</li>
              <li>Category affinity features</li>
              <li>Session features</li>
              <li>Fraud velocity features</li>
            </ul>
            <p>This keeps the event model simple while letting multiple feature views grow from the same input.</p>

            <h2 id="derived">Derived events</h2>
            <p>You can build a new event from an existing one without re-pushing data. A <strong>derived event</strong> is a filter or transform chain on top of a parent event — it has its own name and shape, and tables can depend on it just like a base event.</p>
            <p>The function form of <code>@bv.event</code> takes an upstream event and returns a chain. The function name becomes the derived event's name:</p>
            <Code lang="python">
{`@bv.event
class Click:
    user_id: str
    page: str
    amount: float

@bv.event
def Checkout(click: Click):
    return click.filter(bv.col("page") == "/checkout")

@bv.event
def BigCheckout(checkout: Checkout):
    return (
        checkout
        .filter(bv.col("amount") > 100)
        .with_columns(bucket=bv.col("amount").cast(int) // 50)
    )`}
            </Code>
            <p>Push events to the parent (<code>Click</code>); beava routes matching records through the derivation chain and updates downstream tables for free. You never push to a derived event directly.</p>
            <p>Available chain methods (Polars-shaped): <code>filter(expr)</code>, <code>select(*cols)</code>, <code>drop(*cols)</code>, <code>rename(**mapping)</code>, <code>with_columns(**exprs)</code>, <code>cast(**type_map)</code>, <code>fillna(**defaults)</code>. Each returns a new derivation you can chain or register.</p>
            <p><strong>Use derived events to:</strong> narrow a high-volume event to a meaningful subset (clicks → checkouts), pre-compute typed columns once instead of per-table, or split one wire-shape into multiple semantic events. They cost almost nothing — just a filter / projection on the apply path.</p>

            <h2 id="design">Good event design</h2>
            <p>A good event should be:</p>
            <ul>
              <li>Close to the application fact (one event = one thing that happened).</li>
              <li>Easy to test.</li>
              <li>Stable enough for downstream tables.</li>
              <li>Explicit about timestamps.</li>
              <li>Clear about entity identifiers.</li>
            </ul>
            <p>Avoid designing events around infrastructure first. Design them around what happened in the product. When the shape feels off, reach for a <a href="#derived">derived event</a> before mutating the source.</p>
            <p><strong>Events are product facts. beava turns them into queryable state.</strong></p>

            </ul>
