<head>

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png"><link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png"><link rel="shortcut icon" href="/assets/favicon.ico">
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg1); font-family: var(--font-sans); }

    .commit-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
      margin: 0 0 22px;
    }
    @media (max-width: 720px) { .commit-grid { grid-template-columns: 1fr; } }
    .bv-content a.commit, a.commit {
      display: block;
      padding: 22px 22px 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none !important;
      transition: border-color 180ms var(--ease-out),
                  box-shadow 180ms var(--ease-out),
                  transform 180ms var(--ease-out),
                  background 180ms var(--ease-out);
      color: inherit;
    }
    .bv-content a.commit:hover, a.commit:hover {
      border-color: var(--accent);
      background: var(--beava-paper);
      box-shadow: 0 6px 18px rgba(26,23,20,0.06);
      transform: translateY(-1px);
    }
    .bv-content a.commit:hover .ic, a.commit:hover .ic {
      background: var(--accent); color: #fff;
    }
    .bv-content a.commit:hover .more, a.commit:hover .more {
      text-decoration: underline;
      text-decoration-color: var(--accent);
      text-underline-offset: 3px;
    }
    .bv-content a.commit *, a.commit * { text-decoration: none; }
    .bv-content a.commit .ic, a.commit .ic { transition: background 180ms var(--ease-out), color 180ms var(--ease-out); }
    .commit .ic {
      width: 38px; height: 38px; border-radius: 11px;
      background: var(--beava-orange-wash); color: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .commit h3 {
      font-family: var(--font-serif); font-weight: 600;
      font-size: 19px; line-height: 1.2; letter-spacing: -0.01em;
      color: var(--fg1); margin: 0 0 6px;
    }
    .commit p {
      font-family: var(--font-sans); font-size: 13.5px; line-height: 1.55;
      color: var(--fg2); margin: 0 0 10px;
    }
    .commit .more {
      font-family: var(--font-sans); font-weight: 600; font-size: 13px;
      color: var(--accent);
    }
  </style>
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="/js/Shared.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="/js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <>
        <SiteHeader active="community" maxWidth={1400}/>
        <div className="bv-marketing" style={{ maxWidth: 920, margin: '0 auto', padding: '48px 28px 80px' }}>
          {/* bv-content is sized + asymmetrically-padded for the docs
              3-column shell (sidebar to its left, TOC to its right). On
              the community page it sits inside bv-marketing instead, so
              we override to symmetric padding + auto margins to center
              within the 920px wrapper. Typography rules (h1/h2/lede) are
              the load-bearing reason for keeping the class. */}
          <main className="bv-content" style={{ margin: '0 auto', padding: 0, maxWidth: '100%' }}>
            <h1>Community</h1>
            <p className="bv-lede">beava is built in the open. Weekly streamed dev meetups, a public roadmap, GitHub Discussions. The model is TiDB and PingCAP: OSS engine fully featured, commercial scope explicit, no paywalls on basics.</p>

            <h2 id="commitments">Four commitments, from launch day</h2>
            <p>The contract you're signing up for when you depend on beava.</p>

            <div className="commit-grid">
              <a className="commit" href="https://github.com/beava-dev/beava/blob/main/LICENSE" target="_blank" rel="noopener">
                <span className="ic">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.26-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.56 9.56 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.39.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.75c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/></svg>
                </span>
                <h3>The core stays open</h3>
                <p>Apache 2.0, forever. No core-vs-enterprise split. If it ships in beava, you can run it.</p>
                <span className="more">Read the license →</span>
              </a>

              <a className="commit" href="/docs/vision/benchmarks/">
                <span className="ic">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
                </span>
                <h3>Performance is a feature</h3>
                <p>P99 budgets are tracked in CI on every release. Regressions block merge. We don't ship slower beavas.</p>
                <span className="more">See the benchmarks →</span>
              </a>

              <a className="commit" href="/docs/community/roadmap/">
                <span className="ic">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
                </span>
                <h3>Decisions in public</h3>
                <p>Every meaningful change shows up on the roadmap before it lands. You can read why, push back, or write your own.</p>
                <span className="more">Browse the roadmap →</span>
              </a>

              <a className="commit" href="#">
                <span className="ic">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </span>
                <h3>Weekly dev meetup</h3>
                <p>Every Thursday, livestreamed. Release update, technical deep-dive, Q&amp;A. Replays archived. Runs from launch day forward.</p>
                <span className="more">Subscribe on YouTube →</span>
              </a>
            </div>

            <h2 id="roadmap">Roadmap items in flight</h2>
            <p>What we're designing in the open right now.</p>
            <ul>
              <li><a href="/docs/community/roadmap/001-tiered-storage/"><strong>Tiered storage</strong></a> (RAM → SSD → S3). Spill cold state to disk and object storage. Hot path stays sub-ms.</li>
              <li><a href="/docs/community/roadmap/002-table-ingestion/"><strong>Table ingestion</strong></a>. Direct <code>app.upsert</code> and <code>app.delete</code> for static and slowly-changing state.</li>
              <li><a href="/docs/community/roadmap/003-stream-to-table-join/"><strong>Stream-to-table join</strong></a>. Join an event stream against a sibling table inside a pipeline. Snapshot read of the table side.</li>
              <li><a href="/docs/community/roadmap/004-out-of-order-events/"><strong>Out-of-order events</strong></a>. Tolerate events that arrive late; revise v0's processing-time-only default.</li>
              <li><a href="/docs/community/roadmap/005-event-log-query-replay/"><strong>Event-log query and replay</strong></a>. Re-feed retained events for debug, A/B, training data. (Depends on event log retention.)</li>
              <li><a href="/docs/community/roadmap/006-online-pipeline-migration/"><strong>Online pipeline migration</strong></a>. Add features and modify windows without bouncing the process.</li>
              <li><a href="/docs/community/roadmap/007-event-log-retention/"><strong>Event log retention</strong></a>. Keep raw events past the WAL window so a fresh node can replay the log to reconstruct itself.</li>
              <li><a href="/docs/community/roadmap/008-latency-vs-throughput/"><strong>Latency vs throughput tradeoffs</strong></a>. Opt-in tiers (client batching, early ack, lockless reads) for workloads that don't need strict atomicity.</li>
              <li><a href="/docs/community/roadmap/009-ha-deployment/"><strong>HA deployment</strong></a>. Active-passive WAL replication + automatic failover. Same single-node programming model; no more SPOF.</li>
            </ul>
            <p>Want one expedited? <a href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener">Open a Discussion</a> with your use case and the rough number of entities you'd run on it.</p>

            <h2 id="commercial">Self-host vs cloud</h2>
            <p>Like TiDB and PingCAP. The same engine you self-host runs in beava cloud. Commercial scope is explicit additional surface, not a feature gate.</p>
            <p><strong>Always OSS</strong> — the engine, the DSL, all operational tooling, snapshot/restore, verification CLIs, sharding helpers, every aggregation primitive.</p>
            <p><strong>Commercial (planned ~2027)</strong> — managed cloud, sync replication, cross-region async DR, SOC2 / SOX / PCI / HIPAA-attested deployments, single-tenant dedicated cloud, enterprise support with SLA.</p>

            <h2 id="channels">Get in touch</h2>
            <ul>
              <li><strong>GitHub Discussions</strong> — primary channel. Tag your question, get an answer. <a href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener">github.com/beava-dev/beava/discussions</a></li>
              <li><strong>Security disclosures</strong> — <a href="mailto:hoang@beava.dev">hoang@beava.dev</a></li>
              <li><strong>Casual chatter</strong> — <a href="https://discord.gg/J5trwbCYpS" target="_blank" rel="noopener">Discord</a>. Drop in, ask anything, no setup.</li>
            </ul>
          </main>
        </div>
        <SiteFooter maxWidth={1400}/>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script src="/js/track-pageview.js" defer></script>
</body>
</html>
