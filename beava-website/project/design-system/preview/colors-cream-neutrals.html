<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .swatch {
    flex: 1;
    min-width: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .chip { height: 76px; }
  .meta { padding: 8px 10px; }
  .meta .name { font-size: 12px; font-weight: 600; color: var(--fg1); }
  .meta .hex { font-size: 10.5px; font-family: var(--font-mono); color: var(--fg3); }
  .meta .tok { font-size: 10px; font-family: var(--font-mono); color: var(--accent); }
</style>
</head><body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#fdfaf4"></div>
      <div class="meta"><div class="name">Cream</div><div class="hex">#fdfaf4</div><div class="tok">--beava-cream</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#f6eed9"></div>
      <div class="meta"><div class="name">Cream deep</div><div class="hex">#f6eed9</div><div class="tok">--beava-cream-deep</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#fbf5e8"></div>
      <div class="meta"><div class="name">Paper</div><div class="hex">#fbf5e8</div><div class="tok">--beava-paper</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#e6dccb"></div>
      <div class="meta"><div class="name">Rule</div><div class="hex">#e6dccb</div><div class="tok">--beava-rule</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#efe6d3"></div>
      <div class="meta"><div class="name">Rule soft</div><div class="hex">#efe6d3</div><div class="tok">--beava-rule-soft</div></div>
    </div>
  </div>
</body></html>
