<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 28px; display: flex; flex-direction: column; gap: 26px; }
  .legend { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

  /* Primary terminal-style action button.
     Matches the blog: deep rust (brand-800 feel), chunky padding,
     chevron prompt, slightly rounded. */
  .action {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    background: var(--accent);
    border: 0;
    padding: 9px 16px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    line-height: 1.2;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.12), 0 1px 2px rgba(26,23,20,0.08);
  }
  .action:hover { filter: brightness(1.05); }
  .action .chev {
    font-family: var(--font-mono);
    font-weight: 600;
    opacity: 0.85;
    font-size: 13px;
  }
  .action[disabled] { opacity: 0.7; cursor: wait; }
  .action--success { background: var(--beava-success); }

  /* Status pill — neutral, sits next to the action */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px 7px 10px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    border-radius: 999px;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--fg3);
    line-height: 1.2;
  }
  .pill .dot {
    width: 7px; height: 7px; border-radius: 999px;
    background: var(--fg3);
    flex-shrink: 0;
  }
  .pill--ok {
    color: var(--beava-success);
    border-color: #cfe0c7;
    background: #f2f7ee;
  }
  .pill--ok .dot {
    background: var(--beava-success);
    box-shadow: 0 0 0 3px rgba(74,122,58,0.15);
  }
  .pill--warn {
    color: var(--accent);
    border-color: #f1d8c2;
    background: var(--beava-orange-wash);
  }
  .pill--warn .dot {
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,92,32,0.18);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
</style>
</head><body>

  <div>
    <div class="legend">Idle — action + neutral status</div>
    <div class="row">
      <button class="action"><span class="chev">&gt;_</span>Register the pipeline</button>
      <span class="pill"><span class="dot"></span>not registered</span>
    </div>
  </div>

  <div>
    <div class="legend">Loading — pill pulses in accent</div>
    <div class="row">
      <button class="action" disabled><span class="chev">&gt;_</span>Registering…</button>
      <span class="pill pill--warn"><span class="dot"></span>deploying</span>
    </div>
  </div>

  <div>
    <div class="legend">Success — action shifts to success green, pill confirms</div>
    <div class="row">
      <button class="action action--success"><span class="chev">&gt;_</span>Redeploy</button>
      <span class="pill pill--ok"><span class="dot"></span>registered · v1.0.4</span>
    </div>
  </div>

</body></html>
