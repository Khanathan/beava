  <link rel="stylesheet" href="styles/colors_and_type.css">
  <link rel="stylesheet" href="styles/site.css">

<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/Shared.jsx"></script>
  <script type="text/babel" src="js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    // beava.dev homepage — Hero · PipelineShowcase · Pillars · FinalCTA

    const useTickingNumber = (target, { duration = 1100, decimals = 0 } = {}) => {
      const [val, setVal] = React.useState(target);
      const fromRef = React.useRef(target);
      React.useEffect(() => {
        const from = fromRef.current;
        const to = target;
        if (from === to) return;
        const start = performance.now();
        let raf;
        const step = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          const v = from + (to - from) * eased;
          setVal(v);
          if (t < 1) raf = requestAnimationFrame(step);
          else fromRef.current = to;
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [target, duration]);
      return decimals === 0 ? Math.round(val) : Number(val.toFixed(decimals));
    };

    const Sparkline = ({ data, color = 'var(--accent)', w = 300, h = 28 }) => {
      if (!data || data.length < 2) return null;
      const min = Math.min(...data);
      const max = Math.max(...data);
      const span = max - min || 1;
      const stepX = w / (data.length - 1);
      const pts = data.map((v, i) => [i * stepX, h - ((v - min) / span) * (h - 4) - 2]);
      const d = pts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const area = `${d} L${w},${h} L0,${h} Z`;
      const last = pts[pts.length - 1];
      return (
        <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"
             style={{ display: 'block', width: '100%', height: h, overflow: 'visible' }}>
          <path d={area} fill={color} fillOpacity="0.10"/>
          <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
          <circle cx={last[0]} cy={last[1]} r="2.75" fill={color}/>
          <circle cx={last[0]} cy={last[1]} r="5" fill={color} fillOpacity="0.18"/>
        </svg>
      );
    };

    const formatDuration = (ms) => {
      const totalS = Math.max(0, Math.round(ms / 1000));
      if (totalS < 60) return [`${totalS}s`, ''];
      const m = Math.floor(totalS / 60);
      const s = totalS % 60;
      if (m < 60) return [`${m}m ${String(s).padStart(2, '0')}s`, ''];
      return [`${(m / 60).toFixed(1)}h`, ''];
    };

    const formatCount = (n) => {
      if (n < 10_000) return [n.toLocaleString('en-US'), ''];
      if (n < 1_000_000) return [(n / 1000).toFixed(1), 'k'];
      return [(n / 1_000_000).toFixed(2), 'M'];
    };

    const seedSeries = (n, base, jitter) =>
      Array.from({ length: n }, (_, i) => {
        const drift = Math.sin(i / 2.3) * jitter * 0.5;
        const noise = (Math.random() - 0.5) * jitter;
        return Math.max(0, base + drift + noise);
      });

    const MetricCard = ({ label, value, unit, subline, sparkData, sparkColor, big, mascot }) => (
      <div className="bv-metric-card" style={{
        background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
        padding: '18px 20px 18px', boxShadow: 'var(--shadow-sm)',
        display: 'flex', flexDirection: 'column', gap: 14,
        position: 'relative', overflow: 'hidden',
      }}>
        {mascot && (
          <img className="bv-metric-mascot" src={mascot.src} alt=""
            width={mascot.size || 44} height={mascot.size || 44}
            style={{
              position: 'absolute',
              top: mascot.top ?? 10, right: mascot.right ?? 12,
              opacity: mascot.opacity ?? 0.85,
              transform: mascot.rotate ? `rotate(${mascot.rotate}deg)` : 'none',
              pointerEvents: 'none',
            }}/>
        )}
        <div className="bv-metric-label" style={{
          fontFamily: 'var(--font-sans)', fontSize: 11.5, fontWeight: 600,
          textTransform: 'uppercase', letterSpacing: '0.1em',
          color: 'var(--fg3)', lineHeight: 1.3,
          paddingRight: mascot ? 100 : 0,
        }}>{label}</div>
        <div style={{
          fontFamily: 'var(--font-serif)', fontWeight: 600,
          fontSize: 44, lineHeight: 1.05, letterSpacing: '-0.02em',
          color: 'var(--fg1)',
          display: 'flex', alignItems: 'baseline', gap: 6,
          ...(big ? {
            fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600,
            letterSpacing: 0, lineHeight: 1.4,
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            display: 'block',
          } : null),
        }}>
          {value}
          {unit && <span style={{ fontSize: '0.5em', color: 'var(--fg3)', fontWeight: 500, fontFamily: 'var(--font-sans)' }}>{unit}</span>}
        </div>
        {subline && (
          <div style={{
            fontFamily: 'var(--font-sans)', fontSize: 12.5,
            color: 'var(--fg3)', lineHeight: 1.4, marginTop: -4,
          }}>{subline}</div>
        )}
        {sparkData && <Sparkline data={sparkData} color={sparkColor} w={300} h={28}/>}
      </div>
    );

    const TOP_PAGES = [
      '/',
      '/docs/',
      '/docs/install/',
      '/docs/get-started/quickstart/',
      '/docs/concepts/streams/',
      '/docs/community/rfcs/',
      '/docs/vision/why-beava/',
      '/guide/',
    ];

    const LiveMetrics = () => {
      // Real-data mode: poll /api/stats and /api/features/<path> against the
      // beava-website-beava instance. Falls back to seed values if offline.
      const [dwellMs, setDwellMs] = React.useState(0);
      const [pageViews, setPageViews] = React.useState(0);
      const [topPageIdx, setTopPageIdx] = React.useState(0);
      const [topPageHits, setTopPageHits] = React.useState(0);
      const [dwellSeries, setDwellSeries] = React.useState(() => seedSeries(60, 0, 0));
      const [pvSeries, setPvSeries] = React.useState(() => seedSeries(24, 0, 0));

      React.useEffect(() => {
        let cancelled = false;
        const refresh = async () => {
          try {
            // Stats: events_total (last 24h-ish) for "Pages viewed · Today".
            const stats = await fetch('/api/stats').then(r => r.ok ? r.json() : null);
            if (cancelled || !stats) return;
            setPageViews(stats.events_total || 0);
            setPvSeries(s => [...s.slice(1), stats.events_total || 0]);

            // Features for top pages: pick the one with highest views_1h.
            const reads = await Promise.all(TOP_PAGES.map(p =>
              fetch('/api/features/' + encodeURIComponent(p))
                .then(r => r.ok ? r.json() : null)
                .catch(() => null)
            ));
            if (cancelled) return;
            let bestIdx = 0, bestHits = 0;
            reads.forEach((r, i) => {
              if (!r || !r.features) return;
              const v1h = r.features.views_1h || 0;
              if (v1h > bestHits) { bestHits = v1h; bestIdx = i; }
            });
            setTopPageIdx(bestIdx);
            setTopPageHits(bestHits);
            // Median dwell: read directly off the top page's feature — no
            // averaging-of-medians (that's not how medians compose).
            const topMedian = (reads[bestIdx] && reads[bestIdx].features && reads[bestIdx].features.median_dwell_1h) || 0;
            setDwellMs(topMedian);
            setDwellSeries(s => [...s.slice(1), topMedian]);
          } catch (_) { /* keep previous values on transient failure */ }
        };
        refresh();
        const id = setInterval(refresh, 1000);
        return () => { cancelled = true; clearInterval(id); };
      }, []);

      const dwellTickedMs = useTickingNumber(dwellMs, { duration: 900 });
      const pvTicked = useTickingNumber(pageViews, { duration: 700 });
      const hitsTicked = useTickingNumber(topPageHits, { duration: 700 });
      const [dwellNum, dwellUnit] = formatDuration(dwellTickedMs);
      const [pvNum, pvUnit] = formatCount(pvTicked);

      return (
        <div style={{ position: 'relative' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 14 }}>
            <MetricCard label="Median time on top page · Last hour" value={dwellNum} unit={dwellUnit}
              sparkData={dwellSeries} sparkColor="var(--accent)"
              mascot={{ src: '/assets/mascot-work-pose.svg', size: 84, top: 4, right: 10, rotate: -4 }}/>
            <MetricCard label="Pages viewed · Today" value={pvNum} unit={pvUnit}
              sparkData={pvSeries} sparkColor="var(--beava-info)"
              mascot={{ src: '/assets/logo-mark.png', size: 100, top: -2, right: 4, rotate: 4 }}/>
            <MetricCard big label="Top page · Last hour"
              mascot={{ src: '/assets/mascot-pose-3.svg', size: 80, top: 6, right: 10, rotate: -2 }}
              value={
                <span key={topPageIdx} style={{
                  fontFamily: 'var(--font-mono)', fontSize: 17, fontWeight: 600,
                  color: 'var(--fg1)', letterSpacing: 0,
                  animation: 'beava-fade-up 360ms cubic-bezier(0.22,1,0.36,1)',
                  display: 'block', whiteSpace: 'nowrap', overflow: 'hidden',
                  textOverflow: 'ellipsis', maxWidth: '100%',
                }}>{TOP_PAGES[topPageIdx]}</span>
              }
              subline={<><span style={{ fontFamily: 'var(--font-mono)', color: 'var(--fg2)' }}>{hitsTicked}</span> views</>}/>
          </div>
          <p style={{
            margin: '16px 4px 0',
            fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)',
            fontStyle: 'italic', lineHeight: 1.5,
          }}>
            Three real beava queries. <a href="#pipeline" style={{
              color: 'var(--accent)', textDecoration: 'none',
              borderBottom: '1px solid color-mix(in oklab, var(--accent) 35%, transparent)',
              fontStyle: 'normal', fontWeight: 500,
            }}>The pipeline is below ↓</a>
          </p>
        </div>
      );
    };

    const INSTALL_TABS = [
      { id: 'brew',   label: 'brew',   cmd: 'brew install beava' },
      { id: 'curl',   label: 'curl',   cmd: 'curl -fsSL beava.dev/install.sh | sh' },
      { id: 'docker', label: 'docker', cmd: 'docker run -p 8080:8080 beava/beava:latest' },
    ];

    const InstallTabs = () => {
      const [tabId, setTabId] = React.useState('brew');
      const [copied, setCopied] = React.useState(false);
      const tab = INSTALL_TABS.find(t => t.id === tabId);
      const copy = () => {
        navigator.clipboard?.writeText(tab.cmd);
        setCopied(true);
        setTimeout(() => setCopied(false), 1400);
      };
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13.5, color: 'var(--fg2)', fontWeight: 500, marginBottom: 10, paddingLeft: 4 }}>
            Run it locally.
          </div>
          <div style={{ display: 'flex', gap: 2, paddingLeft: 4 }}>
            {INSTALL_TABS.map(t => {
              const active = t.id === tabId;
              return (
                <button key={t.id} onClick={() => setTabId(t.id)} style={{
                  padding: '6px 12px', borderRadius: '6px 6px 0 0',
                  background: active ? '#fff' : 'transparent',
                  border: '1px solid', borderColor: active ? 'var(--border)' : 'transparent',
                  borderBottom: active ? '1px solid #fff' : '1px solid var(--border)',
                  marginBottom: -1, fontFamily: 'var(--font-mono)', fontSize: 12.5,
                  fontWeight: active ? 600 : 500,
                  color: active ? 'var(--fg1)' : 'var(--fg3)',
                  cursor: 'pointer',
                }}>{t.label}</button>
              );
            })}
          </div>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '12px 16px',
            background: '#fff', border: '1px solid var(--border)', borderRadius: '0 8px 8px 8px',
            fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--fg1)',
          }}>
            <span><span style={{ color: 'var(--fg3)', marginRight: 6 }}>$</span>{tab.cmd}</span>
            <button onClick={copy} style={{
              padding: '4px 10px', fontSize: 11.5, fontFamily: 'var(--font-sans)',
              background: copied ? 'var(--beava-success-wash)' : 'transparent',
              border: '1px solid var(--border)', borderRadius: 5,
              color: copied ? 'var(--beava-success)' : 'var(--fg2)', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 5, whiteSpace: 'nowrap',
            }}>{copied ? '✓ copied' : '⎘ copy'}</button>
          </div>
          <div style={{
            marginTop: 12, paddingLeft: 4,
            fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', lineHeight: 1.5,
          }}>
            ~14 MB <span style={{ color: 'var(--border-strong)' }}>·</span> macOS, Linux, Windows <span style={{ color: 'var(--border-strong)' }}>·</span> runs on 1 GB RAM <span style={{ color: 'var(--border-strong)' }}>·</span> scales to one big box
          </div>
          <div style={{
            marginTop: 14, paddingLeft: 4,
            fontFamily: 'var(--font-sans)', fontSize: 14.5, color: 'var(--fg2)',
            lineHeight: 1.5, fontWeight: 500,
          }}>
            Push events <span style={{ color: 'var(--border-strong)', margin: '0 4px' }}>·</span>
            Define pipelines <span style={{ color: 'var(--border-strong)', margin: '0 4px' }}>·</span>
            Query by key.
          </div>
        </div>
      );
    };

    const Hero = () => (
      <section style={{ padding: '52px 24px 88px', position: 'relative' }}>
        <div className="beava-hero-grid" style={{
          maxWidth: 1200, margin: '0 auto',
          display: 'grid', gridTemplateColumns: '1.15fr 1fr', gap: 72, alignItems: 'center',
        }}>
          <div>
            <a href="https://github.com/beava-dev/beava" target="_blank" rel="noopener" style={{
              display: 'inline-flex', alignItems: 'center', gap: 10,
              padding: '5px 12px 5px 10px', borderRadius: 999,
              background: 'var(--beava-orange-wash)', border: '1px solid #f1d8c2',
              color: 'var(--accent)', fontSize: 12.5, fontWeight: 600,
              marginBottom: 18, fontFamily: 'var(--font-sans)',
              whiteSpace: 'nowrap', flexWrap: 'nowrap', textDecoration: 'none',
              transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = '#f1d8c2'; e.currentTarget.style.transform = ''; }}>
              <span style={{ width: 6, height: 6, background: 'var(--accent)', borderRadius: 999, boxShadow: '0 0 0 3px rgba(184,92,32,0.18)' }}/>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>v0</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>Apache 2.0</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>single binary</span>
              <span style={{ color: 'var(--fg3)', fontSize: 11, marginLeft: 2 }}>↗</span>
            </a>
            <div style={{ marginBottom: 12 }}>
              <span style={{
                fontFamily: 'var(--font-accent)', fontWeight: 700,
                fontSize: 24, lineHeight: 1, color: 'var(--accent)',
                transform: 'rotate(-2deg)', transformOrigin: 'left center',
                display: 'inline-block',
              }}>Dam good at streams.</span>
            </div>
            <h1 style={{
              fontFamily: 'var(--font-serif)', fontWeight: 600,
              fontSize: 'clamp(34px, 4.4vw, 56px)',
              lineHeight: 1.15, letterSpacing: '-0.02em',
              color: 'var(--fg1)', margin: '0 0 38px',
              maxWidth: 600, textWrap: 'balance',
            }}>Real-time features without heavy infrastructure.</h1>
            <p style={{
              fontFamily: 'var(--font-serif)', fontStyle: 'italic',
              fontWeight: 400, fontSize: 22, lineHeight: 1.45,
              color: 'var(--fg1)', margin: '0 0 36px',
              maxWidth: 560, textWrap: 'pretty',
            }}>Personalization, fraud rules, live dashboards &mdash; in hours, not quarters.</p>
            <InstallTabs/>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginTop: 8, flexWrap: 'wrap' }}>
              <Button variant="primary" size="lg" href="/docs/" icon={<Icon name="arrow" size={16}/>}>Read the docs</Button>
              <Button variant="secondary" size="lg" href="https://discord.gg/Jnx89PN9" target="_blank" rel="noopener">Join Discord →</Button>
            </div>
          </div>
          <div style={{ position: 'relative' }}>
            <LiveMetrics/>
          </div>
        </div>
        <style>{`
          @keyframes beava-fade-up {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
          }
          @media (max-width: 960px) {
            .beava-hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
            .beava-pillars-grid { grid-template-columns: repeat(2, 1fr) !important; }
          }
          @media (max-width: 760px) {
            section { padding-left: 18px !important; padding-right: 18px !important; }
            .beava-hero-grid > div:first-child > a:first-child { white-space: normal !important; flex-wrap: wrap !important; }
            .bv-metric-mascot { width: 56px !important; height: 56px !important; top: 8px !important; right: 8px !important; opacity: 0.7 !important; }
            .bv-metric-label { padding-right: 64px !important; }
            #pipeline { padding: 56px 18px 64px !important; }
            #pipeline pre { padding: 16px 18px !important; font-size: 12.5px !important; line-height: 1.6 !important; }
            #pipeline pre + div { grid-template-columns: 1fr !important; }
            #pipeline pre + div > div { border-right: 0 !important; border-bottom: 1px solid var(--border) !important; }
            #pipeline pre + div > div:last-child { border-bottom: 0 !important; }
            .beava-pillars-grid { grid-template-columns: 1fr !important; }
            .beava-finalcta-grid { grid-template-columns: 1fr !important; }
            .beava-finalcta-founders { flex-direction: column !important; align-items: flex-start !important; }
            .beava-finalcta-mascot { display: none !important; }
            footer .bv-foot-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
          }
          @media (max-width: 480px) {
            section { padding-left: 14px !important; padding-right: 14px !important; }
            .bv-metric-mascot { display: none !important; }
            .bv-metric-label { padding-right: 0 !important; }
            .beava-hero-grid h1 { margin-bottom: 24px !important; }
            .beava-hero-grid h1 + p { font-size: 18px !important; margin-bottom: 24px !important; }
            .bv-site-nav-link { padding: 6px 6px !important; font-size: 13px !important; }
          }
        `}</style>
      </section>
    );

    // ---------- PipelineShowcase ----------
    const PipelineShowcase = () => {
      const S = {
        kw:  { color: 'var(--code-keyword)' },
        str: { color: 'var(--code-string)' },
        cmt: { color: 'var(--code-comment)', fontStyle: 'italic' },
        fn:  { color: 'var(--code-fn)' },
        num: { color: 'var(--code-number)' },
        ty:  { color: 'var(--code-type)' },
      };
      return (
        <section id="pipeline" style={{ padding: '88px 24px 96px', background: 'var(--beava-cream-deep)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ maxWidth: 1040, margin: '0 auto' }}>
            <div style={{ marginBottom: 36 }}>
              <Eyebrow>The homepage runs beava</Eyebrow>
              <h2 style={{
                fontFamily: 'var(--font-serif)', fontWeight: 600,
                fontSize: 44, lineHeight: 1.1, letterSpacing: '-0.02em',
                color: 'var(--fg1)', margin: '10px 0 14px', maxWidth: 720, textWrap: 'balance',
              }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600 }}>13 lines.</span> That&rsquo;s the whole pipeline.
              </h2>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.55, color: 'var(--fg2)', margin: 0, maxWidth: 640, textWrap: 'pretty' }}>
                Every page view on this site pushes a real event to this pipeline. Every number in the hero panel is a real feature query against it.
              </p>
            </div>
            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 16, boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px', borderBottom: '1px solid var(--border)', background: 'var(--beava-paper)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#ff5f57', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#febc2e', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#28c840', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--fg2)', marginLeft: 6 }}>site_metrics.py</span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', padding: '2px 8px', borderRadius: 999, background: '#fff', border: '1px solid var(--border)', marginLeft: 4, whiteSpace: 'nowrap' }}>13 lines</span>
                </div>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--beava-success)', whiteSpace: 'nowrap' }}>
                  <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--beava-success)' }}/>
                  registered on beava.dev
                </span>
              </div>
              <pre style={{ margin: 0, padding: '22px 28px', fontFamily: 'var(--font-mono)', fontSize: 14, lineHeight: 1.7, color: 'var(--code-fg)', background: 'var(--code-bg)', border: 0, borderRadius: 0, boxShadow: 'none', overflowX: 'auto' }}>
<span style={S.kw}>import</span> beava <span style={S.kw}>as</span> bv{'\n'}
{'\n'}
<span style={S.fn}>@bv.event</span>{'\n'}
<span style={S.kw}>class</span> <span style={S.ty}>PageView</span>:{'\n'}
{'    '}session_id: <span style={S.ty}>str</span>{'\n'}
{'    '}path: <span style={S.ty}>str</span>{'\n'}
{'    '}dwell_ms: <span style={S.ty}>int</span>   <span style={S.cmt}># set when the visitor leaves the page</span>{'\n'}
{'\n'}
<span style={S.fn}>@bv.table</span>{'   '}<span style={S.cmt}># no key=  →  one row, site-wide</span>{'\n'}
<span style={S.kw}>def</span> <span style={S.fn}>SiteMetrics</span>(e: <span style={S.ty}>PageView</span>):{'\n'}
{'    '}<span style={S.kw}>return</span> e.<span style={S.fn}>agg</span>({'\n'}
{'        '}<span style={{ background: 'rgba(184,92,32,0.10)', borderRadius: 3, padding: '0 2px' }}>median_dwell_1h</span>  = bv.<span style={S.fn}>quantile</span>(e.dwell_ms, q=<span style={S.num}>0.5</span>, window=<span style={S.str}>"1h"</span>),{'\n'}
{'        '}<span style={{ background: 'rgba(58,106,138,0.10)', borderRadius: 3, padding: '0 2px' }}>page_views_today</span> = bv.<span style={S.fn}>count</span>(window=<span style={S.str}>"24h"</span>),{'\n'}
{'        '}<span style={{ background: 'rgba(217,122,62,0.12)', borderRadius: 3, padding: '0 2px' }}>top_page_1h</span>      = bv.<span style={S.fn}>top_k</span>(e.path, k=<span style={S.num}>1</span>, window=<span style={S.str}>"1h"</span>),{'\n'}
{'    '}){'\n'}
{'\n'}
bv.<span style={S.fn}>App</span>(<span style={S.str}>"0.0.0.0:8080"</span>).<span style={S.fn}>register</span>(<span style={S.ty}>PageView</span>, <span style={S.fn}>SiteMetrics</span>).<span style={S.fn}>serve</span>()
              </pre>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0, borderTop: '1px solid var(--border)', background: '#fff' }}>

                  { color: 'rgba(58,106,138,0.10)', dot: 'var(--beava-info)',        label: 'page_views_today', maps: 'Pages viewed today' },
                  { color: 'rgba(217,122,62,0.12)', dot: 'var(--beava-orange-soft)', label: 'top_page_1h',      maps: 'Top page · this hour' },
                ].map((row, i) => (
                  <div key={row.label} style={{ padding: '14px 18px', borderRight: i < 2 ? '1px solid var(--border)' : 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: row.dot }}/>
                      <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, background: row.color, padding: '2px 6px', borderRadius: 4, color: 'var(--code-fg)', border: 0 }}>{row.label}</code>
                    </div>
                    <div style={{ fontFamily: 'var(--font-sans)', fontSize: 12.5, color: 'var(--fg3)', paddingLeft: 16 }}>
                      → <span style={{ color: 'var(--fg2)' }}>{row.maps}</span> in the hero
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--fg3)', margin: '20px 4px 0', textAlign: 'center', fontStyle: 'italic' }}>
              No tracking cookies, no fingerprinting. Anonymous session id per visit.

          </div>
        </section>

          <Eyebrow>Three ways in</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 4.5vw, 52px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '12px 0 16px', textWrap: 'balance' }}>
