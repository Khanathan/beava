<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>beava — dam good at streams</title>
  <link rel="stylesheet" href="styles/colors_and_type.css">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="icon" href="assets/mascot-mark-geometric.png">
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/Shared.jsx"></script>
  <script type="text/babel" src="js/FeedBeaver.jsx"></script>

  <script type="text/babel">
    // ==================================================================
    // Hero — the beaver IS the hero. Clickable from second one.
    // Left: headline + subhead + install tabs + CTAs.
    // Right: the live feed-the-beaver widget (FeedBeaver with compact=false).
    // ==================================================================
    const Hero = () => (
      <section style={{ padding: '56px 28px 64px', position: 'relative', overflow: 'hidden' }}>
        <div className="hero-grid" style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1.15fr 1fr', gap: 32, alignItems: 'center' }}>
          <div style={{ position: 'relative', zIndex: 1, minWidth: 0 }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '6px 12px', borderRadius: 999, background: 'var(--beava-orange-wash)', border: '1px solid #f1d8c2', color: 'var(--accent)', fontSize: 13, fontWeight: 600, marginBottom: 22, fontFamily: 'var(--font-sans)' }}>
              <span style={{ width: 7, height: 7, background: 'var(--accent)', borderRadius: 999, boxShadow: '0 0 0 3px rgba(184,92,32,0.18)' }}></span>
              v0.9.4 · Apache 2.0 · single binary
            </div>
            {/* Zero-width wrapper so the headline can bleed right over the beaver without pushing layout */}
            <div style={{ position: 'relative', height: 'clamp(64px, 10vw, 132px)', marginBottom: 18 }}>
              <h1 style={{
                fontFamily: 'var(--font-accent)', fontWeight: 700,
                fontSize: 'clamp(64px, 10vw, 132px)', lineHeight: 0.95, letterSpacing: '-0.02em',
                color: 'var(--accent)',
                position: 'absolute', left: 0, top: 0,
                margin: 0,
                zIndex: 1,
                whiteSpace: 'nowrap',
                pointerEvents: 'none',
                width: 'max-content',
                transform: 'rotate(-3.5deg)',
                transformOrigin: 'left bottom',
              }}>
                Dam good at streams.
              </h1>
            </div>
            <p style={{ fontFamily: 'var(--font-serif)', fontWeight: 500, fontStyle: 'italic', fontSize: 'clamp(20px, 2.2vw, 28px)', lineHeight: 1.25, color: 'var(--fg1)', margin: '18px 0 28px', textWrap: 'balance', maxWidth: 560 }}>
              Personalization, fraud rules, live dashboards — in hours, not quarters.
            </p>

            <InstallTabs/>

            <div style={{ display: 'flex', gap: 12, alignItems: 'center', marginTop: 26, flexWrap: 'wrap' }}>
              <Button variant="primary" size="lg" icon={<Icon name="arrow" size={16}/>} href="guide/">
                Read the guide
              </Button>
              <Button variant="secondary" size="lg" iconLeft={<Icon name="github" size={16}/>} href="https://github.com/beava-dev/beava" target="_blank" rel="noopener">
                Star on GitHub <span style={{ color: 'var(--fg3)', fontWeight: 500, marginLeft: 4 }}>· 8.2k</span>
              </Button>
            </div>

            <div style={{ marginTop: 18, fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)', display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              <span style={{ fontFamily: 'var(--font-accent)', fontWeight: 700, fontSize: 17, color: 'var(--accent)', lineHeight: 1, transform: 'rotate(-2deg)', display: 'inline-block' }}>
                psst →
              </span>
              <span>the beaver over there is clickable. go feed him.</span>
            </div>
          </div>

          {/* Live hero widget — beaver IS the illustration, with compact stats tucked below. */}
          <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 420, zIndex: 2 }}>
            <FeedBeaver endpoint="https://beava.dev" compact={true} unboxed={true} persistent={true} showDeco={true} compactStats={true}/>
          </div>
        </div>
      </section>
    );

    // ------------------------------------------------------------------
    // Install tabs — brew (default) / curl / docker
    // ------------------------------------------------------------------
    const InstallTabs = () => {
      const [tab, setTab] = React.useState('brew');
      const snippets = {
        brew:   'brew install beava',
        curl:   'curl -fsSL beava.dev/install.sh | sh',
        docker: 'docker run -p 6400:6400 beava/beava:latest',
      };
      return (
        <div>
          <div className="code-tabs">
            {['brew','curl','docker'].map(t => (
              <button key={t} onClick={() => setTab(t)} className={tab === t ? 'active' : ''}>
                {t}
              </button>
            ))}
          </div>
          <div style={{ position: 'relative', maxWidth: 520 }}>
            <pre className="code-well" style={{ margin: 0 }}>
              <span className="cmt">$ </span>
              <span style={{ color: 'var(--fg1)' }}>{snippets[tab]}</span>
            </pre>
            <CopyBtn text={snippets[tab]}/>
          </div>
          <div style={{ marginTop: 10, fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--fg3)' }}>
            ~14 MB · macOS, Linux, Windows · sized for your box
          </div>
        </div>
      );
    };

    // ==================================================================
    // Pillars — 4 testable claims that define what's different about beava.
    // 2x2 grid desktop, 1x4 mobile. No icons — text-only reads honest, not
    // clip-art. Each card links to the /docs page that backs the claim.
    // Replaces the former WhatIsThis + LayerCard pattern.
    // ==================================================================
    const Pillars = () => {
      const pillars = [
        {
          title: 'REPLACES REDIS + LUA',
          body: 'The exact shape of rules you\'re scripting in Redis today, as a single Python file. Atomic across every feature per event. No race conditions, no Lua repo to maintain.',
          href: 'docs/compare/vs-redis-lua/',
        },
        {
          title: 'NO STREAMING STACK',
          body: 'No Kafka. No Flink. No Zookeeper. One binary, one box. Scale by RAM and cores, not by adding nodes and coordinators.',
          href: 'docs/operations/',
        },
        {
          title: 'CRASH-SAFE BY DEFAULT',
          body: 'WAL-backed writes. Your data is on disk before the HTTP 200 returns. Snapshot recovery in seconds per GB. No data engineer on call.',
          href: 'docs/operations/#durability',
        },
        {
          title: 'APACHE 2.0, FOREVER',
          body: 'No license server. No phone-home. No feature gates. Fork it, embed it, run it wherever your users are. Actually yours.',
          href: 'https://github.com/beava-dev/beava/blob/main/LICENSE',
        },
      ];
      return (
        <section style={{ padding: '96px 28px', background: 'var(--bg-alt)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ maxWidth: 1000, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 40 }}>
              <Eyebrow style={{ marginBottom: 12 }}>What&apos;s different</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(28px, 4vw, 40px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: 0, textWrap: 'balance' }}>
                The realtime features you&apos;d build anyway. Without the stack you&apos;d have to run.
              </h2>
            </div>
            <div className="pillars-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 24 }}>
              {pillars.map(p => (
                <a key={p.title} href={p.href} style={{
                  display: 'block',
                  padding: '28px 30px',
                  background: '#fff',
                  border: '1px solid var(--border)',
                  borderRadius: 14,
                  textDecoration: 'none',
                  color: 'inherit',
                  boxShadow: 'var(--shadow-xs)',
                  transition: 'transform 180ms, box-shadow 180ms',
                }}>
                  <div style={{
                    fontFamily: 'var(--font-sans)',
                    fontWeight: 800,
                    fontSize: 13,
                    letterSpacing: '0.08em',
                    color: 'var(--accent)',
                    marginBottom: 10,
                  }}>{p.title}</div>
                  <div style={{
                    fontFamily: 'var(--font-sans)',
                    fontSize: 15.5,
                    lineHeight: 1.55,
                    color: 'var(--fg2)',
                    textWrap: 'pretty',
                  }}>{p.body}</div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // ==================================================================
    // NoteArrow — Gaegu-accent inline margin note. Used in PipelineShowcase
    // to tie the hero widget's live stats (FED / STREAK / P99 CLICKSPEED) back
    // to the specific lines of Python that produce them.
    // ==================================================================
    const NoteArrow = ({ children }) => (
      <span style={{
        fontFamily: 'var(--font-accent)',
        color: 'var(--accent)',
        fontSize: '1.05em',
        fontWeight: 700,
        marginLeft: 10,
        letterSpacing: '0.005em',
      }}>{children}</span>
    );

    // ==================================================================
    // Pipeline showcase — the single pipeline section. Full 18-line file
    // with inline margin notes calling out the three hero widget stats.
    // Merges the former InlinePipelinePeek + PipelineShowcase duplicates.
    // ==================================================================
    const PipelineShowcase = () => {
      const code = `# This file literally runs beava.dev. Source:
# github.com/beava-dev/beava/tree/main/demo/feed-the-beaver
import beava as bv

@bv.stream
class FeedClick:
    session_id: str
    click_speed_ms: int        # ms since reader's previous click

@bv.table(key="session_id")
def Session(e: FeedClick):
    return e.agg(
        my_feeds  = bv.count(),
        my_streak = bv.consecutive(),
    )

@bv.table(key="__global__")
def Global(e: FeedClick):
    return e.agg(
        p99_clickspeed = bv.p99(e.click_speed_ms, window="1h"),
        visitors_1h    = bv.distinct(e.session_id, window="1h"),
    )

bv.App("0.0.0.0:6400").register(FeedClick, Session, Global).serve()`;
      return (
        <section style={{ padding: '96px 28px' }}>
          <div style={{ maxWidth: 1000, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 40 }}>
              <Eyebrow style={{ marginBottom: 14 }}>The homepage runs beava</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(28px, 4vw, 44px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '6px 0 14px' }}>
                18 lines. That's the whole pipeline.
              </h2>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.6, color: 'var(--fg2)', maxWidth: 640, margin: '0 auto' }}>
                Every click you make over there pushes a real event to this pipeline. Every stat you see is a real feature query. It's turtles all the way down.
              </p>
            </div>
            <div style={{ position: 'relative', maxWidth: 820, margin: '0 auto' }}>
              <pre className="code-well" style={{ fontSize: 14, padding: '26px 28px', lineHeight: 1.75 }}>
                <span className="cmt"># This file literally runs beava.dev. Source:{'\n'}# github.com/beava-dev/beava/tree/main/demo/feed-the-beaver</span>{'\n'}
                <span className="kw">import</span> beava <span className="kw">as</span> bv{'\n'}{'\n'}
                <span className="fn">@bv.stream</span>{'\n'}
                <span className="kw">class</span> <span className="ty">FeedClick</span>:{'\n'}
                {'    '}session_id: <span className="ty">str</span>{'\n'}
                {'    '}click_speed_ms: <span className="ty">int</span>{'        '}<span className="cmt"># ms since reader's previous click</span>{'\n'}
                <span className="cmt">    # session_id regenerated every refresh — no cookies, no tracking.</span>{'\n'}{'\n'}
                <span className="fn">@bv.table</span>(key=<span className="str">"session_id"</span>){'\n'}
                <span className="kw">def</span> <span className="fn">Session</span>(e: FeedClick):{'\n'}
                {'    '}<span className="kw">return</span> e.<span className="fn">agg</span>({'\n'}
                {'        '}my_feeds  = bv.<span className="fn">count</span>(),<NoteArrow>← "FED"</NoteArrow>{'\n'}
                {'        '}my_streak = bv.<span className="fn">consecutive</span>(),<NoteArrow>← "STREAK"</NoteArrow>{'\n'}
                {'    '}){'\n'}{'\n'}
                <span className="fn">@bv.table</span>(key=<span className="str">"__global__"</span>){'\n'}
                <span className="kw">def</span> <span className="fn">Global</span>(e: FeedClick):{'\n'}
                {'    '}<span className="kw">return</span> e.<span className="fn">agg</span>({'\n'}
                {'        '}p99_clickspeed = bv.<span className="fn">p99</span>(e.click_speed_ms, window=<span className="str">"1h"</span>),<NoteArrow>← "P99 CLICKSPEED (1h)"</NoteArrow>{'\n'}
                {'        '}visitors_1h{'    '}= bv.<span className="fn">distinct</span>(e.session_id, window=<span className="str">"1h"</span>),{'\n'}
                {'    '}){'\n'}{'\n'}
                bv.<span className="fn">App</span>(<span className="str">"0.0.0.0:6400"</span>).<span className="fn">register</span>(FeedClick, Session, Global).<span className="fn">serve</span>()
              </pre>
              <CopyBtn text={code}/>
            </div>

            <div style={{ textAlign: 'center', marginTop: 28, fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--fg3)' }}>
              No cookies, no localStorage, no user-agent logging. Refresh for a fresh beaver.
            </div>
          </div>
        </section>
      );
    };

    // ==================================================================
    // Recipe grid — 5 cards, one per production-shaped use case. Each
    // links to /guide/recipes/<slug>. Mascot pose varies per card for
    // visual rhythm. Per design doc: personalization, fraud, leaderboard,
    // rate-limiting, usage-metering.
    // ==================================================================
    const RecipeGrid = () => {
      const recipes = [
        { slug: 'personalization', title: 'Personalization', caption: 'Category + top trending. No ML required.', mascot: 'assets/mascot-work-pose.svg', mw: 88, mh: 88 },
        { slug: 'fraud',           title: 'Fraud detection', caption: 'Velocity, buy intent, login streak failure.', mascot: 'assets/mascot-pose-2.svg',  mw: 88, mh: 88 },
        { slug: 'leaderboard',     title: 'Leaderboard',     caption: 'Ranking, top-K, rolling windows.',            mascot: 'assets/mascot-pose-3.svg',  mw: 88, mh: 88 },
        { slug: 'rate-limiting',   title: 'Rate limiting',   caption: 'Per-IP, per-fingerprint. Threshold + ban.',   mascot: 'assets/mascot-mark-geometric.png', mw: 120, mh: 80 },
        { slug: 'usage-metering',  title: 'Usage metering',  caption: 'Seat counts, quotas, billing meters.',        mascot: 'assets/logo-mark.png',       mw: 88, mh: 88 },
      ];
      return (
        <section style={{ padding: '96px 28px' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 40 }}>
              <Eyebrow style={{ marginBottom: 12 }}>What you can build</Eyebrow>
              <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(28px, 4vw, 44px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: 0 }}>
                Five real features. One pipeline each.
              </h2>
            </div>
            <div className="recipe-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 16 }}>
              {recipes.map(r => (
                <a key={r.slug} href={`guide/recipes/${r.slug}/`} style={{
                  display: 'flex',
                  flexDirection: 'column',
                  padding: '24px 20px 22px',
                  background: 'var(--beava-paper)',
                  border: '1px solid var(--border)',
                  borderRadius: 16,
                  textDecoration: 'none',
                  color: 'inherit',
                  boxShadow: 'var(--shadow-xs)',
                  minHeight: 260,
                  transition: 'transform 180ms, box-shadow 180ms',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 96, marginBottom: 14 }}>
                    <img src={r.mascot} alt="" width={r.mw} height={r.mh} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }}/>
                  </div>
                  <h3 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 20, color: 'var(--fg1)', margin: '0 0 8px', letterSpacing: '-0.01em' }}>
                    {r.title}
                  </h3>
                  <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5, color: 'var(--fg2)', margin: '0 0 16px', flex: 1, textWrap: 'pretty' }}>
                    {r.caption}
                  </p>
                  <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 600, color: 'var(--accent)' }}>
                    See recipe →
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    };

    // ==================================================================
    // Guide teaser — points at Chapter 1, the pedagogy chapter that
    // teaches beava as "stream operations look like dataframe operations."
    // Interactive widgets in the chapter (EventsTable, AggregationTable,
    // ClickButton, WindowDemo) make the reader operate the abstraction.
    // ==================================================================
    const GuideTeaser = () => (
      <section style={{ padding: '64px 28px 96px' }}>
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <a href="guide/chapter-1/" style={{
            display: 'grid', gridTemplateColumns: '1fr 260px', gap: 40, alignItems: 'center',
            background: 'var(--beava-paper)', border: '1px solid var(--border)', borderRadius: 20,
            padding: 36, textDecoration: 'none', color: 'inherit',
            boxShadow: 'var(--shadow-pop)',
          }} className="two-col">
            <div>
              <div style={{ fontFamily: 'var(--font-accent)', fontSize: 26, fontWeight: 700, color: 'var(--accent)', lineHeight: 1, transform: 'rotate(-2deg)', display: 'inline-block', marginBottom: 8 }}>
                Chapter 1 →
              </div>
              <h3 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 32, lineHeight: 1.15, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '4px 0 12px' }}>
                Event = row. Stream = dataframe.
              </h3>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.6, color: 'var(--fg2)', margin: '0 0 14px', maxWidth: 540 }}>
                If you know pandas, you already know beava. In about 10 minutes and zero installs, you&apos;ll see why stream operations look like dataframe operations.
              </p>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--accent)', fontWeight: 600 }}>
                Start Chapter 1 <Icon name="arrow" size={14}/>
              </div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center' }}>
              <img src="assets/mascot-work-pose.svg" width={220} height={220}/>
            </div>
          </a>
        </div>
      </section>
    );

    // ==================================================================
    // Trust numbers band — compressed proof strip. Three stats, each with
    // a link into /docs for the full story. Absorbs the dropped FAST
    // pillar + the standalone Durability + Perf sections from the 18:50
    // queue.
    // ==================================================================
    const TrustBand = () => (
      <section style={{ padding: '56px 28px', background: 'var(--bg-alt)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
        <div style={{ maxWidth: 1000, margin: '0 auto' }}>
          <Eyebrow style={{ textAlign: 'center', marginBottom: 24 }}>By the numbers</Eyebrow>
          <div className="stats-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 28, textAlign: 'center' }}>
            <div>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(22px, 2.6vw, 28px)', fontWeight: 600, color: 'var(--fg1)', letterSpacing: '-0.01em', marginBottom: 6 }}>
                ~3M events/sec/core
              </div>
              <a href="docs/performance/" style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--accent)', fontWeight: 600, textDecoration: 'none' }}>
                benchmarks →
              </a>
            </div>
            <div>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(22px, 2.6vw, 28px)', fontWeight: 600, color: 'var(--fg1)', letterSpacing: '-0.01em', marginBottom: 6 }}>
                Recovery ~8s/GB
              </div>
              <a href="docs/operations/" style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--accent)', fontWeight: 600, textDecoration: 'none' }}>
                operations →
              </a>
            </div>
            <div>
              <div style={{ fontFamily: 'var(--font-serif)', fontSize: 'clamp(22px, 2.6vw, 28px)', fontWeight: 600, color: 'var(--fg1)', letterSpacing: '-0.01em', marginBottom: 6 }}>
                ~7KB per entity
              </div>
              <a href="docs/operations/#memory" style={{ fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--accent)', fontWeight: 600, textDecoration: 'none' }}>
                memory planning →
              </a>
            </div>
          </div>
        </div>
      </section>
    );

    // ==================================================================
    // Final install CTA — bottom-of-page conversion. Install tabs repeat
    // + GitHub star badge + GH Discussions pointer. Matches the "every
    // landing-page-conversion pattern ends at install" discipline.
    // ==================================================================
    const FinalCTA = () => (
      <section style={{ padding: '80px 28px 56px' }}>
        <div style={{ maxWidth: 720, margin: '0 auto', textAlign: 'center' }}>
          <Eyebrow style={{ marginBottom: 14 }}>Get started</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(28px, 4vw, 40px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '0 0 30px' }}>
            One binary. Zero config. Ten minutes.
          </h2>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 22 }}>
            <InstallTabs/>
          </div>
          <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap', marginBottom: 18 }}>
            <Button variant="secondary" size="md" iconLeft={<Icon name="github" size={14}/>} href="https://github.com/beava-dev/beava" target="_blank" rel="noopener">
              Star on GitHub&nbsp;<span style={{ color: 'var(--fg3)', fontWeight: 500, marginLeft: 4 }}>· 8.2k</span>
            </Button>
          </div>
          <div style={{ fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--fg3)' }}>
            Questions? <a href="https://github.com/beava-dev/beava/discussions" target="_blank" rel="noopener" style={{ color: 'var(--accent)', textDecoration: 'none', fontWeight: 600 }}>github.com/beava/discussions&nbsp;→</a>
          </div>
        </div>
      </section>
    );

    // ==================================================================
    const App = () => (
      <>
        <Banner id="cloud-waitlist-v1">
          beava cloud · managed from $50/mo · join the waitlist
        </Banner>
        <Nav active="home"/>
        <Hero/>
        <PipelineShowcase/>
        <Pillars/>
        <RecipeGrid/>
        <GuideTeaser/>
        <TrustBand/>
        <FinalCTA/>
        <Footer/>
      </>
    );
