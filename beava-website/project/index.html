<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>beava — real-time user features without heavy streaming infra</title>
  <meta name="description" content="Define aggregations in Python, POST events over HTTP, and query fresh values by key in sub-millisecond latency. One binary. No Kafka, Flink, brokers, clusters, or stream jobs.">
  <link rel="stylesheet" href="styles/colors_and_type.css">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png"><link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png"><link rel="shortcut icon" href="/assets/favicon.ico">
</head>
<body class="beava">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/Shared.jsx"></script>
  <script type="text/babel" src="js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    // beava.dev homepage — Hero · PipelineShowcase · Pillars · FinalCTA

    // LiveQueriesPanel — chat7 (2026-05-09) hero, refit to query the REAL
    // SiteMetrics pipeline that backs this site. Polls /api/get every
    // 1.5s; values you see are the live row from the production beava
    // instance.
    //
    // Each card shows both sides of the loop:
    //
    //   Top row:    app.get("SiteMetrics")["<feature>"]   ← what a client types
    //   Bottom row: → bv.<op>(...) = <live value>          ← the operator that
    //                                                        defined the feature,
    //                                                        plus its current value
    //
    // The three features map 1:1 to register_pipeline.py:
    //
    //   page_views_24h  ← bv.count(window="24h")
    //   median_dwell_1h ← bv.quantile("dwell_ms", q=0.5, window="1h")
    //   top_page_1h     ← bv.top_k("path", k=1, window="1h")
    //
    // PipelineOutput below polls the same endpoint independently (different
    // cadence) — fault-tolerance: one panel surviving doesn't block the
    // other. Cold-start fallback values match PipelineOutput's SEED.
    const SITE_METRICS_SEED = {
      page_views_24h: 14207,
      median_dwell_1h: 6250.0,
      top_page_1h: [{ value: '/', count: 412 }],
    };

    const QUERY_ROWS = [
      {
        id: 'page_views_24h',
        feature: 'page_views_24h',
        op: { fn: 'bv.count', args: [{ k: 'window', v: '"24h"' }] },
        fmt: (n) => Math.round(n || 0).toLocaleString('en-US'),
        pick: (d) => d.page_views_24h ?? 0,
      },
      {
        id: 'median_dwell_1h',
        feature: 'median_dwell_1h',
        op: { fn: 'bv.quantile', args: [{ v: '"dwell_ms"' }, { k: 'q', v: '0.5' }, { k: 'window', v: '"1h"' }] },
        fmt: (ms) => `${((ms || 0) / 1000).toFixed(1)}s`,
        pick: (d) => d.median_dwell_1h ?? 0,
      },
      {
        id: 'top_page_1h',
        feature: 'top_page_1h',
        op: { fn: 'bv.top_k', args: [{ v: '"path"' }, { k: 'k', v: '1' }, { k: 'window', v: '"1h"' }] },
        fmt: (top) => top ? `${JSON.stringify(top.value)} · ${(top.count || 0).toLocaleString('en-US')}` : '—',
        pick: (d) => Array.isArray(d.top_page_1h) ? d.top_page_1h[0] : null,
      },
    ];

    // Renders `fn(arg, key=val, ...)` with syntax-coloured tokens. Args
    // shaped `{ v }` render positional; `{ k, v }` render as kwargs.
    // Optional `index` appends `["<index>"]` after the closing paren —
    // for queries that read one feature out of a row dict.
    const Signature = ({ fn, args, index }) => (
      <React.Fragment>
        <span style={{ color: 'var(--code-fn)' }}>{fn}</span>
        <span style={{ color: 'var(--fg3)' }}>(</span>
        {args.map((a, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span style={{ color: 'var(--fg3)' }}>, </span>}
            {a.k && (
              <React.Fragment>
                <span style={{ color: 'var(--code-keyword)' }}>{a.k}</span>
                <span style={{ color: 'var(--fg3)' }}>=</span>
              </React.Fragment>
            )}
            <span style={{ color: 'var(--code-string)' }}>{a.v}</span>
          </React.Fragment>
        ))}
        <span style={{ color: 'var(--fg3)' }}>)</span>
        {index && (
          <React.Fragment>
            <span style={{ color: 'var(--fg3)' }}>[</span>
            <span style={{ color: 'var(--code-string)' }}>"{index}"</span>
            <span style={{ color: 'var(--fg3)' }}>]</span>
          </React.Fragment>
        )}
      </React.Fragment>
    );

    const QueryCard = ({ row, pulse }) => {
      const text = row.fmt ? row.fmt(row.value) : String(row.value);
      return (
        <div style={{
          background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
          padding: '12px 16px', boxShadow: 'var(--shadow-sm)',
          display: 'flex', flexDirection: 'column', gap: 6,
          minWidth: 0,
        }}>
          {/* Top row — the dict-access on `row` (hoisted to panel header) */}
          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 500,
            color: 'var(--fg2)', minWidth: 0, overflow: 'hidden',
            textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>
            <span style={{ color: 'var(--fg3)' }}>row</span>
            <span style={{ color: 'var(--fg3)' }}>[</span>
            <span style={{ color: 'var(--code-string)' }}>"{row.feature}"</span>
            <span style={{ color: 'var(--fg3)' }}>]</span>
          </div>
          {/* Bottom row — arrow → operator that computed the result = value */}
          <div style={{
            display: 'flex', alignItems: 'baseline', flexWrap: 'wrap',
            columnGap: 8, rowGap: 4, minWidth: 0,
            fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 500,
            color: 'var(--fg2)',
          }}>
            <span style={{ color: 'var(--accent)', fontSize: 14, fontWeight: 600 }}>→</span>
            <span style={{
              minWidth: 0, overflow: 'hidden',
              textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%',
            }}>
              <Signature {...row.op}/>
            </span>
            <span style={{ color: 'var(--fg3)' }}>=</span>
            <span key={text} style={{
              fontFamily: 'var(--font-mono)', fontSize: 14.5, fontWeight: 600,
              color: 'var(--fg1)',
              background: pulse ? 'var(--beava-orange-wash)' : 'transparent',
              padding: '1px 8px', borderRadius: 6,
              transition: 'background 600ms cubic-bezier(0.22,1,0.36,1)',
              whiteSpace: 'nowrap',
              animation: 'beava-fade-up 320ms cubic-bezier(0.22,1,0.36,1)',
            }}>{text}</span>
          </div>
        </div>
      );
    };

    const LiveQueriesPanel = () => {
      const [data, setData] = React.useState(SITE_METRICS_SEED);
      const [pulseId, setPulseId] = React.useState(null);
      const [isLive, setIsLive] = React.useState(false);

      React.useEffect(() => {
        let cancelled = false;
        let prev = SITE_METRICS_SEED;
        let pulseTimer = null;
        const refresh = async () => {
          try {
            const r = await fetch('/api/get', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ table: 'SiteMetrics', key: '' }),
            });
            if (cancelled || !r.ok) return;
            const j = await r.json();
            if (!j || typeof j !== 'object') return;
            // Diff against previous to find the first changed feature; pulse it.
            for (const r of QUERY_ROWS) {
              if (JSON.stringify(r.pick(prev)) !== JSON.stringify(r.pick(j))) {
                setPulseId(r.id);
                if (pulseTimer) clearTimeout(pulseTimer);
                pulseTimer = setTimeout(() => setPulseId(null), 700);
                break;
              }
            }
            prev = j;
            setData(j);
            setIsLive(true);
          } catch (_) { /* keep previous on transient failure */ }
        };
        refresh();
        const id = setInterval(refresh, 1500);
        return () => { cancelled = true; clearInterval(id); if (pulseTimer) clearTimeout(pulseTimer); };
      }, []);

      const rows = QUERY_ROWS.map(r => ({ ...r, value: r.pick(data) }));
      return (
        <div style={{ position: 'relative' }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: 8, paddingLeft: 4,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{
                fontFamily: 'var(--font-sans)', fontSize: 12, fontWeight: 600,
                textTransform: 'uppercase', letterSpacing: '0.1em',
                color: 'var(--accent)',
              }}>Live feature queries</div>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <span style={{
                  width: 7, height: 7, borderRadius: 999,
                  background: isLive ? 'var(--beava-success)' : 'var(--border-strong)',
                  boxShadow: isLive ? '0 0 0 3px rgba(74,122,58,0.20)' : 'none',
                  animation: isLive ? 'beava-pulse 2s cubic-bezier(0.65,0,0.35,1) infinite' : 'none',
                }}/>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)' }}>{isLive ? 'live' : 'seed'}</span>
              </span>
            </div>
          </div>
          {/* Hoisted query — every card below reads a feature out of `row` */}
          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--fg2)',
            paddingLeft: 4, marginBottom: 14, fontWeight: 500,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>
            <span style={{ color: 'var(--fg3)' }}>row </span>
            <span style={{ color: 'var(--fg3)' }}>=</span>{' '}
            <span style={{ color: 'var(--code-fn)' }}>app.get</span>
            <span style={{ color: 'var(--fg3)' }}>(</span>
            <span style={{ color: 'var(--code-string)' }}>"SiteMetrics"</span>
            <span style={{ color: 'var(--fg3)' }}>)</span>
          </div>
          <div style={{
            display: 'grid', gridTemplateColumns: 'auto 1fr auto', alignItems: 'center', gap: 10,
            marginBottom: 14, padding: '0 4px',
          }}>
            <span style={{
              fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg3)',
              padding: '3px 9px', background: 'var(--beava-paper)',
              border: '1px solid var(--border)', borderRadius: 999,
            }}>POST /push</span>
            <span style={{
              height: 1, background: 'repeating-linear-gradient(90deg, var(--border-strong) 0 4px, transparent 4px 8px)',
            }}/>
            <span style={{
              fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--accent)',
              padding: '3px 9px', background: 'var(--beava-orange-wash)',
              border: '1px solid #f1d8c2', borderRadius: 999,
            }}>fresh values</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 12 }}>
            {rows.map(r => <QueryCard key={r.id} row={r} pulse={pulseId === r.id}/>)}
          </div>
          <p style={{
            margin: '14px 4px 0',
            fontFamily: 'var(--font-sans)', fontSize: 12.5, color: 'var(--fg3)',
            fontStyle: 'italic', lineHeight: 1.5,
          }}>
            One <code style={{ fontFamily: 'var(--font-mono)', fontStyle: 'normal', color: 'var(--fg2)' }}>app.get</code> reads the row; each feature is a <code style={{ fontFamily: 'var(--font-mono)', fontStyle: 'normal', color: 'var(--fg2)' }}>bv.*</code> aggregation defined once at register time. Fed by HTTP events, served in <span style={{ color: 'var(--fg2)', fontStyle: 'normal' }}>&lt;1ms</span>.
            {' '}
            <a href="#pipeline" style={{
              color: 'var(--accent)', textDecoration: 'none',
              borderBottom: '1px solid color-mix(in oklab, var(--accent) 35%, transparent)',
              fontStyle: 'normal', fontWeight: 500,
            }}>See the pipeline ↓</a>
          </p>
        </div>
      );
    };

    // v0 install surface: pip (recommended) / docker / cargo. brew
    // retired (pip wheels still ship to GH Releases / PyPI for SDK users —
    // see python/README.md). pip install is the canonical first-touch path:
    // detects platform, pulls the matching wheel from the latest GH Release,
    // Docker is the zero-deps host alternative.
    // cargo is the from-source path for Rust-toolchain users.
    // Backslash-newline continuation in `cmd` is honored by the renderer
    // (whiteSpace: 'pre') and copy-pastes correctly: shell ignores `\\\n`
    // and runs the command as one logical line.
    const INSTALL_TABS = [
      { id: 'curl',   label: 'curl',   cmd: 'curl -fsSL https://raw.githubusercontent.com/beava-dev/beava/main/scripts/install.sh \\\n  | sh', recommended: true },
      { id: 'docker', label: 'docker', cmd: 'docker run -p 8080:8080 beavadev/beava:edge' },
      { id: 'cargo',  label: 'cargo',  cmd: 'cargo install --git https://github.com/beava-dev/beava beava-server' },
    ];

    const InstallTabs = () => {
      const [tabId, setTabId] = React.useState('curl');
      const [copied, setCopied] = React.useState(false);
      const tab = INSTALL_TABS.find(t => t.id === tabId);
      const copy = () => {
        navigator.clipboard?.writeText(tab.cmd);
        setCopied(true);
        setTimeout(() => setCopied(false), 1400);
      };
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: 'flex', gap: 2, paddingLeft: 4 }}>
            {INSTALL_TABS.map(t => {
              const active = t.id === tabId;
              return (
                <button key={t.id} onClick={() => setTabId(t.id)} style={{
                  padding: '6px 12px 8px', borderRadius: '8px 8px 0 0',
                  background: active ? 'var(--code-bg)' : 'transparent',
                  border: '1px solid', borderColor: active ? 'var(--border)' : 'transparent',
                  borderBottom: active ? '1px solid var(--code-bg)' : '1px solid var(--border)',
                  position: 'relative', top: 1,
                  fontFamily: 'var(--font-mono)', fontSize: 12.5,
                  fontWeight: active ? 600 : 500,
                  color: active ? 'var(--fg1)' : 'var(--fg3)',
                  cursor: 'pointer',
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  transition: 'color 200ms',
                }}>
                  {t.label}
                  {t.recommended && (
                    <span style={{
                      fontFamily: 'var(--font-sans)', fontSize: 9.5, fontWeight: 700,
                      letterSpacing: '0.04em', textTransform: 'uppercase',
                      color: 'var(--accent)', background: 'var(--beava-orange-wash)',
                      padding: '1px 5px', borderRadius: 3,
                    }}>recommended</span>
                  )}
                </button>
              );
            })}
            <div style={{ flex: 1, borderBottom: '1px solid var(--border)' }}/>
          </div>
          <div style={{
            display: 'flex', alignItems: 'flex-start', gap: 12,
            padding: '12px 14px',
            background: 'var(--code-bg)', border: '1px solid var(--border)', borderTop: 'none',
            borderRadius: '0 10px 10px 10px',
            boxShadow: 'var(--shadow-inset)',
          }}>
            <span style={{ color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 14, userSelect: 'none', lineHeight: 1.55 }}>$</span>
            <code style={{
              fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--code-fg)',
              background: 'transparent', border: 0, padding: 0, flex: 1, minWidth: 0,
              /* `pre-wrap` honors literal \n in the cmd while soft-wrapping long
                 lines (URLs, mostly) on width. `overflow-wrap: anywhere` lets URLs
                 break at any character; without it pre-wrap would still let an
                 unbroken URL push past the column edge. */
              whiteSpace: 'pre-wrap', overflowWrap: 'anywhere', lineHeight: 1.55,
            }}>{tab.cmd}</code>
            <button onClick={copy} title="Copy" style={{
              fontFamily: 'var(--font-mono)', fontSize: 12,
              padding: '4px 10px',
              background: copied ? 'var(--beava-success-wash)' : '#fff',
              color: copied ? 'var(--beava-success)' : 'var(--fg2)',
              border: '1px solid', borderColor: copied ? '#cdd9b6' : 'var(--border)',
              borderRadius: 6, cursor: 'pointer', fontWeight: 600,
              display: 'inline-flex', alignItems: 'center', gap: 5,
              transition: 'all 200ms', whiteSpace: 'nowrap',
            }}>{copied ? '✓ copied' : '⎘ copy'}</button>
          </div>
        </div>
      );
    };

    const Hero = () => (
      <section style={{ padding: '56px 24px 96px', position: 'relative', overflow: 'hidden' }}>
        <div className="beava-hero-grid" style={{
          maxWidth: 1200, margin: '0 auto',
          display: 'grid', gridTemplateColumns: 'minmax(0, 1.05fr) minmax(0, 1fr)', gap: 80, alignItems: 'center',
        }}>
          <div>
            {/* Eyebrow does work now: license · binary · language. Clickable to GitHub. */}
            <a href="https://github.com/beava-dev/beava" target="_blank" rel="noopener" style={{
              display: 'inline-flex', alignItems: 'center', gap: 10,
              padding: '5px 12px 5px 10px', borderRadius: 999,
              background: 'var(--beava-orange-wash)', border: '1px solid #f1d8c2',
              color: 'var(--accent)', fontSize: 12.5, fontWeight: 600,
              marginBottom: 22, fontFamily: 'var(--font-sans)',
              whiteSpace: 'nowrap', flexWrap: 'nowrap', textDecoration: 'none',
              transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = '#f1d8c2'; e.currentTarget.style.transform = ''; }}>
              <span style={{ width: 6, height: 6, background: 'var(--accent)', borderRadius: 999, boxShadow: '0 0 0 3px rgba(184,92,32,0.18)' }}/>
              <span>Apache 2.0</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>single binary</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>Python-defined streams</span>
              <span style={{ color: 'var(--fg3)', fontSize: 11, marginLeft: 2 }}>↗</span>
            </a>
            <div style={{ marginBottom: 14 }}>
              <span style={{
                fontFamily: 'var(--font-accent)', fontWeight: 700,
                fontSize: 24, lineHeight: 1, color: 'var(--accent)',
                transform: 'rotate(-2deg)', transformOrigin: 'left center',
                display: 'inline-block',
              }}>Dam good at streams.</span>
            </div>
            <h1 style={{
              fontFamily: 'var(--font-serif)', fontWeight: 600,
              fontSize: 'clamp(38px, 4.8vw, 60px)',
              lineHeight: 1.1, letterSpacing: '-0.02em',
              color: 'var(--fg1)', margin: '0 0 28px',
              maxWidth: 620, textWrap: 'balance',
            }}>Real-time user features <em style={{ color: 'var(--accent)', fontStyle: 'italic' }}>without streaming infra.</em></h1>
            <p style={{
              fontFamily: 'var(--font-sans)', fontWeight: 400,
              fontSize: 17.5, lineHeight: 1.55,
              color: 'var(--fg2)', margin: '0 0 32px',
              maxWidth: 540, textWrap: 'pretty',
            }}>Define aggregations in Python, POST events over HTTP, and query fresh values by key in sub-millisecond latency. One binary. No Kafka, Flink, brokers, clusters, or stream jobs.</p>
            <InstallTabs/>
            {/* Single primary CTA + Read-docs as a quiet text link. Discord lives in the nav. */}
            <div style={{ display: 'flex', gap: 18, alignItems: 'center', marginTop: 20, flexWrap: 'wrap' }}>
              <Button variant="primary" size="lg" href="/docs/get-started/quickstart/" icon={<Icon name="arrow" size={16}/>}>Run quickstart</Button>
              <a href="/docs/" style={{
                fontFamily: 'var(--font-sans)', fontSize: 14.5, fontWeight: 500,
                color: 'var(--fg2)', textDecoration: 'none',
                borderBottom: '1px solid color-mix(in oklab, var(--fg3) 35%, transparent)',
                paddingBottom: 1,
              }}>Read the docs →</a>
            </div>
            {/* Support strip — replaces the secondary-CTA cluster with a fact line */}
            <div style={{
              marginTop: 22, paddingLeft: 4,
              fontFamily: 'var(--font-sans)', fontSize: 13, color: 'var(--fg3)',
              lineHeight: 1.5,
            }}>
              ~14 MB <span style={{ color: 'var(--border-strong)' }}>·</span> macOS, Linux, Windows
              <span style={{ color: 'var(--border-strong)' }}> · </span> runs on 1 GB RAM
              <span style={{ color: 'var(--border-strong)' }}> · </span> scales to one big box
            </div>
          </div>
          <div style={{ position: 'relative', minWidth: 0 }}>
            {/* Mascot peek — top-right, slight rotation, drop-shadow.
                Anchored to the right column's right edge (right: 0) so it
                can't push past the viewport on narrower grids — clamps
                inward instead of outward. */}
            <img src="/assets/mascot-pose-2.svg" alt="" width={108} height={108} className="beava-hero-mascot" style={{
              position: 'absolute',
              top: -82, right: 0,
              transform: 'rotate(8deg)',
              filter: 'drop-shadow(0 6px 14px rgba(26,23,20,0.12))',
              pointerEvents: 'none', zIndex: 2,
            }}/>
            <LiveQueriesPanel/>
          </div>
        </div>
        <style>{`
          @keyframes beava-fade-up {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
          }
          @keyframes beava-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.4); opacity: 0.55; }
          }
          @media (max-width: 960px) {
            .beava-hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
            .beava-hero-mascot { display: none !important; }
            .beava-pillars-grid { grid-template-columns: repeat(2, 1fr) !important; }
          }
          @media (max-width: 760px) {
            section { padding-left: 18px !important; padding-right: 18px !important; }
            .beava-hero-grid > div:first-child > a:first-child { white-space: normal !important; flex-wrap: wrap !important; }
            .bv-metric-mascot { width: 56px !important; height: 56px !important; top: 8px !important; right: 8px !important; opacity: 0.7 !important; }
            .bv-metric-label { padding-right: 64px !important; }
            #pipeline { padding: 56px 18px 64px !important; }
            #pipeline pre { padding: 16px 18px !important; font-size: 12.5px !important; line-height: 1.6 !important; }
            #pipeline pre + div { grid-template-columns: 1fr !important; }
            #pipeline pre + div > div { border-right: 0 !important; border-bottom: 1px solid var(--border) !important; }
            #pipeline pre + div > div:last-child { border-bottom: 0 !important; }
            .beava-pillars-grid { grid-template-columns: 1fr !important; }
            .beava-finalcta-grid { grid-template-columns: 1fr !important; }
            .beava-finalcta-founders { flex-direction: column !important; align-items: flex-start !important; }
            .beava-finalcta-mascot { display: none !important; }
            footer .bv-foot-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
          }
          @media (max-width: 480px) {
            section { padding-left: 14px !important; padding-right: 14px !important; }
            .bv-metric-mascot { display: none !important; }
            .bv-metric-label { padding-right: 0 !important; }
            .beava-hero-grid h1 { margin-bottom: 24px !important; }
            .beava-hero-grid h1 + p { font-size: 18px !important; margin-bottom: 24px !important; }
            .bv-site-nav-link { padding: 6px 6px !important; font-size: 13px !important; }
          }
        `}</style>
      </section>
    );

    // ---------- PipelineOutput ----------
    // Live-polled JSON output panel that closes the visual loop: the
    // 13-line site_metrics.py shown above runs against POST /get and
    // returns this JSON shape. Hero LiveQueriesPanel uses representative
    // mock signatures (bv.count / bv.p50 / bv.top_k); the production
    // /api/get poll lives here — every page-view event on this site
    // pushes a real event, and the JSON below is the resulting feature
    // row. Falls back to a static seed shape on cold start so the panel
    // always renders something representative.
    const PipelineOutput = () => {
      const SEED = {
        median_dwell_1h: 6250.0,
        page_views_24h: 14207,
        top_page_1h: [{ value: '/', count: 412 }],
      };
      const [data, setData] = React.useState(null);
      React.useEffect(() => {
        let cancelled = false;
        const refresh = async () => {
          try {
            const r = await fetch('/api/get', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ table: 'SiteMetrics', key: '' }),
            });
            if (cancelled || !r.ok) return;
            const j = await r.json();
            if (j && typeof j === 'object') setData(j);
          } catch (_) { /* keep previous on transient failure */ }
        };
        refresh();
        const id = setInterval(refresh, 3000);
        return () => { cancelled = true; clearInterval(id); };
      }, []);
      const display = data || SEED;
      const isLive = data !== null;
      return (
        <div style={{
          marginTop: 18,
          background: '#fff', border: '1px solid var(--border)',
          borderRadius: 12, boxShadow: 'var(--shadow-sm)',
          overflow: 'hidden',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '8px 14px', borderBottom: '1px solid var(--border)',
            background: 'var(--beava-paper)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--fg2)' }}>
              <span style={{ color: 'var(--fg3)' }}>→</span>
              <span style={{ fontWeight: 600 }}>output</span>
              <span style={{ color: 'var(--fg3)' }}>·</span>
              <span style={{ color: 'var(--fg3)' }}>POST /get  {`{table:"SiteMetrics", key:""}`}</span>
            </div>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-mono)', fontSize: 11, color: isLive ? 'var(--beava-success)' : 'var(--fg3)', whiteSpace: 'nowrap' }}>
              <span style={{ width: 6, height: 6, borderRadius: 999, background: isLive ? 'var(--beava-success)' : 'var(--border-strong)' }}/>
              {isLive ? 'live' : 'seed'}
            </span>
          </div>
          <pre style={{
            margin: 0, padding: '14px 18px',
            fontFamily: 'var(--font-mono)', fontSize: 13, lineHeight: 1.55,
            color: 'var(--code-fg)', background: 'var(--code-bg)',
            border: 0, overflowX: 'auto',
          }}>{JSON.stringify(display, null, 2)}</pre>
        </div>
      );
    };

    // ---------- PipelineShowcase ----------
    const PipelineShowcase = () => {
      const S = {
        kw:  { color: 'var(--code-keyword)' },
        str: { color: 'var(--code-string)' },
        cmt: { color: 'var(--code-comment)', fontStyle: 'italic' },
        fn:  { color: 'var(--code-fn)' },
        num: { color: 'var(--code-number)' },
        ty:  { color: 'var(--code-type)' },
      };
      return (
        <section id="pipeline" style={{ padding: '88px 24px 96px', background: 'var(--beava-cream-deep)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ maxWidth: 1040, margin: '0 auto' }}>
            <div style={{ marginBottom: 36 }}>
              <Eyebrow>The homepage runs beava</Eyebrow>
              <h2 style={{
                fontFamily: 'var(--font-serif)', fontWeight: 600,
                fontSize: 44, lineHeight: 1.1, letterSpacing: '-0.02em',
                color: 'var(--fg1)', margin: '10px 0 14px', maxWidth: 720, textWrap: 'balance',
              }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600 }}>13 lines.</span> That&rsquo;s the whole pipeline.
              </h2>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.55, color: 'var(--fg2)', margin: 0, maxWidth: 640, textWrap: 'pretty' }}>
                Every page view on this site pushes a real event to this pipeline. The JSON below is the live feature row for this exact moment.
              </p>
            </div>
            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 16, boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px', borderBottom: '1px solid var(--border)', background: 'var(--beava-paper)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#ff5f57', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#febc2e', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ width: 11, height: 11, borderRadius: 999, background: '#28c840', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--fg2)', marginLeft: 6 }}>site_metrics.py</span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg3)', padding: '2px 8px', borderRadius: 999, background: '#fff', border: '1px solid var(--border)', marginLeft: 4, whiteSpace: 'nowrap' }}>13 lines</span>
                </div>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--beava-success)', whiteSpace: 'nowrap' }}>
                  <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--beava-success)' }}/>
                  registered on beava.dev
                </span>
              </div>
              <pre style={{ margin: 0, padding: '22px 28px', fontFamily: 'var(--font-mono)', fontSize: 14, lineHeight: 1.7, color: 'var(--code-fg)', background: 'var(--code-bg)', border: 0, borderRadius: 0, boxShadow: 'none', overflowX: 'auto' }}>
<span style={S.kw}>import</span> beava <span style={S.kw}>as</span> bv{'\n'}
{'\n'}
<span style={S.fn}>@bv.event</span>{'\n'}
<span style={S.kw}>class</span> <span style={S.ty}>PageView</span>:{'\n'}
{'    '}session_id: <span style={S.ty}>str</span>{'\n'}
{'    '}path: <span style={S.ty}>str</span>{'\n'}
{'    '}dwell_ms: <span style={S.ty}>int</span>   <span style={S.cmt}># set when the visitor leaves the page</span>{'\n'}
{'\n'}
<span style={S.fn}>@bv.table</span>{'   '}<span style={S.cmt}># no key=  →  one row, site-wide</span>{'\n'}
<span style={S.kw}>def</span> <span style={S.fn}>SiteMetrics</span>(e: <span style={S.ty}>PageView</span>):{'\n'}
{'    '}<span style={S.kw}>return</span> e.<span style={S.fn}>agg</span>({'\n'}
{'        '}<span style={{ background: 'rgba(184,92,32,0.10)', borderRadius: 3, padding: '0 2px' }}>median_dwell_1h</span>  = bv.<span style={S.fn}>quantile</span>(<span style={S.str}>"dwell_ms"</span>, q=<span style={S.num}>0.5</span>, window=<span style={S.str}>"1h"</span>),{'\n'}
{'        '}<span style={{ background: 'rgba(58,106,138,0.10)', borderRadius: 3, padding: '0 2px' }}>page_views_24h</span> = bv.<span style={S.fn}>count</span>(window=<span style={S.str}>"24h"</span>),{'\n'}
{'        '}<span style={{ background: 'rgba(217,122,62,0.12)', borderRadius: 3, padding: '0 2px' }}>top_page_1h</span>      = bv.<span style={S.fn}>top_k</span>(<span style={S.str}>"path"</span>, k=<span style={S.num}>1</span>, window=<span style={S.str}>"1h"</span>),{'\n'}
{'    '}){'\n'}
{'\n'}
bv.<span style={S.fn}>App</span>(<span style={S.str}>"0.0.0.0:8080"</span>).<span style={S.fn}>register</span>(<span style={S.ty}>PageView</span>, <span style={S.fn}>SiteMetrics</span>).<span style={S.fn}>serve</span>(){'\n'}
{'\n'}
<span style={S.cmt}># Query the global row — no key, just the table name.</span>{'\n'}
bv.<span style={S.fn}>get</span>(<span style={S.str}>"SiteMetrics"</span>)  <span style={S.cmt}># → {`{median_dwell_1h: 6_250, views_24h: 14_207, …}`}</span>{'\n'}
{'\n'}
<span style={S.cmt}># Or over HTTP (the panel above is hitting this exact endpoint):</span>{'\n'}
<span style={S.kw}>$</span> curl https://beava.dev/api/get -d '{`{"table":"SiteMetrics","key":""}`}'
              </pre>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0, borderTop: '1px solid var(--border)', background: '#fff' }}>
                {[
                  { color: 'rgba(184,92,32,0.10)', dot: 'var(--accent)',             label: 'median_dwell_1h',  maps: 'Median time on page · 1h' },
                  { color: 'rgba(58,106,138,0.10)', dot: 'var(--beava-info)',        label: 'page_views_24h', maps: 'Page views (last 24h)' },
                  { color: 'rgba(217,122,62,0.12)', dot: 'var(--beava-orange-soft)', label: 'top_page_1h',      maps: 'Top page · this hour' },
                ].map((row, i) => (
                  <div key={row.label} style={{ padding: '14px 18px', borderRight: i < 2 ? '1px solid var(--border)' : 'none', display: 'flex', flexDirection: 'column', gap: 4 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ width: 8, height: 8, borderRadius: 2, background: row.dot }}/>
                      <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, background: row.color, padding: '2px 6px', borderRadius: 4, color: 'var(--code-fg)', border: 0 }}>{row.label}</code>
                    </div>
                    <div style={{ fontFamily: 'var(--font-sans)', fontSize: 12.5, color: 'var(--fg3)', paddingLeft: 16 }}>
                      → <span style={{ color: 'var(--fg2)' }}>{row.maps}</span> in the hero
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {/* D2 — output panel beside the code (live-polled /api/get
                 result), closes the visual loop: 13 lines of source on
                 top, the JSON shape they produce right below it. */}
            <PipelineOutput/>
            <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--fg3)', margin: '20px 4px 0', textAlign: 'center', fontStyle: 'italic' }}>
              No tracking cookies, no fingerprinting. Anonymous session id per visit.
            </p>
          </div>
        </section>
      );
    };

    const PILLARS = [
      { kicker: '01', title: 'Replaces Redis + Lua',  body: 'No more 200-line Lua scripts maintaining counters. beava is the table.', foot: 'redis-cli → bv.get(...)' },
      { kicker: '02', title: 'No streaming stack',    body: 'No Kafka, no Flink, no Schema Registry. One Rust binary, one HTTP port.', foot: '~14 MB · single binary' },
      { kicker: '03', title: 'Crash-safe by default', body: 'WAL on every write. Restart mid-flight; tables come back exactly where they were.', foot: 'fsync configurable, default sane' },
      { kicker: '04', title: 'Apache 2.0, forever',   body: 'No source-available rug-pull. No usage limits. The same binary in the cloud you self-host.', foot: 'github.com/beava-dev/beava', footHref: 'https://github.com/beava-dev/beava' },
    ];

    const Pillars = () => (
      <section style={{ padding: '88px 24px', background: 'var(--bg-alt)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)', position: 'relative', overflow: 'hidden' }}>
        <img src="/assets/mascot-mark-geometric.png" alt="" width={220} height={220}
          style={{ position: 'absolute', top: 24, right: -40, opacity: 0.06, pointerEvents: 'none', transform: 'rotate(8deg)' }}/>
        <div style={{ maxWidth: 1200, margin: '0 auto', position: 'relative' }}>
          <div style={{ textAlign: 'center', marginBottom: 56 }}>
            <Eyebrow>Stream processing shouldn&rsquo;t require a platform team.</Eyebrow>
            <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 44, lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '12px auto 0', maxWidth: 720, textWrap: 'balance' }}>
              What&rsquo;s different
            </h2>
          </div>
          <div className="beava-pillars-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
            {PILLARS.map(p => (
              <div key={p.title} style={{
                background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
                padding: '24px 22px 20px',
                boxShadow: '0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06)',
                display: 'flex', flexDirection: 'column', gap: 12, position: 'relative',
                transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',
              }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 2px 4px rgba(26,23,20,0.04), 0 8px 20px rgba(26,23,20,0.08)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06)'; }}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.02em' }}>{p.kicker}</div>
                <h3 style={{ fontFamily: 'var(--font-sans)', fontWeight: 600, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--fg1)', margin: 0, lineHeight: 1.3 }}>{p.title}</h3>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14.5, lineHeight: 1.55, color: 'var(--fg2)', margin: 0, flex: 1 }}>{p.body}</p>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg3)', paddingTop: 8, borderTop: '1px solid var(--border-inset)' }}>
                  {p.footHref
                    ? <a href={p.footHref} target="_blank" rel="noopener" style={{ color: 'inherit', textDecoration: 'none' }}>{p.foot} ↗</a>
                    : p.foot}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    const FinalCTA = () => (
      <section style={{ padding: '96px 24px', background: 'var(--beava-cream-deep)', borderTop: '1px solid var(--border)' }}>
        <div style={{ maxWidth: 920, margin: '0 auto', textAlign: 'center', position: 'relative' }}>
          {/* Canonical brand lockup — geometric mascot + serif italic wordmark.
              Same lockup as nav, footer, and the README banner. */}
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 14, marginBottom: 18 }}>
            <img src="/assets/mascot-mark-geometric-transparent.png" alt="" width={56} height={56} style={{ display: 'block' }}/>
            <span style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontStyle: 'italic', fontSize: 48, letterSpacing: '-0.025em', lineHeight: 1, color: 'var(--fg1)' }}>beava</span>
          </div>
          <Eyebrow>Three ways in</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 4.5vw, 52px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '12px 0 16px', textWrap: 'balance' }}>
            Install it. Read Chapter 1. Or just lurk.
          </h2>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.55, color: 'var(--fg2)', margin: '0 auto 36px', maxWidth: 620, textWrap: 'pretty' }}>
            The same binary, the same source. Nothing to sign up for.
          </p>
          <div className="beava-finalcta-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, textAlign: 'left' }}>
            {[
              { kicker: 'guidebook',  title: 'Read Chapter 1',     body: 'A 10-minute live build that turns into a per-customer analytics dashboard. No setup beyond the install above.', cta: 'Start Chapter 1 →',           href: '/guide/chapter-1/',                              accent: 'var(--accent)' },
              { kicker: 'github',     title: 'Star on GitHub',     body: 'Apache 2.0. Issues are open. Releases are signed.',                                                          cta: 'github.com/beava-dev/beava →', href: 'https://github.com/beava-dev/beava',             accent: 'var(--fg1)' },
              { kicker: 'community',  title: 'GitHub Discussions', body: 'Half the answers in our docs started as someone asking "is this a bug?" out loud.',                          cta: 'Join the discussion →',        href: 'https://github.com/beava-dev/beava/discussions', accent: 'var(--beava-info)' },
            ].map(c => (
              <a key={c.kicker} href={c.href} target={c.href.startsWith('http') ? '_blank' : undefined} rel={c.href.startsWith('http') ? 'noopener' : undefined} style={{
                background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
                padding: '20px 22px', textDecoration: 'none',
                display: 'flex', flexDirection: 'column', gap: 14,
                transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',

              }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(26,23,20,0.08)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 1px 2px rgba(26,23,20,0.04)'; }}>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: c.accent }}>{c.kicker}</div>
                <div style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 19, lineHeight: 1.25, color: 'var(--fg1)', textWrap: 'balance' }}>{c.title}</div>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5, color: 'var(--fg2)', margin: 0, flex: 1 }}>{c.body}</p>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 500, color: c.accent, marginTop: 4 }}>{c.cta}</div>

            ))}
          </div>
          <div className="beava-finalcta-founders" style={{
            marginTop: 32,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20,
            padding: '18px 24px',
            background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
            boxShadow: '0 1px 2px rgba(26,23,20,0.04)', textAlign: 'left',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <img src="/assets/mascot-pose-3.svg" alt="" width={44} height={44} style={{ display: 'block', flexShrink: 0 }}/>
              <div>
                <div style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 17, lineHeight: 1.3, color: 'var(--fg1)' }}>
                  Want to talk it through with the founders?
                </div>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13.5, lineHeight: 1.45, color: 'var(--fg2)', marginTop: 2 }}>
                  30 minutes, no sales pitch. Bring a use case, a doubt, or a roadmap question.
                </div>
              </div>
            </div>
            <Button variant="primary" size="md" href="https://calendly.com/hoang-beava/30min" target="_blank" rel="noopener" icon={<Icon name="arrow" size={14}/>}>
              Book a call
            </Button>
          </div>
        </div>
      </section>
    );

    const App = () => (
      <>
        <SiteHeader maxWidth={1400}/>
        <Hero/>
        <PipelineShowcase/>
        <Pillars/>
        <FinalCTA/>
        <SiteFooter maxWidth={1400}/>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script src="/js/track-pageview.js" defer></script>
</body>
</html>
