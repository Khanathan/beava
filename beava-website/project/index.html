  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/_shared/SiteHeader.jsx"></script>
  <script type="text/babel" src="js/_shared/SiteFooter.jsx"></script>

  <script type="text/babel">
    // beava.dev homepage — centered Hero · 3-tab PipelineShowcase · Pillars · FinalCTA
    //
    // Ported from beava-design-system/project/ui_kits/marketing/ (chat8,
    // 2026-05-12). Hero is single-column centered: heading → subhead → CTAs →
    // wide Live decision feed panel below. Mascot lives in the top-right
    // corner as a slow-loop gif. The DecisionFeed auto-streams a synthetic
    // event ≈ every 2.4s — replaces the prior live /api/get hero panel.

    // ─────────────────────────────────────────────────────────────────────
    // DecisionFeed — synthetic event stream that demos event → feature → decision
    // ─────────────────────────────────────────────────────────────────────

    // Three verticals × two signals each = six reflex rows. Each row
    // reads as a live intervention, not a counter readout: pause, boost,
    // launch. The live /api/feed served by deploy/generator/generator.py
    // registers the matching pipelines so the same shapes appear whether
    // the row was synthetic or real.
    const FEED_TEMPLATES = {
      // AI agents ─────────────────────────────────────────────────────────
      // AgentStep → AgentReflexes(steps_30s)
      agent_steps: {
        event: 'AgentStep',
        entity: () => `agent_${[42, 77, 91][Math.floor(Math.random() * 3)]}`,
        feature: (n) => ({ key: 'repeated_action_30s', value: n }),
        valueOf: () => 6 + Math.floor(Math.random() * 4),  // 6–9, above pause threshold
        decision: (v) => v >= 6 ? 'pause runaway agent' : 'continue monitoring',
        dollars: (v) => v >= 6 ? '+ $84 saved' : '+ $6 saved',
      },
      // ToolCall → SessionReflexes(risky_tools_10m)
      tool_risk: {
        event: 'ToolCall',
        entity: () => `session_${[12, 44, 81][Math.floor(Math.random() * 3)]}`,
        feature: (n) => ({ key: 'risky_tools_10m', value: n }),
        valueOf: () => 2 + Math.floor(Math.random() * 2),  // 2–3, above approval threshold
        decision: (v) => v >= 2 ? 'require human approval' : 'allow',
        dollars: (v) => v >= 2 ? '+ $250 risk avoided' : '+ $18 saved',
      },

      // Marketplaces ──────────────────────────────────────────────────────
      // AddToCart → SkuMomentum(carts_5m)
      cart_momentum: {
        event: 'AddToCart',
        entity: () => `sku_${[882, 113, 547, 209][Math.floor(Math.random() * 4)]}`,
        feature: (n) => ({ key: 'carts_5m', value: n }),
        valueOf: () => 80 + Math.floor(Math.random() * 30),  // 80–109 carts in 5m
        decision: (v) => v >= 50 ? 'boost trending item' : 'keep default ranking',
        dollars: () => `+ $${(0.8 + Math.random() * 1.6).toFixed(2)} GMV`,
      },
      // ProductView → ShopperReflexes(avg_view_price_30m)
      view_price: {
        event: 'ProductView',
        entity: () => `user_${1000 + Math.floor(Math.random() * 1500)}`,
        feature: (n) => ({ key: 'avg_view_price_30m', value: `$${n}` }),
        valueOf: () => 200 + Math.floor(Math.random() * 80),  // $200–$279
        decision: (v) => v >= 200 ? 'sort by premium picks' : 'keep value picks',
        dollars: () => `+ $${(2.4 + Math.random() * 2.6).toFixed(2)} GMV`,
      },

      // B2B SaaS ──────────────────────────────────────────────────────────
      // ApiError → UserActivation(error_velocity_5m). Rate_of_change of the
      // per-event retry count gives a "user is stuck and getting worse" signal.
      user_errors: {
        event: 'ApiError',
        entity: () => `user_${1000 + Math.floor(Math.random() * 1500)}`,
        feature: (n) => ({ key: 'error_velocity_5m', value: `+${n.toFixed(1)}` }),
        valueOf: () => 0.6 + Math.random() * 2.2,  // 0.6–2.8 errors/sec slope
        decision: () => 'launch setup rescue',
        dollars: () => '+ $29 LTV',
      },
      // LimitHit → OrgExpansionSignals(limit_hits_24h)
      limit_hits: {
        event: 'LimitHit',
        entity: () => `org_${['acme','globex','umbra','soylent'][Math.floor(Math.random() * 4)]}`,
        feature: (n) => ({ key: 'limit_hits_24h', value: n }),
        valueOf: () => 8 + Math.floor(Math.random() * 8),  // 8–15
        decision: (v) => v >= 10 ? 'show team upgrade path' : 'send usage tip',
        dollars: (v) => v >= 10 ? '+ $99 MRR' : '+ $9 saved',
      },
    };

    // Cycle through all six so the rotating feed surfaces every vertical.
    const ORDER = ['agent_steps', 'tool_risk', 'cart_momentum', 'view_price', 'user_errors', 'limit_hits'];

    const mintRow = (name, idx, ts) => {
      const t = FEED_TEMPLATES[name];
      const entity = t.entity();
      const rawVal = t.valueOf ? t.valueOf() : null;
      const feat = t.feature(rawVal);
      const decision = t.decision(rawVal ?? feat.value);
      const dollars = t.dollars ? t.dollars(rawVal ?? feat.value) : null;
      return {
        id: `${ts}-${idx}-${Math.random().toString(36).slice(2,6)}`,
        ts, event: t.event, entity, feature: feat, decision, dollars,
        isNew: true,
      };
    };

    const seedRows = () => {
      // Seed one row per vertical so the first paint shows the spread.
      const initial = ['agent_steps', 'cart_momentum', 'user_errors'];
      // Seed rows are settled history — render without the fresh-row wash so
      // the panel opens calm and only later arrivals get the orange highlight.
      return initial.map((name, i) => ({
        ...mintRow(name, i, Date.now() - (initial.length - i) * 1800),
        isNew: false,
      }));
    };

    const ageLabel = (ts, now) => {
      const sec = Math.max(0, Math.floor((now - ts) / 1000));
      if (sec < 1) return 'just now';
      if (sec < 60) return `${sec}s ago`;
      return `${Math.floor(sec / 60)}m ago`;
    };

    // useDecisionFeed — polls /feed (served by beava-website/scripts/dev-demo.py
    // when it's running) for real rows produced by a beava server. Falls back
    // to the synthetic generator above if /feed returns anything but a valid
    // payload, so the marketing site keeps animating even when there's no
    // backend (e.g. static-hosted on Cloudflare).
    const useDecisionFeed = () => {
      const [rows, setRows] = React.useState(seedRows);
      const [tickMs, setTickMs] = React.useState(0);
      const [isLive, setIsLive] = React.useState(false);
      const [serverLatency, setServerLatency] = React.useState(null);

      const pushSynthetic = React.useCallback((eventName) => {
        setRows(prev => {
          const ts = Date.now();
          const row = mintRow(eventName, prev.length, ts);
          return [row, ...prev.map(r => ({ ...r, isNew: false }))].slice(0, 3);
        });
      }, []);

      React.useEffect(() => {
        let cancelled = false;
        let synthId = null;
        let prevIds = '';

        const tryLive = async () => {
          try {
            const r = await fetch('/api/feed', { cache: 'no-store' });
            if (!r.ok) return false;
            const j = await r.json();
            if (cancelled || !j || !Array.isArray(j.rows) || j.rows.length === 0) return false;
            // Mark each row "new" only if it wasn't in the prior list — this
            // gives the wash-in highlight on actual fresh rows, not on every poll.
            const ids = j.rows.map(r => r.id).join('|');
            const fresh = ids !== prevIds;
            const newestId = j.rows[0]?.id;
            const next = j.rows.slice(0, 3).map(r => ({ ...r, isNew: fresh && r.id === newestId }));
            prevIds = ids;
            setRows(next);
            setIsLive(true);
            if (typeof j.latency_ms === 'number') setServerLatency(j.latency_ms);
            return true;
          } catch (_) {
            return false;
          }
        };

        // Two independent loops:
        //   1. Synthetic ticker — primes the panel instantly so the first
        //      paint is never empty, and carries the panel if /feed is down.
        //   2. /feed probe — runs every 700ms. As soon as /feed returns
        //      non-empty rows, we flip to live and silence the synthetic
        //      ticker. If /feed starts failing, the synthetic ticker comes
        //      back so the panel keeps animating.
        //
        // This replaces the prior probe-once-then-fall-back-forever logic,
        // which got stuck in synthetic mode if the very first /feed probe
        // hit the dev-demo orchestrator before its warm-start finished.
        let synthInterval = null;
        let probeInterval = null;

        const startSynthetic = () => {
          if (synthInterval) return;
          setIsLive(false);
          synthInterval = setInterval(() => {
            const name = ORDER[Math.floor(Math.random() * ORDER.length)];
            pushSynthetic(name);
          }, 2400);
        };
        const stopSynthetic = () => {
          if (synthInterval) { clearInterval(synthInterval); synthInterval = null; }
        };

        // Prime the panel immediately.
        startSynthetic();

        // Probe /feed once on mount (snappy flip if it's already up) and
        // every 700ms after. tryLive flips isLive when it succeeds.
        const probeOnce = async () => {
          if (cancelled) return;
          const live = await tryLive();
          if (cancelled) return;
          if (live) stopSynthetic();
          else startSynthetic();
        };
        probeOnce();
        probeInterval = setInterval(probeOnce, 700);

        return () => {
          cancelled = true;
          stopSynthetic();
          if (probeInterval) clearInterval(probeInterval);
        };
      }, [pushSynthetic]);

      React.useEffect(() => {
        const id = setInterval(() => setTickMs(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);

      return { rows, tickMs, isLive, serverLatency };
    };

    const EventTag = ({ name }) => (
      <span style={{
        fontFamily: 'var(--font-mono)', fontSize: 12.5, fontWeight: 600,
        color: 'var(--fg2)', background: 'var(--beava-paper)',
        border: '1px solid var(--border)', borderRadius: 6, padding: '3px 8px',
        whiteSpace: 'nowrap',
      }}>{name}</span>
    );

    const FeatureCell = ({ row }) => (
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13.5, color: 'var(--fg2)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
        <span style={{ color: 'var(--fg3)' }}>{row.entity}</span>
        <span style={{ color: 'var(--fg3)' }}>.</span>
        <span style={{ color: 'var(--code-keyword)' }}>{row.feature.key}</span>
        <span style={{ color: 'var(--fg3)' }}> = </span>
        <span style={{ color: 'var(--fg1)', fontWeight: 600 }}>{row.feature.value}</span>
      </span>
    );

    const DecisionCell = ({ text }) => (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 8,
        fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: 600,
        color: 'var(--accent)',
      }}>
        <span aria-hidden style={{ fontFamily: 'var(--font-mono)', opacity: 0.65 }}>→</span>
        {text}
      </span>
    );

    const FeedRow = ({ row, now, columnWidths }) => (
      <div style={{
        display: 'grid', gridTemplateColumns: columnWidths,
        alignItems: 'center', columnGap: 24,
        padding: '11px 22px', borderTop: '1px solid var(--border)',
        animation: row.isNew ? 'beava-row-in 420ms cubic-bezier(0.22,1,0.36,1)' : 'none',
        background: row.isNew ? 'var(--beava-orange-wash)' : 'transparent',
        transition: 'background 1200ms cubic-bezier(0.22,1,0.36,1)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0 }}>
          <EventTag name={row.event}/>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg3)', whiteSpace: 'nowrap' }}>
            {ageLabel(row.ts, now)}
          </span>
        </div>
        <div style={{ minWidth: 0 }}><FeatureCell row={row}/></div>
        <div style={{ minWidth: 0 }}><DecisionCell text={row.decision}/></div>
      </div>
    );

    const ColumnHeader = ({ children }) => (
      <div style={{
        fontFamily: 'var(--font-sans)', fontWeight: 600, fontSize: 11,
        textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--fg3)',
      }}>{children}</div>
    );

    const DecisionFeed = () => {
      const { rows, tickMs, isLive, serverLatency } = useDecisionFeed();
      // When /feed is up, show the real RTT we just measured server-side.
      // When falling back to the synthetic stream, jitter a plausible number
      // so the footer doesn't read as a frozen string.
      const [synthLatencyMs, setSynthLatencyMs] = React.useState(() => 8 + Math.floor(Math.random() * 14));
      React.useEffect(() => {
        if (isLive) return;
        const id = setInterval(() => setSynthLatencyMs(6 + Math.floor(Math.random() * 16)), 1100);
        return () => clearInterval(id);
      }, [isLive]);
      const latencyMs = isLive && typeof serverLatency === 'number'
        ? (serverLatency < 10 ? serverLatency.toFixed(1) : Math.round(serverLatency))
        : synthLatencyMs;
      const columnWidths = 'minmax(240px, 1.05fr) minmax(280px, 1.55fr) minmax(220px, 1.2fr)';
      return (
        <div style={{
          maxWidth: 1040, margin: '0 auto',
          background: '#fff', border: '1px solid var(--border)',
          borderRadius: 20, boxShadow: 'var(--shadow-md)', overflow: 'hidden',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '10px 22px', background: 'var(--beava-cream-deep)',
            borderBottom: '1px solid var(--border)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{
                fontFamily: 'var(--font-sans)', fontSize: 12, fontWeight: 700,
                color: 'var(--fg1)', textTransform: 'uppercase', letterSpacing: '0.12em',
              }}>Live product reflexes</span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <span style={{
                  width: 7, height: 7, borderRadius: 999, background: 'var(--beava-success)',
                  boxShadow: '0 0 0 3px rgba(74,122,58,0.20)',
                  animation: 'beava-pulse 2s cubic-bezier(0.65,0,0.35,1) infinite',
                }}/>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: isLive ? 'var(--beava-success)' : 'var(--fg3)', fontWeight: 600 }}>
                  {isLive ? 'live · connected' : 'simulated events · real features'}
                </span>
              </span>
            </div>
          </div>

          <div className="beava-feed-headers" style={{
            display: 'grid', gridTemplateColumns: columnWidths,
            columnGap: 24, padding: '8px 22px 6px',
          }}>
            <ColumnHeader>Event</ColumnHeader>
            <ColumnHeader>Fresh feature</ColumnHeader>
            <ColumnHeader>Decision</ColumnHeader>
          </div>

          <div>
            {rows.map((row) => (
              <FeedRow key={row.id} row={row} now={tickMs || Date.now()} columnWidths={columnWidths}/>
            ))}
          </div>

          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 16, flexWrap: 'wrap', padding: '9px 22px',
            borderTop: '1px solid var(--border)', background: 'var(--beava-paper)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg3)' }}>
              <span>fresh values</span>
              <span style={{ color: 'var(--border-strong)' }}>·</span>
              <span>updated <span style={{ color: 'var(--fg2)' }}>{latencyMs}ms ago</span></span>
              <span style={{ color: 'var(--border-strong)' }}>·</span>
              <span>no batch lag</span>
            </div>
          </div>
        </div>
      );
    };

    // ─────────────────────────────────────────────────────────────────────
    // Hero — centered, single column. (The corner mascot moved down to the
    // PipelineShowcase section so the hero leads with copy + decision feed.)
    // ─────────────────────────────────────────────────────────────────────

    const Hero = () => (
      <section style={{ padding: '36px 24px 56px', position: 'relative', overflow: 'hidden' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', position: 'relative' }}>

          <div style={{ textAlign: 'center', maxWidth: 820, margin: '0 auto 32px', position: 'relative', zIndex: 2 }}>
            <a href="https://github.com/beava-dev/beava" target="_blank" rel="noopener" style={{
              display: 'inline-flex', alignItems: 'center', gap: 10,
              padding: '5px 12px 5px 10px', borderRadius: 999,
              background: 'var(--beava-orange-wash)', border: '1px solid #f1d8c2',
              color: 'var(--accent)', fontSize: 12, fontWeight: 600,
              marginBottom: 16, fontFamily: 'var(--font-sans)',
              whiteSpace: 'nowrap', textDecoration: 'none',
            }}>
              <span style={{
                width: 6, height: 6, background: 'var(--accent)', borderRadius: 999,
                boxShadow: '0 0 0 3px rgba(184,92,32,0.18)',
              }}/>
              <span>Apache 2.0</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>single binary</span>
              <span style={{ color: '#d8b594' }}>·</span>
              <span>HTTP in, HTTP out</span>
            </a>

            <h1 style={{
              fontFamily: 'var(--font-serif)', fontWeight: 600,
              fontSize: 'clamp(30px, 4vw, 52px)',
              lineHeight: 1.1, letterSpacing: '-0.02em',
              color: 'var(--fg1)', margin: '0 auto 20px',
              maxWidth: '100%', textWrap: 'balance',
            }}>
              Give your product <em style={{ color: 'var(--accent)', fontStyle: 'italic' }}>live reflexes.</em>
            </h1>

            <p style={{
              fontFamily: 'var(--font-sans)', fontWeight: 400,
              fontSize: 17, lineHeight: 1.55,
              color: 'var(--fg2)', margin: '0 auto 24px',
              maxWidth: 720, textWrap: 'pretty',
            }}>
              beava turns live events into fresh decision features, so your app can
              pause runaway agents, reorder marketplaces, and rescue stuck users —
              no Kafka, no Flink, no feature store.
            </p>

            <div style={{ display: 'inline-flex', gap: 18, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' }}>
              <Button variant="primary" size="lg" href="/docs/get-started/quickstart/" icon={<Icon name="arrow" size={16}/>}>
                Run quickstart
              </Button>
              <a href="/docs/" style={{
                fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 500,
                color: 'var(--fg2)', textDecoration: 'none',
                borderBottom: '1px solid color-mix(in oklab, var(--fg3) 35%, transparent)',
                paddingBottom: 1,
              }}>
                Read the docs →
              </a>
            </div>

            <div style={{
              marginTop: 14,
              fontFamily: 'var(--font-sans)', fontSize: 12.5, color: 'var(--fg3)',
              lineHeight: 1.5,
            }}>
              ~4 MB <span style={{ color: 'var(--border-strong)' }}>·</span> macOS, Linux, Windows
              <span style={{ color: 'var(--border-strong)' }}> · </span> runs on 1 GB RAM
              <span style={{ color: 'var(--border-strong)' }}> · </span> scales to one big box
            </div>
          </div>

          {/* Hand-drawn "live, right now" marker — sits 28px above the feed. */}
          <div style={{ position: 'relative', maxWidth: 1040, margin: '0 auto', height: 0 }}>
            <div aria-hidden style={{
              position: 'absolute', left: '50%', top: -28,
              transform: 'translateX(-50%)',

    const PIPE_ROTATE_MS = 8000;
    const PIPE_LIVE_POLL_MS = 1500;

    // useLiveSignals — polls /api/feed; caches latest {entity, value} per
    // feature key so outcome cards display the same live state the top feed
    // is rendering. Falls back gracefully to PIPELINES_DATA hardcoded values
    // when /api/feed is down (cold load, dev).
    const useLiveSignals = () => {
      const [byKey, setByKey] = React.useState({});
      React.useEffect(() => {
        let cancelled = false;
        const probe = async () => {
          try {
            const r = await fetch('/api/feed', { cache: 'no-store' });
            if (!r.ok || cancelled) return;
            const j = await r.json();
            if (cancelled || !j || !Array.isArray(j.rows)) return;
            setByKey((prev) => {
              const next = { ...prev };
              // Walk oldest → newest so newer rows for the same key win.
              for (let i = j.rows.length - 1; i >= 0; i--) {
                const row = j.rows[i];
                const key = row && row.feature && row.feature.key;
                if (!key) continue;
                next[key] = { entity: row.entity, value: row.feature.value };

            @keyframes beava-tab-progress { from { width: 0%; } to { width: 100%; } }
            @keyframes beava-fade-in {
              from { opacity: 0; transform: translateY(2px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            @media (max-width: 920px) {
              .beava-pipelines-grid { grid-template-columns: 1fr !important; }
            }
          `}</style>
        </section>
      );
    };

    // ─────────────────────────────────────────────────────────────────────
    // Pillars — what makes beava different
    // ─────────────────────────────────────────────────────────────────────

    const PILLARS = [
      { kicker: '01', title: 'Replaces Redis + Lua',  body: 'No more 200-line Lua scripts maintaining counters. beava is the table.', foot: 'redis-cli → bv.get(...)' },
      { kicker: '02', title: 'No streaming stack',    body: 'No Kafka, no Flink, no Schema Registry. One Rust binary, one HTTP port.', foot: '~4 MB · single binary' },
      { kicker: '03', title: 'Crash-safe by default', body: 'WAL on every write. Restart mid-flight; tables come back exactly where they were.', foot: 'fsync configurable, default sane' },
      { kicker: '04', title: 'Apache 2.0, forever',   body: 'No source-available rug-pull. No usage limits. The same binary in the cloud you self-host.', foot: 'github.com/beava-dev/beava', footHref: 'https://github.com/beava-dev/beava' },
    ];

    const Pillars = () => (
      <section style={{
        padding: '88px 24px', background: 'var(--bg-alt)',
        borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)',
        position: 'relative', overflow: 'hidden',
      }}>
        <img src="/assets/mascot-mark-geometric.png" alt="" width={220} height={220}
          style={{ position: 'absolute', top: 24, right: -40, opacity: 0.06, pointerEvents: 'none', transform: 'rotate(8deg)' }}/>
        <div style={{ maxWidth: 1200, margin: '0 auto', position: 'relative' }}>
          <div style={{ textAlign: 'center', marginBottom: 56 }}>
            <Eyebrow>Stream processing shouldn&rsquo;t require a platform team.</Eyebrow>
            <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 44, lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '12px auto 0', maxWidth: 720, textWrap: 'balance' }}>
              What&rsquo;s different
            </h2>
          </div>
          <div className="beava-pillars-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
            {PILLARS.map(p => (
              <div key={p.title} style={{
                background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
                padding: '24px 22px 20px',
                boxShadow: '0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06)',
                display: 'flex', flexDirection: 'column', gap: 12, position: 'relative',
                transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',
              }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 2px 4px rgba(26,23,20,0.04), 0 8px 20px rgba(26,23,20,0.08)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06)'; }}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.02em' }}>{p.kicker}</div>
                <h3 style={{ fontFamily: 'var(--font-sans)', fontWeight: 600, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--fg1)', margin: 0, lineHeight: 1.3 }}>{p.title}</h3>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14.5, lineHeight: 1.55, color: 'var(--fg2)', margin: 0, flex: 1 }}>{p.body}</p>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg3)', paddingTop: 8, borderTop: '1px solid var(--border-inset)' }}>
                  {p.footHref
                    ? <a href={p.footHref} target="_blank" rel="noopener" style={{ color: 'inherit', textDecoration: 'none' }}>{p.foot} ↗</a>
                    : p.foot}
                </div>
              </div>
            ))}
          </div>
        </div>
        <style>{`
          @media (max-width: 960px) { .beava-pillars-grid { grid-template-columns: repeat(2, 1fr) !important; } }
          @media (max-width: 560px) { .beava-pillars-grid { grid-template-columns: 1fr !important; } }
        `}</style>
      </section>
    );

    // ─────────────────────────────────────────────────────────────────────
    // FinalCTA — three ways in
    // ─────────────────────────────────────────────────────────────────────

    const FinalCTA = () => (
      <section style={{ padding: '96px 24px', background: 'var(--beava-cream-deep)', borderTop: '1px solid var(--border)' }}>
        <div style={{ maxWidth: 920, margin: '0 auto', textAlign: 'center', position: 'relative' }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 14, marginBottom: 18 }}>
            <img src="/assets/mascot-mark-geometric-transparent.png" alt="" width={56} height={56} style={{ display: 'block' }}/>
            <span style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontStyle: 'italic', fontSize: 48, letterSpacing: '-0.025em', lineHeight: 1, color: 'var(--fg1)' }}>beava</span>
          </div>
          <Eyebrow>Three ways in</Eyebrow>
          <h2 style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 'clamp(36px, 4.5vw, 52px)', lineHeight: 1.1, letterSpacing: '-0.02em', color: 'var(--fg1)', margin: '12px 0 16px', textWrap: 'balance' }}>
            Install it. Read Chapter 1. Or just lurk.
          </h2>
          <p style={{ fontFamily: 'var(--font-sans)', fontSize: 17, lineHeight: 1.55, color: 'var(--fg2)', margin: '0 auto 36px', maxWidth: 620, textWrap: 'pretty' }}>
            The same binary, the same source. Nothing to sign up for.
          </p>
          <div className="beava-finalcta-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, textAlign: 'left' }}>
            {[
              { kicker: 'guidebook',  title: 'Read Chapter 1',     body: 'A 10-minute live build that turns into a per-customer analytics dashboard. No setup beyond the install above.', cta: 'Start Chapter 1 →',           href: '/guide/chapter-1/',                              accent: 'var(--accent)' },
              { kicker: 'github',     title: 'Star on GitHub',     body: 'Apache 2.0. Issues are open. Releases are signed.',                                                          cta: 'github.com/beava-dev/beava →', href: 'https://github.com/beava-dev/beava',             accent: 'var(--fg1)' },
              { kicker: 'community',  title: 'GitHub Discussions', body: 'Half the answers in our docs started as someone asking "is this a bug?" out loud.',                          cta: 'Join the discussion →',        href: 'https://github.com/beava-dev/beava/discussions', accent: 'var(--beava-info)' },
            ].map(c => (
              <a key={c.kicker} href={c.href} target={c.href.startsWith('http') ? '_blank' : undefined} rel={c.href.startsWith('http') ? 'noopener' : undefined} style={{
                background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
                padding: '20px 22px', textDecoration: 'none',
                display: 'flex', flexDirection: 'column', gap: 14,
                transition: 'all 200ms cubic-bezier(0.22,1,0.36,1)',
                boxShadow: '0 1px 2px rgba(26,23,20,0.04)',
              }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 4px 16px rgba(26,23,20,0.08)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 1px 2px rgba(26,23,20,0.04)'; }}>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: c.accent }}>{c.kicker}</div>
                <div style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 19, lineHeight: 1.25, color: 'var(--fg1)', textWrap: 'balance' }}>{c.title}</div>
                <p style={{ fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5, color: 'var(--fg2)', margin: 0, flex: 1 }}>{c.body}</p>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 500, color: c.accent, marginTop: 4 }}>{c.cta}</div>
              </a>
            ))}
          </div>
          <div className="beava-finalcta-founders" style={{
            marginTop: 32,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20,
            padding: '18px 24px',
            background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
            boxShadow: '0 1px 2px rgba(26,23,20,0.04)', textAlign: 'left',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <img src="/assets/mascot-pose-3.svg" alt="" width={44} height={44} style={{ display: 'block', flexShrink: 0 }}/>
              <div>
                <div style={{ fontFamily: 'var(--font-serif)', fontWeight: 600, fontSize: 17, lineHeight: 1.3, color: 'var(--fg1)' }}>
                  Want to talk it through with Hoang?
                </div>
                <div style={{ fontFamily: 'var(--font-sans)', fontSize: 13.5, lineHeight: 1.45, color: 'var(--fg2)', marginTop: 2 }}>
                  30 minutes, no sales pitch. Bring a use case, a doubt, or a roadmap question.
                </div>
              </div>
            </div>
            <Button variant="primary" size="md" href="https://calendly.com/hoang-beava/30min" target="_blank" rel="noopener" icon={<Icon name="arrow" size={14}/>}>
              Book a call
            </Button>
          </div>
        </div>
        <style>{`
          @media (max-width: 760px) {
            .beava-finalcta-grid { grid-template-columns: 1fr !important; }
            .beava-finalcta-founders { flex-direction: column !important; align-items: flex-start !important; }
          }
        `}</style>
      </section>
    );

    const App = () => (
      <>
        <SiteHeader maxWidth={1400}/>
        <Hero/>
        <Pillars/>
        <Pipelines/>
        <FinalCTA/>
        <SiteFooter maxWidth={1400}/>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script src="/js/track-pageview.js" defer></script>
</body>
</html>
