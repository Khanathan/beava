# Build platform wheels for `pip install beava` and publish to PyPI on tag.
#
# From v0.0.0, the wheel ships the Rust `beava` server binary (maturin
# `bindings = "bin"`). One wheel per (os, arch) combo + one sdist. We use
# PyO3/maturin-action because it's the standard pattern for maturin
# projects (polars / ruff / uv) — handles manylinux + cross-compilation
# + interpreter resolution that cibuildwheel would require lots of
# bespoke config to replicate.
#
# Platform coverage: Linux x86_64, Linux aarch64, macOS arm64.
# Excluded: Windows (POSIX-only deps in beava-server) and macOS x86_64
# (GitHub's x86_64 mac runner pool starves with hour-plus queues; intel
# Mac users install via the sdist fallback, ~1 min cold build via pip's
# PEP 517 isolation pulling Rust + maturin). Both are documented at the
# matrix definition below.
#
# Triggers:
#   - push tag v*       → full build + PyPI publish
#   - workflow_dispatch → full build, no publish (verification path; only
#                         works once the workflow file lives on the
#                         default branch)
#   - pull_request      → full build, no publish (pre-merge gate; scoped
#                         to PRs that touch python/ packaging or this
#                         workflow itself, so unrelated PRs don't pay
#                         the 30-minute matrix cost)
#
# First-time PyPI publish (establishing the `beava` project): configure a
# Trusted Publisher on PyPI ahead of time as a "pending publisher" tied to
# this repo + workflow file. Subsequent publishes need no token. Fallback
# is an API token in the `PYPI_API_TOKEN` secret with `password:` set on
# the publish step — used only if the `pypi` GitHub Environment isn't
# configured.

name: Release wheels (PyPI)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    paths:
      - "python/**"
      - "crates/beava-server/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release-wheels.yml"

concurrency:
  group: release-wheels-${{ github.ref }}
  # PR pushes should cancel any in-flight matrix from earlier commits;
  # the only thing we want to verify is whether HEAD's wheels build,
  # not every intermediate commit's. For tag pushes the ref is unique
  # per tag, so the concurrency group never collides — `true` is safe
  # for the publish path too.
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: wheel (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Platform coverage: Linux x86_64, Linux aarch64, macOS arm64,
    # macOS x86_64 (cross-compiled from macos-14 via Rosetta target
    # x86_64-apple-darwin — avoids the hour-plus queue on macos-13's
    # x86_64 runner pool while still producing a binary intel Macs
    # can run natively).
    #
    # Excluded:
    # - Windows: beava-server uses POSIX-only APIs
    #   (`tokio::signal::unix::{signal, SignalKind}` for graceful
    #   shutdown, `libc::pthread_t` + `libc::pthread_self` for thread-CPU
    #   accounting). The repo's standard CI also runs ubuntu-latest only.
    #   Windows is a follow-up port, not a wheel-build issue.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: macos-14
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # `bindings = "bin"` produces a single abi-none wheel per
      # (platform, arch); no per-interpreter build needed. `--strip`
      # echoes the strip=true flag in pyproject.toml; passing both is
      # safe and explicit. `working-directory: python` makes maturin
      # honor pyproject.toml's `manifest-path = "../crates/beava-server/..."`
      # without an override flag.
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          working-directory: python
          manylinux: auto

      - name: Smoke-test wheel imports
        # Skip on linux/aarch64 cross-builds (built via qemu, can't run
        # natively on the x86_64 runner). Native targets only:
        # ubuntu-latest/x86_64, macos-14/aarch64.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64') ||
          (matrix.os == 'macos-14' && matrix.target == 'aarch64')
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install python/dist/*.whl
          python -c "import beava; print('beava version:', getattr(beava, '__version__', 'n/a'))"
          # The beava binary should be on PATH after `pip install` because
          # the wheel ships it under <sysconfig.get_path('scripts')>/beava.
          which beava || (echo "ERROR: beava binary not on PATH after pip install"; exit 1)
          beava --help || true  # binary exists; --help may exit non-zero on usage errors

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    # Publish only on tag push — workflow_dispatch runs are verification-only.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/beava
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inventory artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        # Skipped silently until Trusted Publishing is configured on
        # PyPI (first-time publish requires a one-time pending-publisher
        # setup at pypi.org). The GH-Release asset upload below makes
        # `curl ... | sh` work regardless.
        if: ${{ vars.PYPI_TRUSTED_PUBLISHER_READY == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true

  # `curl -fsSL .../install.sh | sh` fetches wheels from GH Releases —
  # keeps the install path working before PyPI Trusted Publishing is
  # set up. Once PyPI publish is live, both surfaces ship the same
  # wheel; this job is the always-on path.
  attach-to-release:
    name: Attach wheels to GH Release
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - name: Upload wheels + sdist to the tagged Release
        uses: softprops/action-gh-release@v2
        with:
          # release.yml already creates the tag's GH Release (with
          # the linux-x86_64 standalone binary). Passing the same
          # `tag_name` UPDATES that release, leaving the binary alone
          # and ADDING the wheels + sdist alongside it.
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
