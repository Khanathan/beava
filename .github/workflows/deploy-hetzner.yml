name: Deploy beava.dev to Hetzner

on:
  # Single trigger path: deploy fires only after `Publish edge image to
  # Docker Hub` succeeds. The previous setup also fired on push to main
  # for website-only changes — but a single PR that touched BOTH server
  # code (publish-edge paths) AND website paths fired both workflows in
  # parallel, racing the deploy ahead of the new image.
  #
  # Trade-off: website-only commits no longer auto-deploy. publish-edge
  # has been broadened (its path filter dropped) so it runs on every push
  # to main; cache-hit builds finish in 2-3 min, then deploy chains.
  workflow_run:
    workflows: ["Publish edge image to Docker Hub"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Default-deny GITHUB_TOKEN. The deploy uses an SSH key (HETZNER_DEPLOY_KEY)
# to rsync into /srv on the Hetzner box; nothing on GitHub is mutated.
permissions:
  contents: read

concurrency:
  # One deploy at a time per branch — don't let two runs race on rsync.
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rsync:
    # When triggered by workflow_run, only run on a successful upstream.
    # Other triggers (push, workflow_dispatch) always run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, GitHub checks out the workflow
          # file's branch (main) by default, but for clarity make it explicit.
          ref: main

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_DEPLOY_KEY }}

      - name: Add Hetzner host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa 178.104.164.100 >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync beava-website/deploy/ to /srv/beava-website/deploy/
        # Caddyfile, docker-compose.prod.yml, generator/, beava.yaml,
        # register_pipeline.py. Without this, edits to compose / caddy /
        # generator silently no-op until someone SSHes and rsyncs by hand.
        # Runs BEFORE the beava pull so a new compose file is in place
        # before `docker compose pull beava` reads it.
        run: |
          rsync -av --no-perms --no-owner --no-group \
            beava-website/deploy/ \
            root@178.104.164.100:/srv/beava-website/deploy/

      - name: Pull latest beava image + restart container
        # Without this step the box stays on whatever beava image was
        # running at last manual upgrade — even if publish-edge built a
        # newer :edge digest. `pull_policy: always` in the compose file
        # only kicks in when `up -d` is invoked. Pull, then up -d
        # --force-recreate to swap the running container atomically.
        # `--no-deps` to leave caddy alone.
        run: |
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 bash <<'REMOTE'
            set -euo pipefail
            cd /srv/beava-website/deploy
            docker compose -f docker-compose.prod.yml pull beava
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps beava
            # Wait briefly for healthcheck.
            for _ in $(seq 1 20); do
              if docker run --rm --network beava-website-net curlimages/curl:latest \
                  -sf --max-time 2 http://beava:8090/ready >/dev/null; then
                echo "beava ready"
                exit 0
              fi
              sleep 1
            done
            echo "beava failed to come up ready within 20s" >&2
            docker logs --tail 40 beava-website-beava >&2
            exit 1
          REMOTE

      - name: Rebuild generator + recreate caddy
        # The synced deploy/ has the latest Dockerfile / Caddyfile /
        # docker-compose.prod.yml. Build the generator image, then up -d
        # both services with --force-recreate so a new Caddyfile or
        # generator image takes effect. --no-deps to leave beava alone
        # (already handled above).
        run: |
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 bash <<'REMOTE'
            set -euo pipefail
            cd /srv/beava-website/deploy
            docker compose -f docker-compose.prod.yml build generator
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps generator caddy
            # Wait briefly for generator to come up.
            for _ in $(seq 1 20); do
              if docker run --rm --network beava-website-net curlimages/curl:latest \
                  -sf --max-time 2 http://generator:8090/health >/dev/null 2>&1; then
                echo "generator ready"
                exit 0
              fi
              sleep 1
            done
            echo "generator failed to come up within 20s" >&2
            docker logs --tail 40 beava-website-generator >&2
            exit 1
          REMOTE

      - name: rsync beava-website/project/ to /srv/beava-website/project/
        # No --delete: the Hetzner box has artifacts (e.g. _pagefind index built
        # post-deploy) that don't live in the repo. Stale files accumulate over
        # time; clean them manually if needed. Excludes mirror what we ignore
        # locally per beava-website/.gitignore.
        run: |
          rsync -av --no-perms --no-owner --no-group \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='link-audit-report.txt' \
            --exclude='render-docs-warnings.txt' \
            beava-website/project/ \
            root@178.104.164.100:/srv/beava-website/project/

      # Registry ownership: the generator container is the single source
      # of truth for what's registered on this beava. On startup it
      # registers all four pipelines (PageView/SiteMetrics + the three
      # demo pipelines) with force=true. The previous separate
      # register-SiteMetrics step here used to fight the generator —
      # whichever ran last wiped the other's pipelines, because beava's
      # /register with force=true is a wholesale registry replace. We
      # rebuilt the generator above, which already re-registered.

      - name: Smoke test live origin
        # Hit the internal caddy on 127.0.0.1:8082 over SSH. Verifies the
        # static site responds 200, the SiteMetrics row reads back, and
        # the decision feed has rows. Runs last so we catch any deploy
        # that broke a layer.
        run: |
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 \
            'curl -sf --max-time 5 -o /dev/null -w "homepage HTTP %{http_code}\n" http://127.0.0.1:8082/ && \
             curl -sf --max-time 5 -o /dev/null -w "docs HTTP %{http_code}\n"     http://127.0.0.1:8082/docs/ && \
             curl -sf --max-time 5 -X POST http://127.0.0.1:8082/api/get \
                 -H "Content-Type: application/json" \
                 -d "{\"table\":\"SiteMetrics\",\"key\":\"\"}" \
                 -w "SiteMetrics row HTTP %{http_code}\n" && \
             curl -sf --max-time 5 http://127.0.0.1:8082/api/feed \
                 -o /tmp/feed.json -w "feed HTTP %{http_code}\n" && \
             python3 -c "import json,sys; d=json.load(open(\"/tmp/feed.json\")); assert len(d[\"rows\"]) >= 1, \"no rows\"; print(\"feed has rows:\", len(d[\"rows\"]), \"latency_ms=\", d[\"latency_ms\"])"'

      - name: Job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Hetzner deploy
          - Source: \`beava-website/project/\` @ \`${{ github.sha }}\`
          - Target: \`root@178.104.164.100:/srv/beava-website/project/\`
          - Public URL: https://beava.dev
          EOF
