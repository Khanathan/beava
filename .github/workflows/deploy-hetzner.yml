name: Deploy beava.dev to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'beava-website/project/**'
      - '.github/workflows/deploy-hetzner.yml'
  workflow_dispatch:

# Default-deny GITHUB_TOKEN. The deploy uses an SSH key (HETZNER_DEPLOY_KEY)
# to rsync into /srv on the Hetzner box; nothing on GitHub is mutated.
permissions:
  contents: read

concurrency:
  # One deploy at a time per branch — don't let two runs race on rsync.
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rsync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_DEPLOY_KEY }}

      - name: Add Hetzner host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa 178.104.164.100 >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync beava-website/project/ to /srv/beava-website/project/
        # No --delete: the Hetzner box has artifacts (e.g. _pagefind index built
        # post-deploy) that don't live in the repo. Stale files accumulate over
        # time; clean them manually if needed. Excludes mirror what we ignore
        # locally per beava-website/.gitignore.
        run: |
          rsync -av --no-perms --no-owner --no-group \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='link-audit-report.txt' \
            --exclude='render-docs-warnings.txt' \
            beava-website/project/ \
            root@178.104.164.100:/srv/beava-website/project/

      - name: Smoke test live origin
        # Hit the internal caddy on 127.0.0.1:8082 over SSH — verifies the
        # static site responds 200. Runs after rsync so we catch a deploy
        # that broke the homepage.
        run: |
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 \
            'curl -sf --max-time 5 -o /dev/null -w "homepage HTTP %{http_code}\n" http://127.0.0.1:8082/ && \
             curl -sf --max-time 5 -o /dev/null -w "docs HTTP %{http_code}\n"     http://127.0.0.1:8082/docs/'

      - name: Job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Hetzner deploy
          - Source: \`beava-website/project/\` @ \`${{ github.sha }}\`
          - Target: \`root@178.104.164.100:/srv/beava-website/project/\`
          - Public URL: https://beava.dev
          EOF
