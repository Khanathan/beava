name: Deploy beava.dev to Hetzner

on:
  # Server-side change (crates/** etc.) → publish-edge-image rebuilds the
  # image; this deploy waits for that workflow to finish before running so
  # we never re-register a new pipeline shape against a stale image. The
  # job-level `if:` guard skips the deploy when publish-edge fails.
  workflow_run:
    workflows: ["Publish edge image to Docker Hub"]
    types: [completed]
    branches: [main]
  # Website-only change (no server rebuild needed) → fire on push, in
  # parallel with anything else. Path filter must NOT include any path
  # that publish-edge-image.yml also watches, otherwise both triggers
  # fire on the same commit and race again.
  push:
    branches: [main]
    paths:
      - 'beava-website/project/**'
      - 'beava-website/deploy/register_pipeline.py'
      - 'python/**'
      - '.github/workflows/deploy-hetzner.yml'
  workflow_dispatch:

# Default-deny GITHUB_TOKEN. The deploy uses an SSH key (HETZNER_DEPLOY_KEY)
# to rsync into /srv on the Hetzner box; nothing on GitHub is mutated.
permissions:
  contents: read

concurrency:
  # One deploy at a time per branch — don't let two runs race on rsync.
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rsync:
    # When triggered by workflow_run, only run on a successful upstream.
    # Other triggers (push, workflow_dispatch) always run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, GitHub checks out the workflow
          # file's branch (main) by default, but for clarity make it explicit.
          ref: main

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_DEPLOY_KEY }}

      - name: Add Hetzner host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519,rsa 178.104.164.100 >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync beava-website/project/ to /srv/beava-website/project/
        # No --delete: the Hetzner box has artifacts (e.g. _pagefind index built
        # post-deploy) that don't live in the repo. Stale files accumulate over
        # time; clean them manually if needed. Excludes mirror what we ignore
        # locally per beava-website/.gitignore.
        run: |
          rsync -av --no-perms --no-owner --no-group \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='link-audit-report.txt' \
            --exclude='render-docs-warnings.txt' \
            beava-website/project/ \
            root@178.104.164.100:/srv/beava-website/project/

      - name: Set up Python + install Beava SDK
        # The pipeline is defined in Python at beava-website/deploy/register_pipeline.py
        # — same SDK code shown on the landing page. We install the SDK from
        # this repo's python/ source (matching the merged commit) so the
        # generated wire payload is always in sync with the SDK shipping in
        # the same image.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Beava SDK
        run: pip install ./python

      - name: Generate wire payload from register_pipeline.py
        # The Python file IS the source of truth. `--dump` emits the wire
        # JSON the server expects, with force=true. No hand-written JSON.
        run: |
          python beava-website/deploy/register_pipeline.py --dump \
            > /tmp/register-payload.json
          echo "── payload preview (first 800 bytes) ──"
          head -c 800 /tmp/register-payload.json; echo

      - name: Re-register pipeline against live beava
        # Always-run, idempotent: POST the freshly-generated payload to
        # /register on the internal beava (port 8080, docker network).
        # `force=true` (set inside the payload by --dump) allows
        # schema-changing updates to land without a manual override.
        run: |
          # Ship the canonical Python source + the generated payload to the box.
          rsync -av --no-perms --no-owner --no-group \
            beava-website/deploy/register_pipeline.py \
            root@178.104.164.100:/srv/beava-website/deploy/register_pipeline.py
          rsync -av --no-perms --no-owner --no-group \
            /tmp/register-payload.json \
            root@178.104.164.100:/tmp/register-payload.json
          # POST via a one-shot curlimages container on the docker network.
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 bash <<'REMOTE'
            set -euo pipefail
            docker run --rm --network beava-website-net \
              -v /tmp/register-payload.json:/r.json:ro \
              curlimages/curl:latest -sS --fail-with-body \
              -X POST http://beava:8080/register \
              -H "Content-Type: application/json" \
              --data-binary @/r.json
            rm -f /tmp/register-payload.json
          REMOTE

      - name: Smoke test live origin
        # Hit the internal caddy on 127.0.0.1:8082 over SSH — verifies the
        # static site responds 200, plus that the SiteMetrics row reads
        # back. Runs after rsync + register so we catch any deploy that
        # broke either layer.
        run: |
          ssh -o StrictHostKeyChecking=no root@178.104.164.100 \
            'curl -sf --max-time 5 -o /dev/null -w "homepage HTTP %{http_code}\n" http://127.0.0.1:8082/ && \
             curl -sf --max-time 5 -o /dev/null -w "docs HTTP %{http_code}\n"     http://127.0.0.1:8082/docs/ && \
             curl -sf --max-time 5 -X POST http://127.0.0.1:8082/api/get \
                 -H "Content-Type: application/json" \
                 -d "{\"table\":\"SiteMetrics\",\"key\":\"\"}" \
                 -w "SiteMetrics row HTTP %{http_code}\n"'

      - name: Job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Hetzner deploy
          - Source: \`beava-website/project/\` @ \`${{ github.sha }}\`
          - Target: \`root@178.104.164.100:/srv/beava-website/project/\`
          - Public URL: https://beava.dev
          EOF
