name: Publish edge image to Docker Hub

on:
  # main pushes → `:edge` rolling tag (plus the immutable sha tag).
  # v* tag pushes → `:<version>` pinned tag + `:latest` alias for the
  # most recently released version. The two trigger paths share the
  # build matrix; the `tags:` block below switches output tag set on
  # `github.ref_type`.
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Default-deny GITHUB_TOKEN. Docker Hub auth is via DOCKERHUB_TOKEN;
# nothing on GitHub is mutated by this job.
permissions:
  contents: read

concurrency:
  # One image build at a time per branch — avoid two concurrent pushes
  # racing on the `:edge` tag.
  group: publish-edge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Bumped 30→45 after PR #17 — that build hit 30:20 on first run.
    # Successful runs land in 22-25 min; the 45-min ceiling absorbs
    # cache misses and multi-arch buildx slowdown without retries.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      # docker/metadata-action handles the cross-trigger tag fanout:
      #   refs/heads/main         →  :edge + :sha-<sha>
      #   refs/tags/v0.0.2        →  :0.0.2 + :0.0 + :latest + :sha-<sha>
      # The `type=semver,pattern=…` lines strip the leading `v` and the
      # `type=raw,value=latest` only emits :latest on tag pushes (event=tag).
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: beavadev/beava
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.beava
          push: true
          # Multi-arch manifest so Apple Silicon (Docker Desktop default
          # platform = linux/arm64) doesn't fall back to slow QEMU
          # emulation when running the chapter-1 tutorial. Also covers
          # production amd64 servers.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx layer cache speeds up subsequent runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Docker Hub image published
          Tags emitted this run:
          \`\`\`
          ${{ steps.meta.outputs.tags }}
          \`\`\`
          Common pulls:
          - \`docker pull beavadev/beava:latest\` — most recent released version
          - \`docker pull beavadev/beava:edge\` — latest main commit (snapshot)
          - \`docker pull beavadev/beava:0.0.X\` — pinned to a specific release
          EOF
