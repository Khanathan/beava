name: PR Checks

# Tokio / polars / deno standard: every PR auto-runs CI. Fork PRs are
# physically gated by GitHub's native "Require approval for all outside
# collaborators" setting (configured at the repo level, not here) — first
# fork-CI run shows an "Approve and run workflows" button in the PR's
# Checks tab. Internal collaborators auto-run.
#
# This workflow is the heavy gate (release build + full tests) layered on
# top of ci.yml's lighter checks. Both run on every PR.
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default-deny GITHUB_TOKEN (OWASP / GitHub-Actions hardening guide).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test, release build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint with clippy
        # `--features testing` (not `--all-features`) per v0.0.0 scope: the
        # io_uring backend has pre-existing borrow-checker errors tracked as
        # v0.0.x backlog. Mirrors ci.yml's clippy gate exactly.
        run: cargo clippy --workspace --all-targets --features testing -- -D warnings

      - name: Run tests
        id: rust_tests
        # `--features testing` enables the gated tests under
        # crates/beava-server/Cargo.toml (`required-features = ["testing"]`)
        # without pulling in the broken io_uring backend. --test-threads=1
        # retained for serialized integration tests that bind ports.
        run: |
          cargo test --workspace --features testing -- --test-threads=1 2>&1 | tee /tmp/rust-test-output.txt
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          tail -5 /tmp/rust-test-output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify release build
        run: cargo build --release

      - name: Add Rust summary
        if: always()
        run: |
          echo "## Rust Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 /tmp/rust-test-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No test output captured" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  python:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Build Beava binary (needed by integration tests)
        run: cargo build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pytest ruff mypy
          pip install -e python/

      - name: ruff check
        run: cd python && ruff check .

      - name: mypy --strict (advisory)
        # Drop continue-on-error once the codebase is green under strict.
        continue-on-error: true
        run: cd python && mypy beava

      - name: Run Python tests (v0 acceptance suite via pyproject testpaths)
        id: python_tests
        run: |
          cd python && python -m pytest -v 2>&1 | tee /tmp/python-test-output.txt

      - name: Add Python summary
        if: always()
        run: |
          echo "## Python Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -10 /tmp/python-test-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No test output captured" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
