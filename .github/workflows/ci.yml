name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -- --test-threads=1

  python:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust  # Rust must compile first (integration tests build the binary)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Build Tally binary (needed by integration tests)
        run: cargo build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pytest
          pip install -e python/

      - name: Run Python tests
        run: cd python && python -m pytest tests/ -x -q

  python-native:
    name: Python native extension (maturin build + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-native-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'python-native/Cargo.toml') }}
          restore-keys: |
            rust-native-${{ runner.os }}-

      - name: Install maturin + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.7,<2.0" pytest

      # Plan 30-01: maturin's `python-source` does not follow `..` paths or
      # symlinks, so the canonical SDK lives under `python-native/python_src/tally`
      # and `python/tally` is a symlink to it. Git tracks the symlink, so on a
      # fresh clone the directory layout is already correct; we just verify it.
      - name: Verify python-source layout
        run: |
          test -L python/tally
          test -d python-native/python_src/tally
          test -f python-native/python_src/tally/__init__.py

      - name: Build wheel (release, stripped)
        working-directory: python-native
        run: maturin build --release --strip

      - name: Create fresh venv and install wheel
        run: |
          python -m venv /tmp/native-venv
          /tmp/native-venv/bin/pip install --upgrade pip pytest
          /tmp/native-venv/bin/pip install python-native/target/wheels/tally-*.whl || \
            /tmp/native-venv/bin/pip install target/wheels/tally-*.whl

      - name: Sanity-check the installed wheel
        run: |
          /tmp/native-venv/bin/python -c "from tally import Pipeline, TallyError, OutOfScopeError, ClientConnectError, HandshakeError, ReplicaStateError; assert issubclass(OutOfScopeError, TallyError); print('native extension OK')"

      - name: Run Plan 30-01 unit + error tests
        # Run from python-native/ so pytest uses python-native/tests/conftest.py
        # as rootdir — prevents python/pyproject.toml from shadowing the installed
        # wheel with the source-tree tally package.
        working-directory: python-native
        run: /tmp/native-venv/bin/python -m pytest tests/ -v
