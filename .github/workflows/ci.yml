name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -- --test-threads=1

  python:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust  # Rust must compile first (integration tests build the binary)
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Build Beava binary (needed by integration tests)
        run: cargo build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pytest
          pip install -e python/

      - name: Run Python tests
        run: cd python && python -m pytest tests/ -x -q

  # Phase 38-01 mothball: `python-native` job removed — the PyO3 extension
  # and `beava._native` module were deleted along with the Option K
  # embedded-client path. Scientists use the pure-Python SDK against a
  # scoped local replica launched with `beava fork` (Phase 37).
