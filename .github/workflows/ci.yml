name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default-deny GITHUB_TOKEN (OWASP / GitHub-Actions hardening guide).
# Jobs that need write access elevate explicitly; none in ci.yml do.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy (all-targets, -D warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # io-uring backend (dep:io-uring-crate, Linux-only opt-in) excluded from
      # --all-features per v0.0.0 scope; pre-existing borrow-checker errors in
      # the io_uring backend tracked as v0.0.x backlog. Use --features
      # testing,dev-tools — testing wires up the smoke-clone gate; dev-tools
      # is the maturin-pristine-wheel gate that keeps log_probe + its smoke
      # test in CI coverage while excluding them from production wheels.
      - run: cargo clippy --workspace --all-targets --features testing,dev-tools -- -D warnings

  test:
    name: cargo nextest run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # io-uring backend excluded from --all-features per v0.0.0 scope (see
      # clippy job above). Use --features testing,dev-tools — testing wires
      # up the smoke-clone gate; dev-tools keeps log_probe + logging_smoke
      # in test coverage (they're excluded from the maturin-built wheel).
      - run: cargo nextest run --features testing,dev-tools --no-fail-fast

  python:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      # Build the Beava binary — needed by the session-scoped beava_server
      # fixture in python/tests/conftest.py (integration tests spawn it).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key per Python version so matrix jobs don't stomp
          # each other's Rust artifact cache.
          key: python-${{ matrix.python-version }}
      - name: Build Beava binary
        run: cargo build

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python SDK and test dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-timeout ruff mypy

      - name: ruff check
        working-directory: python
        # Ruff config lives in python/pyproject.toml [tool.ruff]. Fast,
        # zero-config gate; failure means the diff brought in a lint
        # regression that the existing codebase doesn't have.
        run: ruff check .

      - name: mypy --strict
        working-directory: python
        run: mypy beava

      - name: Run pytest (v0 acceptance suite via pyproject testpaths)
        working-directory: python
        run: python -m pytest -q --timeout=60 --no-header
