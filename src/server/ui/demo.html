<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Beava — Live</title>
  <link rel="stylesheet" href="/static/demo.css">
  <link rel="icon" href="/static/favicon.svg">
</head>
<body>
  <header>
    <h1>Beava</h1>
    <p>Real-time feature server — live</p>
  </header>
  <main>
    <section class="tiles">
      <div class="tile"><div class="label">Events processed</div><div class="value" id="events-total">–</div></div>
      <div class="tile"><div class="label">Current EPS</div><div class="value" id="current-eps">–</div></div>
      <div class="tile"><div class="label">p99 PUSH (µs)</div><div class="value" id="p99">–</div></div>
      <div class="tile"><div class="label">Late drops</div><div class="value" id="late-drops">–</div></div>
    </section>
    <section class="lookup">
      <h2>Query features by key</h2>
      <form id="lookup-form">
        <input id="key-input" placeholder="user_id" autocomplete="off">
        <button type="submit">Look up</button>
      </form>
      <pre id="key-result">Enter a key above.</pre>
    </section>
    <section class="feed">
      <h2>Recent events</h2>
      <ul id="events-list"></ul>
    </section>
  </main>
  <footer>
    Uptime: <span id="uptime">–</span> · Keys: <span id="keys">–</span> ·
    Reading <code>/public/stats</code> every 2 s
  </footer>
  <script src="/static/demo.js"></script>
</body>
</html>
