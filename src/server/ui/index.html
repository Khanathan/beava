<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tally — debug</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/vendor/d3.min.js" defer></script>
  <script src="/static/vendor/dagre-d3.min.js" defer></script>
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header class="app-header">
    <a class="wordmark" href="/">tally<span class="wordmark-tick">'</span></a>
    <div class="poll-control" data-paused="false">
      <span class="poll-dot" id="poll-dot" aria-hidden="true"></span>
      <span class="poll-label" id="poll-label">Live · 1 Hz</span>
      <button id="pause-btn" type="button" class="btn btn-ghost" aria-pressed="false">Pause</button>
      <span id="poll-status" class="sr-only" aria-live="polite"></span>
    </div>
  </header>

  <main class="split-view">
    <section class="dag-canvas" aria-label="Pipeline topology">
      <svg id="topology-svg" role="img" aria-label="Pipeline topology graph"></svg>
    </section>
    <aside id="drill-in-panel" class="drill-in-panel" data-empty="true" aria-live="polite">
      <p class="drill-in-placeholder">Select a stream to see details</p>
    </aside>
  </main>

  <footer class="app-footer">
    tally <span id="footer-version">v—</span> · connected to <span id="footer-host">—</span> · last update <span id="footer-update">—</span>
  </footer>
</body>
</html>
