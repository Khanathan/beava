<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .row { gap: 14px; }
  .r { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .box { width: 64px; height: 64px; background: #fff; border: 1px solid var(--border); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .tok { font-family: var(--font-mono); font-size: 9.5px; color: var(--accent); }
</style>
</head><body>
  <div class="row">
    <div class="r"><div class="box" style="border-radius:4px"></div><div class="label">4px</div><div class="tok">r-xs</div></div>
    <div class="r"><div class="box" style="border-radius:6px"></div><div class="label">6px</div><div class="tok">r-sm</div></div>
    <div class="r"><div class="box" style="border-radius:10px"></div><div class="label">10px</div><div class="tok">r-md</div></div>
    <div class="r"><div class="box" style="border-radius:14px"></div><div class="label">14px</div><div class="tok">r-lg</div></div>
    <div class="r"><div class="box" style="border-radius:20px"></div><div class="label">20px</div><div class="tok">r-xl</div></div>
    <div class="r"><div class="box" style="border-radius:28px"></div><div class="label">28px</div><div class="tok">r-2xl</div></div>
    <div class="r"><div class="box" style="border-radius:999px"></div><div class="label">full</div><div class="tok">r-pill</div></div>
  </div>
</body></html>
