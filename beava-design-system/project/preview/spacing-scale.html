<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .scale { display: flex; align-items: flex-end; gap: 12px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); width: 28px; border-radius: 4px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .tok { font-family: var(--font-mono); font-size: 9px; color: var(--accent); }
</style>
</head><body>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="n">4</div><div class="tok">sp-1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="n">8</div><div class="tok">sp-2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="n">12</div><div class="tok">sp-3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="n">16</div><div class="tok">sp-4</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="n">24</div><div class="tok">sp-6</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="n">32</div><div class="tok">sp-8</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="n">48</div><div class="tok">sp-12</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="n">64</div><div class="tok">sp-16</div></div>
    <div class="step"><div class="bar" style="height:80px"></div><div class="n">80</div><div class="tok">sp-20</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="n">96</div><div class="tok">sp-24</div></div>
  </div>
</body></html>
