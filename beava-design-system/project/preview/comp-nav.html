<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; margin: 0; width: 700px; }
  .nav {
    height: 64px; background: rgba(253,250,244,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 24px;
    font-family: var(--font-sans);
  }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:17px; color: var(--fg1); }
  .brand img { width: 30px; height: 30px; }
  .links { display:flex; gap:4px; margin-left:12px; flex:1; }
  .links a { padding: 6px 10px; border-radius: 8px; font-size: 14px; color: var(--fg2); text-decoration:none; font-weight:500; }
  .links a.active { color: var(--accent); }
  .links a:hover { background: var(--beava-orange-wash); color: var(--accent); }
  .right { display:flex; align-items:center; gap:10px; }
  .stars { display:flex; align-items:center; gap:6px; font-size:13px; color: var(--fg2); padding: 6px 10px; border:1px solid var(--border); border-radius:8px; background:#fff; font-weight:500; }
  .cta { background: var(--accent); color:#fff; padding:8px 14px; border-radius:8px; font-size:14px; font-weight:600; text-decoration:none; }
</style>
</head><body>
  <nav class="nav">
    <div class="brand"><img src="../assets/logo-mark.png" alt=""/>beava</div>
    <div class="links">
      <a class="active">Docs</a>
      <a>Learn</a>
      <a>Blog</a>
      <a>Community</a>
    </div>
    <div class="right">
      <div class="stars">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#b85c20"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
        8.2k
      </div>
      <a class="cta">Get started</a>
    </div>
  </nav>
</body></html>
