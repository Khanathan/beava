<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display:flex; gap:16px; align-items:center; background: var(--bg); }
  .hero { display:flex; align-items:center; gap:18px; }
  img { width: 130px; height: 130px; object-fit:contain; }
  .lockup { display:flex; flex-direction:column; gap:4px; }
  .word { font-family: var(--font-serif); font-weight: 700; font-size: 56px; color: var(--fg1); letter-spacing: -0.02em; line-height: 1; font-feature-settings: "ss01" on; }
  .tag { font-family: var(--font-sans); font-size: 14px; color: var(--fg3); letter-spacing: 0.02em; }
  .dot { display:inline-block; width: 7px; height:7px; border-radius:999px; background: var(--accent); vertical-align: middle; margin: 0 6px 2px; }
</style>
</head><body>
  <div class="hero">
    <img src="../assets/logo-mark.png" alt="beava mascot" />
    <div class="lockup">
      <div class="word">beava</div>
      <div class="tag">features<span class="dot"></span>without the priesthood</div>
    </div>
  </div>
</body></html>
