<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .swatch {
    flex: 1;
    min-width: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .chip {
    height: 76px;
    display: flex;
    align-items: flex-end;
    padding: 8px 10px;
    color: #fff;
  }
  .chip.dark { color: var(--beava-cream); }
  .chip.light { color: var(--beava-brown-ink); }
  .meta { padding: 8px 10px; background: #fff; }
  .meta .name { font-size: 12px; font-weight: 600; color: var(--fg1); }
  .meta .hex { font-size: 10.5px; font-family: var(--font-mono); color: var(--fg3); }
  .meta .tok { font-size: 10px; font-family: var(--font-mono); color: var(--accent); }
</style>
</head><body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#b85c20"></div>
      <div class="meta"><div class="name">Orange</div><div class="hex">#b85c20</div><div class="tok">--beava-orange</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#d97a3e"></div>
      <div class="meta"><div class="name">Orange soft</div><div class="hex">#d97a3e</div><div class="tok">--beava-orange-soft</div></div>
    </div>
    <div class="swatch">
      <div class="chip light" style="background:#e89a65"></div>
      <div class="meta"><div class="name">Orange glow</div><div class="hex">#e89a65</div><div class="tok">--beava-orange-glow</div></div>
    </div>
    <div class="swatch">
      <div class="chip light" style="background:#fbecde"></div>
      <div class="meta"><div class="name">Orange wash</div><div class="hex">#fbecde</div><div class="tok">--beava-orange-wash</div></div>
    </div>
  </div>
</body></html>
