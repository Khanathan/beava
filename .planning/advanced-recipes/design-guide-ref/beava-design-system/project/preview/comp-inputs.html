<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  label { display:block; font-size:13px; font-weight:600; color:var(--fg1); margin-bottom:6px; }
  .hint { display:block; font-size:12px; color:var(--fg3); margin-top:5px; }
  .input {
    width: 100%; box-sizing: border-box;
    padding: 10px 12px; font-family: var(--font-sans); font-size: 14px;
    background: #fff; color: var(--fg1);
    border: 1px solid var(--border); border-radius: 10px;
    transition: border-color 200ms, box-shadow 200ms;
  }
  .input:focus { outline: 0; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,92,32,0.18); }
  .row-in { display:flex; gap:10px; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--beava-paper); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 12px;
  }
  .search input { flex:1; border:0; background:transparent; outline:0; font-family:var(--font-sans); font-size:14px; color:var(--fg1); }
  .search input::placeholder { color: var(--fg3); }
  .kbd { font-family: var(--font-mono); font-size:11px; color: var(--fg3); padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; background:#fff; }
</style>
</head><body>
  <div class="stack">
    <div>
      <label>API endpoint</label>
      <input class="input" type="text" value="https://beava.local:7878" />
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a6a54" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input placeholder="Search docs…" />
      <span class="kbd">⌘K</span>
    </div>
  </div>
</body></html>
