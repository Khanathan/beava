<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 22px; background: var(--bg); }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .pose { display:flex; flex-direction:column; align-items:center; gap:6px; background: #fff; border:1px solid var(--border); border-radius: 12px; padding: 10px 8px; }
  .pose img { width: 82px; height: 82px; object-fit:contain; }
  .pose .lbl { font-size: 11px; color: var(--fg2); font-weight:600; text-align:center; }
  .pose .use { font-size: 10px; color: var(--fg3); text-align:center; line-height: 1.3; }
</style>
</head><body>
  <div class="row">
    <div class="pose"><img src="../assets/logo-mark.png"/><div class="lbl">Default</div><div class="use">Primary mark</div></div>
    <div class="pose"><img src="../assets/mascot-pose-2.svg"/><div class="lbl">Greeting</div><div class="use">Secondary hero</div></div>
    <div class="pose"><img src="../assets/mascot-pose-3.png"/><div class="lbl">Action</div><div class="use">CTA moments</div></div>
    <div class="pose"><img src="../assets/mascot-work-pose.svg"/><div class="lbl">Working</div><div class="use">Docs, tutorials</div></div>
    <div class="pose"><img src="../assets/mascot-mark-geometric.png"/><div class="lbl">Geometric</div><div class="use">Favicon, ≤32px</div></div>
  </div>
</body></html>
