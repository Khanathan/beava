<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; background: var(--bg-alt); }
  .row { gap: 18px; }
  .card { flex: 1; height: 100px; background: #fff; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
  .s1 { box-shadow: 0 1px 2px rgba(26,23,20,0.06); }
  .s2 { box-shadow: 0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06); }
  .s3 { box-shadow: 0 2px 4px rgba(26,23,20,0.04), 0 8px 20px rgba(26,23,20,0.08); }
  .s4 { box-shadow: 0 4px 8px rgba(26,23,20,0.06), 0 18px 40px rgba(26,23,20,0.10); }
  .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
</style>
</head><body>
  <div class="row">
    <div class="card s1"><div class="label">xs</div><div class="tok">--shadow-xs</div></div>
    <div class="card s2"><div class="label">sm</div><div class="tok">--shadow-sm</div></div>
    <div class="card s3"><div class="label">md</div><div class="tok">--shadow-md</div></div>
    <div class="card s4"><div class="label">lg</div><div class="tok">--shadow-lg</div></div>
  </div>
</body></html>
