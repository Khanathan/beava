<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .row { gap: 10px; flex-wrap: wrap; }
  .badge {
    font-family: var(--font-sans); font-weight: 600; font-size: 12px;
    padding: 4px 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid transparent;
  }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .live { background: var(--beava-success-wash); color: var(--beava-success); }
  .live .dot { background: var(--beava-success); box-shadow: 0 0 0 3px rgba(74,122,58,0.15); }
  .neutral { background: var(--beava-paper); color: var(--fg2); border-color: var(--border); }
  .warn { background: var(--beava-warn-wash); color: #7d5a10; }
  .new { background: var(--beava-orange-wash); color: var(--accent); }
  .beta { background: #fff; border-color: var(--accent); color: var(--accent); }
  .version { background: var(--beava-brown-ink); color: var(--beava-cream); font-family: var(--font-mono); font-size: 11px; }
</style>
</head><body>
  <div class="row">
    <span class="badge live"><span class="dot"></span>Live</span>
    <span class="badge neutral">Stable</span>
    <span class="badge new">New</span>
    <span class="badge beta">Beta</span>
    <span class="badge warn">Preview</span>
    <span class="badge version">v0.9.4</span>
  </div>
</body></html>
