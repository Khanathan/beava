<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  pre { font-family: var(--font-mono); font-size: 13px; line-height: 1.65; background: #fbf5e8; color: #2a201a; padding: 16px 18px; border-radius: 10px; border: 1px solid var(--border); margin: 0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), inset 0 0 0 1px rgba(0,0,0,0.02); }
  .kw { color: #b85c20; }
  .str { color: #4a7a3a; }
  .num { color: #7d4a1e; }
  .cmt { color: #8a6a54; font-style: italic; }
  .fn { color: #3a6a8a; }
  .ty { color: #8a5c1e; }
  .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); margin-bottom: 8px; }
</style>
</head><body>
  <div class="label">JetBrains Mono · 13px · warm syntax palette</div>
  <pre><span class="cmt"># define a 60s rolling counter over "click" events</span>
<span class="kw">POST</span> <span class="str">/features/clicks_60s</span>
<span class="ty">type</span>: <span class="str">"rolling_counter"</span>
<span class="ty">window</span>: <span class="num">60s</span>
<span class="ty">key</span>: <span class="str">"user_id"</span>

<span class="cmt">// then ship an event from your app</span>
<span class="kw">await</span> beava.<span class="fn">push</span>(<span class="str">"click"</span>, { user_id: <span class="num">42</span> });
</pre>
</body></html>
