<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .row { gap: 14px; }
  .card {
    flex:1; background: #fff; border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
    box-shadow: 0 1px 2px rgba(26,23,20,0.04), 0 2px 6px rgba(26,23,20,0.06);
    transition: all 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 2px 4px rgba(26,23,20,0.04), 0 8px 20px rgba(26,23,20,0.08); border-color: var(--border-strong); }
  .ic { width:36px; height:36px; border-radius:10px; background: var(--beava-orange-wash); display:flex; align-items:center; justify-content:center; color: var(--accent); margin-bottom:12px; }
  .card h4 { font-family: var(--font-sans); font-weight:600; font-size:15px; margin:0 0 4px; color:var(--fg1); }
  .card p { font-family: var(--font-sans); font-size:13px; line-height:1.5; color:var(--fg3); margin:0; }
</style>
</head><body>
  <div class="row">
    <div class="card">
      <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg></div>
      <h4>Rolling counters</h4>
      <p>Sliding time windows over any event stream, with sub-millisecond queries.</p>
    </div>
    <div class="card">
      <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
      <h4>Velocities</h4>
      <p>Rate-of-change over rolling windows. Detect surges without math.</p>
    </div>
    <div class="card">
      <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h10"/><path d="M4 18h6"/></svg></div>
      <h4>Leaderboards</h4>
      <p>Top-N by any metric, always sorted, never stale.</p>
    </div>
  </div>
</body></html>
