<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .swatch {
    flex: 1;
    min-width: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .chip { height: 76px; }
  .meta { padding: 8px 10px; }
  .meta .name { font-size: 12px; font-weight: 600; color: var(--fg1); }
  .meta .hex { font-size: 10.5px; font-family: var(--font-mono); color: var(--fg3); }
  .meta .tok { font-size: 10px; font-family: var(--font-mono); color: var(--accent); }
</style>
</head><body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#1a1714"></div>
      <div class="meta"><div class="name">Brown ink</div><div class="hex">#1a1714</div><div class="tok">--beava-brown-ink</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#3a2a1f"></div>
      <div class="meta"><div class="name">Brown dark</div><div class="hex">#3a2a1f</div><div class="tok">--beava-brown-dark</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#6b4a35"></div>
      <div class="meta"><div class="name">Brown</div><div class="hex">#6b4a35</div><div class="tok">--beava-brown</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#8a6a54"></div>
      <div class="meta"><div class="name">Brown mid</div><div class="hex">#8a6a54</div><div class="tok">--beava-brown-mid</div></div>
    </div>
  </div>
</body></html>
