[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beava"
version = "0.3.0"
requires-python = ">=3.10"
description = "Python SDK for Beava: real-time feature server with composable streaming pipelines."
readme = "../README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Hoang Phan", email = "phan.minhhoang2606@gmail.com" }]
keywords = ["streaming", "real-time", "feature-store", "rust", "python"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://beava.dev"
Repository = "https://github.com/petrpan26/beava"
Issues = "https://github.com/petrpan26/beava/issues"

[project.scripts]
# Plan 25-03: stdlib-only operator CLI. Backs `beava suggest-config`,
# which pretty-prints /debug/config-recommendations output grouped by
# decorator target. Also ships `beava install-skill` which installs the
# AI-editor skill to ~/.agents/skills/beava so Claude Code, Cursor, Codex,
# and other agents can discover it.
beava = "beava._cli:main"

[tool.hatch.build.targets.wheel]
packages = ["beava"]

# Bundle the agent skill into the wheel at `beava/_skill/SKILL.md` so
# `beava install-skill` can copy it out at runtime via importlib.resources.
# Source of truth lives at repo-root `.agents/skills/beava/SKILL.md`.
[tool.hatch.build.targets.wheel.force-include]
"../.agents/skills/beava/SKILL.md" = "beava/_skill/SKILL.md"

[tool.hatch.build.targets.sdist.force-include]
"../.agents/skills/beava/SKILL.md" = "beava/_skill/SKILL.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
