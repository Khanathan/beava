[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tally"
version = "0.1.0"
requires-python = ">=3.10"
description = "Python SDK for Tally real-time feature server"

[project.scripts]
# Plan 25-03: stdlib-only operator CLI. Backs `tally suggest-config`,
# which pretty-prints /debug/config-recommendations output grouped by
# decorator target. Also ships `tally install-skill` which installs the
# AI-editor skill to ~/.agents/skills/tally so Claude Code, Cursor, Codex,
# and other agents can discover it.
tally = "tally._cli:main"

[tool.hatch.build.targets.wheel]
packages = ["tally"]

# Bundle the agent skill into the wheel at `tally/_skill/SKILL.md` so
# `tally install-skill` can copy it out at runtime via importlib.resources.
# Source of truth lives at repo-root `.agents/skills/tally/SKILL.md`.
[tool.hatch.build.targets.wheel.force-include]
"../.agents/skills/tally/SKILL.md" = "tally/_skill/SKILL.md"

[tool.hatch.build.targets.sdist.force-include]
"../.agents/skills/tally/SKILL.md" = "tally/_skill/SKILL.md"

[tool.pytest.ini_options]
testpaths = ["tests"]
