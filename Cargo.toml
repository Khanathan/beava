[package]
name = "tally"
version = "0.1.0"
edition = "2021"

[dependencies]
ahash = "0.8"
winnow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { version = "1.1", features = ["use-std", "alloc"] }
tokio = { version = "1.50", features = ["rt", "net", "io-util", "macros", "time"] }
axum = "0.8"
bytes = "1.11"
petgraph = "0.8"
rust-embed = { version = "8.11", features = ["mime-guess", "debug-embed"] }

[dev-dependencies]
tempfile = "3"
