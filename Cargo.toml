[workspace]
members = ["."]

[package]
name = "beava"
version = "0.1.0"
edition = "2021"
authors = ["Hoang Phan <phan.minhhoang2606@gmail.com>"]
description = "Real-time feature server with composable streaming pipelines for ML and analytics."
license = "Apache-2.0"
repository = "https://github.com/petrpan26/beava"
homepage = "https://beava.dev"
readme = "README.md"
keywords = ["streaming", "real-time", "feature-store", "rust", "python"]
categories = ["database-implementations", "data-structures", "network-programming"]

[features]
default = ["server"]
server = []
client = []
# Phase 41-01 T1: gates the `/public/recent-events` demo endpoint and its
# backing in-memory ring. OFF by default — production server build ships
# without the per-push ring-buffer mutex that the ring requires. Enable
# only when compiling for the launch/demo UI.
demo = ["server"]
# Phase 53-03 (D-03): dev-only fallback to Phase 49 AHashMap-backed
# ShardedStateStoreV1. OFF by default — production binary ships with the
# fjall backend only. Enable via `cargo build --features state-inmem` to
# run A/B benchmarks against the pre-Phase-53 legacy path.
#
# Phase 54-04 2026-04-19: flag retained as a **no-op tracking marker**. The
# `dashmap` and `arc-swap` deps have been removed and the `StreamStore`
# DashMap struct deleted. The still-gated `ShardedStateStoreV1` AHashMap
# backend compiles only under this feature; a follow-up cleanup plan
# (54-05-NEXT) will collapse the remaining `#[cfg(feature = "state-inmem")]`
# gates into the default build. Do NOT use this feature as a supported
# build configuration — the default (fjall) build is the sole production
# target for Phase 54 onward.
state-inmem = []

[dependencies]
ahash = "0.8"
winnow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
postcard = { version = "1.1", features = ["use-std", "alloc"] }
tokio = { version = "1.50", features = ["rt", "rt-multi-thread", "net", "io-util", "macros", "time"] }
axum = "0.8"
axum-extra = { version = "0.12", features = ["json-lines"] }
tower-http = { version = "0.6", features = ["limit", "timeout"] }
tower = { version = "0.5", features = ["util"] }
tokio-stream = { version = "0.1", features = ["io-util"] }
bytes = "1.11"
petgraph = "0.8"
rust-embed = { version = "8.11", features = ["mime-guess", "debug-embed"] }
# Phase 54-04 2026-04-19: `dashmap` and `arc-swap` removed from direct deps.
# The `StreamStore` DashMap-backed per-stream entity map (last direct user)
# was deleted in this plan; `arc-swap` had no in-tree call sites. `dashmap`
# is still available transitively via `fjall` but `src/` no longer imports
# it — the `verify-no-dashmap.sh` grep gate is GREEN.
parking_lot = "0.12"
ordered-float = { version = "4", features = ["serde"] }
rand = "0.8"
libc = "0.2"
num_cpus = "1.17"
core_affinity = "0.8.3"
crossbeam-channel = "0.5.15"
crossbeam-utils = "0.8"
metrics = "0.24"
metrics-exporter-prometheus = "0.16"
socket2 = { version = "0.5", features = ["all"] }
# Phase 51-02 (TPC-PERF-05): futures::join_all for scatter-gather over N shards.
# Wave 1 uses the synchronous scatter_gather; Wave 2+ will use join_all.
futures = "0.3"
fs2 = "0.4"
# Phase 53-02 (W-5 revision): real host-memory read used for the
# `BEAVA_FJALL_CACHE_MB` default formula
# `(read_sys_mem_mb() / num_shards / 2).min(512).max(16)`. Pure-Rust,
# cross-platform; default-features disabled to keep the dep footprint
# minimal — we only consume `System::total_memory()`.
sysinfo = { version = "0.33", default-features = false, features = ["system"] }
# Phase 53-02: fjall 2.11 promoted from [dev-dependencies] to [dependencies].
# Production hot-path dep — `src/shard/fjall_backend.rs` uses `fjall::Config`,
# `fjall::Keyspace`, and `fjall::PartitionHandle` to host per-shard entity
# state. Pinned to the 2.x line (CONTEXT D-04 rejects 3.x for v1.2).
fjall = "2.11"

[dev-dependencies]
tempfile = "3"
sha2 = "0.10"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
pprof = { version = "0.14", features = ["flamegraph", "frame-pointer"] }
scc = "3.7"
papaya = "0.2"
flurry = "0.5"
proptest = "1.11"
rstest = "0.26"

[[bin]]
name = "beava"
path = "src/main.rs"
required-features = ["server"]

[[bin]]
name = "beava_suggest_config"
path = "src/bin/beava_suggest_config.rs"

[[bench]]
name = "uddsketch_ops"
harness = false

[[bench]]
name = "cms_ops"
harness = false

[[bench]]
name = "hll_ops"
harness = false

[[bench]]
name = "dirty_swap"
harness = false

[[bench]]
name = "shard_scaffold"
harness = false

[[bench]]
name = "pareto_workload"
harness = false

# Phase 53-01 (spike gate): fjall vs AHashMap read-modify-write + postcard sizes + SIGKILL +
# cache-stats API probe. Criterion harness, no default bench runner. See 53-01-PLAN.md.
[[bench]]
name = "fjall_spike"
harness = false

# Phase 59.6 Wave 0 (TPC-PERF-11): per-event pipeline-phase latency bench. Wave 0 is a
# noop stub; Wave 7 revises the body to assert `beava_shard_push_phase_seconds{phase="pipeline"}`
# avg ≤ 2.0μs (down from the 59.5-W3.5 baseline of 8.5μs).
[[bench]]
name = "typed_pipeline_phase_latency"
harness = false
