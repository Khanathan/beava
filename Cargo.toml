[workspace]
members = ["."]

[package]
name = "tally"
version = "0.1.0"
edition = "2021"

[features]
default = ["server"]
server = []
client = []
# Phase 41-01 T1: gates the `/public/recent-events` demo endpoint and its
# backing in-memory ring. OFF by default — production server build ships
# without the per-push ring-buffer mutex that the ring requires. Enable
# only when compiling for the launch/demo UI.
demo = ["server"]

[dependencies]
ahash = "0.8"
winnow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
postcard = { version = "1.1", features = ["use-std", "alloc"] }
tokio = { version = "1.50", features = ["rt", "rt-multi-thread", "net", "io-util", "macros", "time"] }
axum = "0.8"
bytes = "1.11"
petgraph = "0.8"
rust-embed = { version = "8.11", features = ["mime-guess", "debug-embed"] }
dashmap = "6.1"
parking_lot = "0.12"
ordered-float = { version = "4", features = ["serde"] }
rand = "0.8"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
sha2 = "0.10"
tower = { version = "0.5", features = ["util"] }
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bin]]
name = "tally"
path = "src/main.rs"
required-features = ["server"]

[[bin]]
name = "tally_suggest_config"
path = "src/bin/tally_suggest_config.rs"

[[bench]]
name = "uddsketch_ops"
harness = false

[[bench]]
name = "cms_ops"
harness = false

[[bench]]
name = "hll_ops"
harness = false
