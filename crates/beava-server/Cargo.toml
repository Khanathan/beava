[package]
name = "beava-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Beava v2 server — single-binary real-time feature server (fraud, ad-tech, analytics)."

[features]
default = []
testing = ["dep:reqwest"]

[[bin]]
name = "beava"
path = "src/main.rs"

[[bin]]
name = "log_probe"
path = "src/bin/log_probe.rs"
required-features = []

[[test]]
name = "foundation_smoke"
path = "tests/foundation_smoke.rs"
required-features = ["testing"]

[[test]]
name = "phase2_smoke"
path = "tests/phase2_smoke.rs"
required-features = ["testing"]

[[test]]
name = "phase2_5_smoke"
path = "tests/phase2_5_smoke.rs"
required-features = ["testing"]

[[test]]
name = "phase4_smoke"
path = "tests/phase4_smoke.rs"
required-features = ["testing"]

[lib]
name = "beava_server"
path = "src/lib.rs"

[dependencies]
beava-core = { path = "../beava-core" }
clap = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
once_cell = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
parking_lot = { workspace = true }
bytes = { workspace = true }
tokio-util = { workspace = true }
reqwest = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "net", "signal", "time", "sync", "test-util"] }
tower = { workspace = true, features = ["util"] }
http-body-util = { workspace = true }
serde_json = { workspace = true }
libc = { workspace = true }
