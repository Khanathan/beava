[[test]]
name = "phase18_07_no_tokio_dataplane_test"
path = "tests/phase18_07_no_tokio_dataplane_test.rs"

[[test]]
name = "phase18_07_push_and_get_test"
path = "tests/phase18_07_push_and_get_test.rs"
