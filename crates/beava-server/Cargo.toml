# ─── Plan 12.6-11 — post-axum-kill apply microbench (perf-discipline gate) ───
# Drives ApplyShard::dispatch_wire_request_with_row through three concrete
# event shapes (simple counter, count_distinct/HLL, windowed 60s sum). Bench
# bootstrap is shared via benches/common.rs. See
# .planning/phases/12.6-v0-surface-reduction/12.6-11-PLAN.md.
[[bench]]
name = "phase12_6_post_axum_kill_apply"
harness = false

# ─── Plan 12.8-08 — memory-governance apply microbench (perf-discipline gate) ───
# Two cells covering Plan 12.8-03's cold-entity TTL check overhead on the
# apply hot path: cold_ttl_disabled (cold_after_ms = None — baseline; matches
# Phase 12.7 simple_counter shape) vs cold_ttl_enabled (cold_after_ms =
# Some(30d) — measures Option-is-some + last_seen_u64 HashMap lookup +
# update cost when TTL is set but no actual eviction fires). See
# .planning/phases/12.8-memory-governance/12.8-08-PLAN.md.
[[bench]]
name = "phase12_8_memory_gov_apply"
harness = false

# ─── Plan 13.4.1-05 Task 5.c — verb-style dispatch microbench (perf-discipline gate) ───
# Two cells covering Plan 13.4.1-04's migrated dispatch hot paths:
#   - dispatch_get_single_verb_style_sync (single-row, 1-feature filter)
#   - dispatch_batch_get_sync (10-entry batch × 1-feature filter; CT_JSON + CT_MSGPACK)
# The change is a serde shape flip (NEUTRAL-to-POSITIVE delta, covered by the
# throughput-baselines small/tcp gate); this bench is regression insurance
# per CLAUDE.md §Performance Discipline. See
# .planning/phases/13.4.1-server-wire-spec-verb-style-migration/13.4.1-05-PLAN.md.
[[bench]]
name = "phase13_4_1_dispatch_get_verb_style"
harness = false
required-features = ["testing"]
